<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA v113 | Almería Real-Time</title>
    <style>
        :root {
            --gold: #c5a059;
            --bg: #050505;
            --card-bg: #0d0d0d;
            --border: rgba(197, 160, 89, 0.15);
            --text: #e0e0e0;
            --dim: #666;
        }

        * { box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Navegación */
        nav { width: 85px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 35px 0; flex-shrink: 0; background: #000; }
        
        /* LOGO LLAMA ESQUEMÁTICA (Mínimo Trazo) */
        .logo-box { margin-bottom: 60px; text-align: center; }
        .llama-svg { width: 30px; height: 35px; fill: none; stroke: var(--gold); stroke-width: 1.2; }
        .logo-t { font-size: 0.55rem; letter-spacing: 4px; color: var(--gold); margin-top: 10px; font-weight: 900; }

        .n-btn { background: none; border: none; color: var(--dim); cursor: pointer; margin-bottom: 50px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.65rem; letter-spacing: 5px; text-transform: uppercase; transition: 0.3s; padding: 10px 5px; outline: none; opacity: 0.6; }
        .n-btn:hover { opacity: 1; color: var(--gold); }
        .n-btn.active { opacity: 1; color: var(--gold); border-left: 2px solid var(--gold); font-weight: bold; }

        /* Contenido Principal */
        main { flex: 1; padding: 45px; overflow-y: auto; scroll-behavior: smooth; }
        .panel { display: none; max-width: 1100px; margin: 0 auto; animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 0.7rem; color: var(--dim); letter-spacing: 6px; text-transform: uppercase; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 15px; font-weight: 300; }
        h1 b { color: var(--gold); font-weight: 600; }

        /* GRID FUEL */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 22px; border-radius: 2px; transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        .card-name { font-size: 0.85rem; font-weight: 700; color: #fff; margin-bottom: 4px; letter-spacing: 1px; }
        .card-dir { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; margin-bottom: 18px; letter-spacing: 0.5px; }
        
        .price-row { display: flex; gap: 10px; }
        .p-item { flex: 1; background: #111; padding: 12px; border: 1px solid #1a1a1a; text-align: center; }
        .p-lab { font-size: 0.5rem; color: var(--dim); display: block; margin-bottom: 6px; letter-spacing: 1px; }
        .p-num { font-size: 1.15rem; color: var(--gold); font-weight: bold; font-family: 'Courier New', monospace; }

        /* CLIMA EXPANDIDO */
        .weather-hero { display: flex; align-items: flex-start; gap: 60px; margin-bottom: 50px; }
        .temp-now { font-size: 9rem; font-weight: 100; color: var(--gold); line-height: 0.8; letter-spacing: -5px; }
        .w-info { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; flex: 1; }
        .w-box { border: 1px solid var(--border); padding: 18px; position: relative; }
        .w-box::after { content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: var(--gold); opacity: 0.3; }
        
        .forecast { display: flex; justify-content: space-between; margin-top: 60px; border-top: 1px solid var(--border); padding-top: 40px; }
        .f-item { text-align: center; flex: 1; }
        .f-day { font-size: 0.65rem; color: var(--dim); margin-bottom: 10px; letter-spacing: 2px; }

        /* ENERGÍA (Mantenida) */
        .energy-hero { text-align: center; border: 1px solid var(--border); padding: 50px; margin-bottom: 30px; background: #080808; }
        .chart { display: flex; align-items: flex-end; justify-content: space-between; height: 140px; gap: 4px; margin-top: 40px; }
        .bar { flex: 1; background: #1a1a1a; min-height: 2px; }
        .bar.active { background: var(--gold); box-shadow: 0 0 20px rgba(197, 160, 89, 0.4); }

        .loader { color: var(--gold); font-size: 0.6rem; letter-spacing: 3px; text-align: center; width: 100%; padding: 50px; }
    </style>
</head>
<body>

<nav>
    <div class="logo-box">
        <svg class="llama-svg" viewBox="0 0 24 24">
            <path d="M12 2C12 2 7 7 7 12C7 14.76 9.24 17 12 17C14.76 17 17 14.76 17 12C17 7 12 2 12 2Z" />
            <path d="M12 14C13.1 14 14 13.1 14 12C14 10 12 8 12 8C12 8 10 10 10 12C10 13.1 10.9 14 12 14Z" stroke-width="0.8" />
        </svg>
        <div class="logo-t">HESTIA</div>
    </div>
    <button onclick="tab('g', this)" class="n-btn active">FUEL</button>
    <button onclick="tab('l', this)" class="n-btn">LUZ</button>
    <button onclick="tab('m', this)" class="n-btn">CLIMA</button>
</nav>

<main>
    <div id="g" class="panel active">
        <h1>GASOLINERAS <b>ALMERÍA</b></h1>
        <div id="fuel-list" class="grid">
            <div class="loader">ACCEDIENDO A LA API DEL MINISTERIO...</div>
        </div>
    </div>

    <div id="l" class="panel">
        <h1>MERCADO ELÉCTRICO <b>ESPAÑA</b></h1>
        <div class="energy-hero">
            <div style="font-size: 0.6rem; letter-spacing: 3px; color: var(--dim);">PRECIO ACTUAL PVPC €/kWh</div>
            <div id="l-now" style="font-size: 5rem; color: var(--gold); font-weight: 100; margin: 15px 0;">--</div>
            <div id="l-chart" class="chart"></div>
        </div>
    </div>

    <div id="m" class="panel">
        <h1>SITUACIÓN <b>ALMERÍA</b></h1>
        <div class="weather-hero">
            <div id="m-temp" class="temp-now">--°</div>
            <div class="w-info">
                <div class="w-box"><span class="p-lab">HUMEDAD</span><span class="p-num" id="m-hum">--%</span></div>
                <div class="w-box"><span class="p-lab">VIENTO</span><span class="p-num" id="m-win">-- km/h</span></div>
                <div class="w-box"><span class="p-lab">ÍNDICE UV</span><span class="p-num" id="m-uv">--</span></div>
                <div class="w-box"><span class="p-lab">SENSACIÓN</span><span class="p-num" id="m-st">--°</span></div>
            </div>
        </div>
        <div id="m-fore" class="forecast"></div>
    </div>
</main>

<script>
    function tab(id, btn) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // --- FUEL: Lógica v2 basada en el Manual RISP ---
    async function getFuel() {
        const list = document.getElementById('fuel-list');
        try {
            // Nueva URL del manual v2 y uso de un proxy con cabeceras de navegador real
            const target = "https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04";
            
            // Bypass de caché para evitar el mensaje de bloqueo guardado
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}&t=${Date.now()}`);
            const json = await res.json();
            const data = JSON.parse(json.contents);
            
            const clean = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
            
            const stations = data.ListaEESSPrecio
                .filter(e => clean(e.Municipio).includes("ALMERIA"))
                .sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.')))
                .slice(0, 12);

            list.innerHTML = stations.map(e => `
                <div class="card">
                    <div class="card-name">${e.Rótulo}</div>
                    <div class="card-dir">${e.Dirección.substring(0, 32)}</div>
                    <div class="price-row">
                        <div class="p-item"><span class="p-lab">G95</span><span class="p-num">${e['Precio Gasolina 95 E5'] || '---'}</span></div>
                        <div class="p-item"><span class="p-lab">GA</span><span class="p-num">${e['Precio Gasoleo A'] || '---'}</span></div>
                    </div>
                </div>
            `).join('');
        } catch(e) {
            list.innerHTML = `<div style="grid-column:1/-1; border:1px dashed #444; padding:40px; text-align:center;">
                <div style="color:var(--gold); font-size:0.7rem; letter-spacing:2px;">SERVIDOR MITECO PROTEGIDO</div>
                <div style="color:var(--dim); font-size:0.6rem; margin-top:10px;">EL MINISTERIO BLOQUEA IP DE SERVIDORES. USA 4G/5G PARA REFRESCAR.</div>
            </div>`;
        }
    }

    async function getEnergy() {
        try {
            const hoy = new Date().toISOString().split('T')[0];
            const res = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${hoy}T00:00&end_date=${hoy}T23:59&time_trunc=hour`);
            const data = await res.json();
            const vals = data.included[0].attributes.values.map(v => (v.value / 1000).toFixed(4));
            document.getElementById('l-now').innerText = vals[new Date().getHours()];
            const max = Math.max(...vals);
            document.getElementById('l-chart').innerHTML = vals.map((v, i) => `
                <div class="bar ${i === new Date().getHours() ? 'active' : ''}" style="height:${(v/max)*100}%"></div>
            `).join('');
        } catch(e) {}
    }

    async function getWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m,apparent_temperature,uv_index&daily=temperature_2m_max,temperature_2m_min&timezone=auto");
            const d = await res.json();
            const h = new Date().getHours();
            
            document.getElementById('m-temp').innerText = Math.round(d.current_weather.temperature) + "°";
            document.getElementById('m-hum').innerText = d.hourly.relativehumidity_2m[h] + "%";
            document.getElementById('m-win').innerText = d.current_weather.windspeed + " km/h";
            document.getElementById('m-uv').innerText = Math.round(d.hourly.uv_index[h]);
            document.getElementById('m-st').innerText = Math.round(d.hourly.apparent_temperature[h]) + "°";

            const days = ["DOM", "LUN", "MAR", "MIÉ", "JUE", "VIE", "SÁB"];
            document.getElementById('m-fore').innerHTML = [1,2,3,4].map(i => {
                const date = new Date(); date.setDate(date.getDate() + i);
                return `<div class="f-item">
                    <div class="f-day">${days[date.getDay()]}</div>
                    <div style="color:var(--gold); font-size:1.2rem; font-weight:700;">${Math.round(d.daily.temperature_2m_max[i])}°</div>
                    <div style="color:var(--dim); font-size:0.65rem;">${Math.round(d.daily.temperature_2m_min[i])}°</div>
                </div>`;
            }).join('');
        } catch(e) {}
    }

    window.onload = () => { getFuel(); getEnergy(); getWeather(); };
</script>
</body>
</html>
