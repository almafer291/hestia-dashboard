<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA v150 | Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold-main: #d4af37; --gold-dim: #a68a2c; --bronze-main: #cd7f32; --bronze-glow: rgba(205, 127, 50, 0.4);
            --bg-dark: #121212; --bg-sidebar: #0a0a0a; --txt: #e0e0e0; --dim: #888; --green: #4caf50; --red: #e74c3c;
            --brd: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: var(--txt); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR SEGÚN TU CÓDIGO HESTIA PREMIUM */
        nav { width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--brd); display: flex; flex-direction: column; padding: 40px 30px; flex-shrink: 0; }
        .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 60px; }
        
        /* LA LLAMA DEL CÓDIGO ENVIADO */
        .fire-icon { 
            font-size: 2.2rem; 
            color: var(--bronze-main); 
            text-shadow: 0 0 15px var(--bronze-glow); 
            cursor: default;
        }
        .brand h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; letter-spacing: 2px; color: var(--txt); }

        .n-btn { background: none; border: none; color: var(--dim); cursor: pointer; padding: 15px 20px; text-align: left; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; border-radius: 12px; margin-bottom: 5px; }
        .n-btn:hover { background: rgba(255,255,255,0.02); color: #fff; }
        .n-btn.active { color: var(--gold-main); background: linear-gradient(90deg, rgba(212, 175, 55, 0.08) 0%, transparent 100%); font-weight: 700; box-shadow: inset 4px 0 0 var(--gold-main); }

        /* MAIN CONTENT */
        main { flex: 1; padding: 40px 50px; overflow-y: auto; background: radial-gradient(circle at center, #1a1a1a 0%, #121212 100%); }
        .panel { display: none; animation: fadeIn 0.4s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .section-title { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 40px; font-weight: 400; }
        .section-title b { color: var(--gold-main); }

        /* BENTO GRID */
        .bento-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px; }
        .tile { background: rgba(255,255,255,0.03); border: 1px solid var(--brd); border-radius: 20px; padding: 25px; backdrop-filter: blur(10px); transition: 0.3s; }
        .tile:hover { border-color: rgba(212, 175, 55, 0.2); background: rgba(255,255,255,0.05); }

        .t-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold-dim); margin-bottom: 15px; display: block; }
        .t-val { font-size: 2.5rem; font-weight: 700; color: #fff; line-height: 1; }
        .t-unit { font-size: 0.8rem; color: var(--dim); margin-left: 5px; }

        /* CLIMA MAESTRO */
        .tile-hero { grid-column: span 3; grid-row: span 2; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .temp-huge { font-family: 'Playfair Display', serif; font-size: 8rem; font-weight: 700; margin: 10px 0; letter-spacing: -4px; }

        /* TABLAS FUEL */
        .fuel-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .fuel-table td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.9rem; }
        .p-price { font-family: monospace; font-weight: 700; color: var(--gold-main); font-size: 1.1rem; }

        /* ENERGÍA */
        .tile-full { grid-column: span 6; }
        .chart { display: flex; align-items: flex-end; justify-content: space-between; height: 150px; margin-top: 20px; border-bottom: 1px solid var(--brd); gap: 4px; }
        .bar { flex: 1; background: #222; border-radius: 4px 4px 0 0; transition: 0.3s; position: relative; }
        .bar.active { background: var(--gold-main); box-shadow: 0 0 15px var(--gold-main); }
    </style>
</head>
<body>

<nav>
    <div class="brand">
        <span class="fire-icon">🔥</span>
        <h1>HESTIA</h1>
    </div>
    <button onclick="tab('m', this)" class="n-btn">Atmosphere</button>
    <button onclick="tab('l', this)" class="n-btn active">Energy PVPC</button>
    <button onclick="tab('f', this)" class="n-btn">Fuel Market</button>
    <button onclick="tab('r', this)" class="n-btn">Core System</button>
</nav>

<main>
    <div id="m" class="panel">
        <h2 class="section-title">Atmosphere <b>Real-Time</b></h2>
        <div class="bento-grid">
            <div class="tile tile-hero">
                <span class="t-label">Almería Exterior</span>
                <div class="temp-huge"><span id="m-temp">--</span>°</div>
                <div id="m-desc" style="text-transform:uppercase; letter-spacing:3px; color:var(--dim)">Actualizado ahora</div>
            </div>
            <div class="tile"><span class="t-label">Humedad</span><div class="t-val" id="m-hum">--</div><span class="t-unit">% UR</span></div>
            <div class="tile"><span class="t-label">Viento</span><div class="t-val" id="m-win">--</div><span class="t-unit">km/h</span></div>
            <div class="tile"><span class="t-label">UV Index</span><div class="t-val" id="m-uv">--</div><span class="t-unit">Index</span></div>
            <div class="tile"><span class="t-label">Lluvia</span><div class="t-val" id="m-rain">--</div><span class="t-unit">% Prob.</span></div>
        </div>
    </div>

    <div id="l" class="panel active">
        <h2 class="section-title">Smart <b>Energy</b></h2>
        <div class="bento-grid">
            <div class="tile tile-full">
                <span class="t-label">Precio Actual (€/kWh)</span>
                <div class="t-val" id="l-now" style="font-size: 5rem; color:var(--gold-main)">--</div>
                <div class="chart" id="l-chart"></div>
            </div>
            <div class="tile"><span class="t-label">Mínimo</span><div class="t-val" id="l-min" style="color:var(--green)">--</div></div>
            <div class="tile"><span class="t-label">Máximo</span><div class="t-val" id="l-max" style="color:var(--red)">--</div></div>
        </div>
    </div>

    <div id="f" class="panel">
        <h2 class="section-title">Fuel <b>Prices</b></h2>
        <div class="bento-grid">
            <div class="tile" style="grid-column: span 3;">
                <span class="t-label">Gasolina 95 (Top Almería)</span>
                <table class="fuel-table" id="table-95"><tbody><tr><td>Cargando datos...</td></tr></tbody></table>
            </div>
            <div class="tile" style="grid-column: span 3;">
                <span class="t-label">Diésel A (Top Almería)</span>
                <table class="fuel-table" id="table-diesel"><tbody><tr><td>Cargando datos...</td></tr></tbody></table>
            </div>
        </div>
    </div>
</main>

<script>
    function tab(id, btn) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    async function getWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m,uv_index,precipitation_probability&timezone=auto");
            const d = await res.json();
            const h = new Date().getHours();
            document.getElementById('m-temp').innerText = Math.round(d.current_weather.temperature);
            document.getElementById('m-hum').innerText = d.hourly.relativehumidity_2m[h];
            document.getElementById('m-win').innerText = d.current_weather.windspeed;
            document.getElementById('m-uv').innerText = Math.round(d.hourly.uv_index[h]);
            document.getElementById('m-rain').innerText = d.hourly.precipitation_probability[h];
        } catch (e) { console.error("Weather Error"); }
    }

    async function getEnergy() {
        try {
            const hoy = new Date().toISOString().split('T')[0];
            const res = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${hoy}T00:00&end_date=${hoy}T23:59&time_trunc=hour`);
            const d = await res.json();
            const values = d.included[0].attributes.values;
            const prices = values.map(v => v.value / 1000);
            const nowH = new Date().getHours();
            document.getElementById('l-now').innerText = prices[nowH].toFixed(4);
            document.getElementById('l-min').innerText = Math.min(...prices).toFixed(4);
            document.getElementById('l-max').innerText = Math.max(...prices).toFixed(4);
            const maxVal = Math.max(...prices);
            document.getElementById('l-chart').innerHTML = prices.map((v, i) => `<div class="bar ${i === nowH ? 'active' : ''}" style="height:${(v/maxVal)*100}%"></div>`).join('');
        } catch (e) { console.error("Energy Error"); }
    }

    async function getFuel() {
        try {
            // PROXY ALTERNATIVO para evitar el error 500
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent("https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04")}`);
            const data = await res.json();
            const cleanData = JSON.parse(data.contents);
            const almeria = cleanData.ListaEESSPrecio.filter(e => e['Municipio'] === 'ALMERÍA');

            const fillTable = (id, key) => {
                const top = almeria
                    .filter(e => e[key])
                    .sort((a,b) => parseFloat(a[key].replace(',','.')) - parseFloat(b[key].replace(',','.')))
                    .slice(0, 5);
                
                document.getElementById(id).innerHTML = top.map(e => `
                    <tr>
                        <td><b style="color:#fff">${e['Rótulo']}</b><br><small style="color:var(--dim)">${e['Dirección']}</small></td>
                        <td class="p-price">${e[key]}</td>
                    </tr>
                `).join('');
            };

            fillTable('table-95', 'Precio Gasolina 95 E5');
            fillTable('table-diesel', 'Precio Gasoleo A');
        } catch (e) {
            console.error("Fuel Error", e);
            document.getElementById('table-95').innerHTML = "<tr><td>Error al conectar con el Ministerio.</td></tr>";
        }
    }

    window.onload = () => {
        getWeather(); getEnergy(); getFuel();
        setInterval(getWeather, 300000);
        setInterval(getEnergy, 300000);
        setInterval(getFuel, 3600000);
    };
</script>
</body>
</html>
