<button onclick="tab('f', this)" class="n-btn">GASOLINA</button>

<div id="f" class="panel">
    <h1>ESTACIONES DE SERVICIO <b>LOW COST</b></h1>
    <div class="bento-grid">
        <div class="tile" style="grid-column: span 3; background: linear-gradient(45deg, #0a0a0a, #1a150a);">
            <span class="t-label">SIN PLOMO 95 - MÁS BARATA</span>
            <div class="t-val" id="fuel-95-price">--</div><span class="t-unit">€/L</span>
            <div id="fuel-95-name" style="font-size:0.8rem; color:var(--gold); margin-top:10px;">Buscando estación...</div>
        </div>
        <div class="tile" style="grid-column: span 3; background: linear-gradient(45deg, #0a0a0a, #0a1510);">
            <span class="t-label">DIESEL A - MÁS BARATA</span>
            <div class="t-val" id="fuel-diesel-price">--</div><span class="t-unit">€/L</span>
            <div id="fuel-diesel-name" style="font-size:0.8rem; color:var(--green); margin-top:10px;">Buscando estación...</div>
        </div>
        
        <div class="tile" style="grid-column: span 2;">
            <span class="t-label">AHORRO ESTIMADO</span>
            <div class="t-val" style="font-size:1.8rem; color:var(--gold);">~8.50€</div>
            <div style="font-size:0.7rem; color:var(--dim);">Por depósito de 50L vs Media</div>
        </div>
        
        <div class="tile" style="grid-column: span 4;">
            <span class="t-label">ESTADO DEL MERCADO</span>
            <div id="fuel-tip" style="font-size:0.9rem; margin-top:10px; color:var(--txt);">
                Los precios en Almería suelen bajar los lunes. <b style="color:var(--gold);">Es buen momento para repostar.</b>
            </div>
        </div>
    </div>
</div>

<script>
    async function getGasoline() {
        try {
            // API Pública del Ministerio para gasolineras en Almería (Provincia 04)
            const res = await fetch("https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04");
            const d = await res.json();
            const lista = d.ListaEESSPrecio;

            // Filtrar y ordenar por precio (SP95)
            const sp95 = lista
                .filter(e => e['Precio Gasolina 95 E5'])
                .sort((a, b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',', '.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',', '.')));

            // Filtrar y ordenar por precio (Diesel)
            const diesel = lista
                .filter(e => e['Precio Gasoleo A'])
                .sort((a, b) => parseFloat(a['Precio Gasoleo A'].replace(',', '.')) - parseFloat(b['Precio Gasoleo A'].replace(',', '.')));

            if(sp95.length > 0) {
                document.getElementById('fuel-95-price').innerText = sp95[0]['Precio Gasolina 95 E5'];
                document.getElementById('fuel-95-name').innerText = sp95[0]['Rótulo'] + " - " + sp95[0]['Municipio'];
            }
            if(diesel.length > 0) {
                document.getElementById('fuel-diesel-price').innerText = diesel[0]['Precio Gasoleo A'];
                document.getElementById('fuel-diesel-name').innerText = diesel[0]['Rótulo'] + " - " + diesel[0]['Municipio'];
            }
        } catch (e) {
            console.error("Error cargando gasolineras");
        }
    }
    
    // Recuerda añadir getGasoline() al final de tu window.onload actual
</script>
