<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA v5.6 | ADVANCED DIAGNOSTIC SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000000; --surf: #0c0c0c; --acc: #FFD700; --bor: #262000; --txt: #FFFFFF; --dim: #777777; --danger: #FF0033; --water: #00e5ff; --flame: #FF4500; }
        * { margin:0; padding:0; box-sizing:border-box; outline: none; }
        body { background: var(--bg); color: var(--txt); font-family: 'Space Mono', monospace; display: flex; height: 100vh; overflow: hidden; }
        
        aside { width: 80px; border-right: 2px solid var(--acc); display: flex; flex-direction: column; align-items: center; padding: 20px 0; background: #000; z-index: 100; }
        .main-icon { font-size: 2.5rem; margin-bottom: 40px; cursor: pointer; text-shadow: 0 0 15px var(--flame); transition: 0.3s; color: var(--flame); }
        .main-icon:hover { transform: scale(1.1); text-shadow: 0 0 25px var(--flame); }
        
        nav { display: flex; flex-direction: column; gap: 25px; width: 100%; align-items: center; }
        .n-btn { color: var(--dim); cursor: pointer; font-size: 1.8rem; transition: 0.2s; width: 100%; text-align: center; padding: 12px 0; }
        .n-btn:hover { color: var(--acc); }
        .n-btn.active { color: #000; background: var(--acc); font-weight: bold; box-shadow: inset 4px 0 10px rgba(0,0,0,0.3); }

        main { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at 10% 10%, #111000 0%, #000 50%); }
        .view { display: none; }
        .view.active { display: block; animation: visualShock 0.25s ease-out; }
        @keyframes visualShock { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; }
        .c { background: var(--surf); border: 1px solid var(--bor); padding: 20px; position: relative; }
        .label { font-family: 'Oswald', sans-serif; font-size: 0.9rem; color: var(--acc); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 15px; border-left: 3px solid var(--acc); padding-left: 8px; }
        
        .stat-r { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid #161616; font-size: 0.75rem; color: #aaa; }
        .stat-r b { color: #fff; text-align: right; }

        .beach-card { background: #000; border: 1px solid #1a1a1a; padding: 12px; display: flex; flex-direction: column; gap: 2px; transition: 0.3s; }
        .beach-card:hover { border-color: var(--acc); transform: translateY(-2px); }
        .beach-title { font-family: 'Oswald'; color: #fff; font-size: 0.95rem; border-bottom: 1px dashed #333; padding-bottom: 5px; margin-bottom: 5px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--acc); }
    </style>
</head>
<body>

<aside>
    <div class="main-icon" onclick="location.reload()">🔥</div>
    <nav>
        <div class="n-btn active" onclick="sh('meteo', this)" title="ATMOSFERA"><i class="ph-bold ph-gauge"></i></div>
        <div class="n-btn" onclick="sh('energy', this)" title="ENERGIA"><i class="ph-bold ph-lightning"></i></div>
        <div class="n-btn" onclick="sh('coast', this)" title="COSTA"><i class="ph-bold ph-waves"></i></div>
        <div class="n-btn" onclick="sh('maps', this)" title="MAPAS"><i class="ph-bold ph-map"></i></div>
    </nav>
</aside>

<main>
    <div id="meteo" class="view active">... (Contenido Meteo Previo) ...</div>
    <div id="energy" class="view">... (Contenido Energía Previo) ...</div>
    
    <!-- NUEVA SECCIÓN COAST -->
    <div id="coast" class="view">
        <div class="grid" id="beach-grid"></div>
    </div>

    <!-- NUEVA PESTAÑA MAPAS -->
    <div id="maps" class="view">
        <div class="grid">
            <div class="c" style="grid-column: span 12; height: 85vh; padding: 0;">
                <span class="label" style="padding: 10px; margin:0;">CARTOGRAFÍA DINÁMICA // WINDY ENGINE</span>
                <iframe width="100%" height="100%" src="https://embed.windy.com/embed2.html?lat=36.83&lon=-2.46&zoom=10&level=surface&overlay=waves&menu=&message=&marker=&calendar=&pressure=&type=map&location=coordinates&detail=&detailLat=36.83&detailLon=-2.46&metricWind=default&metricTemp=default&radarRange=-1" frameborder="0"></iframe>
            </div>
        </div>
    </div>
</main>

</body>
</html>
