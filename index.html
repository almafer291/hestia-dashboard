<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA v119 | Almería Diesel Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --bg: #030303;
            --card: #0a0a0a;
            --brd: rgba(197, 160, 89, 0.2);
            --txt: #ececec;
            --dim: #555;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--txt); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Navegación */
        nav { width: 90px; border-right: 1px solid var(--brd); display: flex; flex-direction: column; align-items: center; padding: 40px 0; background: #000; flex-shrink: 0; }
        .logo-box { margin-bottom: 60px; text-align: center; }
        .llama-svg { width: 32px; height: 38px; fill: none; stroke: var(--gold); stroke-width: 1.2; filter: drop-shadow(0 0 5px rgba(197, 160, 89, 0.2)); }
        .logo-t { font-size: 0.55rem; letter-spacing: 4px; color: var(--gold); margin-top: 10px; font-weight: 900; }

        .n-btn { background: none; border: none; color: var(--dim); cursor: pointer; margin-bottom: 55px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.65rem; letter-spacing: 5px; text-transform: uppercase; transition: 0.4s; padding: 10px; outline: none; }
        .n-btn.active { color: var(--gold); border-left: 2px solid var(--gold); font-weight: bold; }

        /* Contenido */
        main { flex: 1; padding: 50px; overflow-y: auto; background: radial-gradient(circle at top right, #080808, #030303); }
        .panel { display: none; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.4s ease-out; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 0.7rem; color: var(--dim); letter-spacing: 7px; text-transform: uppercase; margin-bottom: 40px; border-bottom: 1px solid var(--brd); padding-bottom: 15px; }
        h1 b { color: var(--gold); }

        /* Tarjetas de Fuel (Enfoque Diesel) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--brd); padding: 22px; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--gold); background: #0e0e0e; }
        .card-name { font-size: 0.85rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .card-dir { font-size: 0.55rem; color: var(--dim); text-transform: uppercase; margin-bottom: 18px; }
        
        .price-row { display: flex; gap: 8px; }
        .p-item { flex: 1; background: #000; padding: 15px; border: 1px solid #111; text-align: center; }
        .p-item.highlight { border-color: var(--gold); background: rgba(197, 160, 89, 0.05); }
        .p-lab { font-size: 0.45rem; color: var(--dim); display: block; margin-bottom: 8px; letter-spacing: 1px; }
        .p-num { font-size: 1.3rem; color: var(--gold); font-weight: 300; font-family: monospace; }

        /* Clima (12 Datos) */
        .weather-display { display: grid; grid-template-columns: 1fr 2fr; gap: 40px; margin-bottom: 50px; }
        .temp-main { font-size: 10rem; font-weight: 100; color: var(--gold); line-height: 0.75; letter-spacing: -6px; position: relative; }
        .w-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .w-box { border: 1px solid var(--brd); padding: 15px; background: rgba(255,255,255,0.01); border-left: 2px solid var(--gold); }

        /* Energía */
        .e-hero { text-align: center; border: 1px solid var(--brd); padding: 60px; background: #000; }
        .chart { display: flex; align-items: flex-end; justify-content: space-between; height: 140px; gap: 4px; margin-top: 40px; }
        .bar { flex: 1; background: #111; }
        .bar.active { background: var(--gold); box-shadow: 0 0 15px var(--gold); }

        .loader { color: var(--gold); font-size: 0.6rem; letter-spacing: 4px; text-align: center; padding: 100px; width: 100%; }
        .error-msg { grid-column: 1/-1; text-align: center; padding: 40px; border: 1px dashed var(--gold); color: var(--dim); font-size: 0.7rem; }
    </style>
</head>
<body>

<nav>
    <div class="logo-box">
        <svg class="llama-svg" viewBox="0 0 24 24">
            <path d="M12 2C12 2 7 7 7 12C7 14.76 9.24 17 12 17C14.76 17 17 14.76 17 12C17 7 12 2 12 2Z" />
            <path d="M12 14C13.1 14 14 13.1 14 12C14 10 12 8 12 8C12 8 10 10 10 12C10 13.1 10.9 14 12 14Z" stroke-width="0.8" />
        </svg>
        <div class="logo-t">HESTIA</div>
    </div>
    <button onclick="tab('g', this)" class="n-btn active">GASOIL</button>
    <button onclick="tab('l', this)" class="n-btn">ENERGÍA</button>
    <button onclick="tab('m', this)" class="n-btn">CLIMA</button>
</nav>

<main>
    <div id="g" class="panel active">
        <h1>PRECIO <b>GASOIL A</b> ALMERÍA</h1>
        <div id="fuel-list" class="grid">
            <div class="loader">CONECTANDO CON GEOPORTAL MITECO...</div>
        </div>
    </div>

    <div id="l" class="panel">
        <h1>MERCADO <b>ELÉCTRICO</b></h1>
        <div class="e-hero">
            <div style="font-size: 0.6rem; letter-spacing: 4px; color: var(--dim);">PRECIO ACTUAL PVPC (€/kWh)</div>
            <div id="l-now" style="font-size: 6rem; color: var(--gold); font-weight: 100;">--</div>
            <div id="l-chart" class="chart"></div>
        </div>
    </div>

    <div id="m" class="panel">
        <h1>OBSERVATORIO <b>12 MÉTRICAS</b></h1>
        <div class="weather-display">
            <div class="temp-main"><span id="m-temp">--°</span><div style="font-size:1rem; letter-spacing:4px; color:var(--dim); font-weight:300;">ALMERÍA</div></div>
            <div class="w-metrics">
                <div class="w-box"><span class="p-lab">HUMEDAD</span><span class="p-num" id="m-hum">--</span></div>
                <div class="w-box"><span class="p-lab">VIENTO</span><span class="p-num" id="m-win">--</span></div>
                <div class="w-box"><span class="p-lab">UV INDEX</span><span class="p-num" id="m-uv">--</span></div>
                <div class="w-box"><span class="p-lab">SENSACIÓN</span><span class="p-num" id="m-st">--</span></div>
                <div class="w-box"><span class="p-lab">PRECIP %</span><span class="p-num" id="m-rain">--</span></div>
                <div class="w-box"><span class="p-lab">PRESIÓN</span><span class="p-num" id="m-pres">--</span></div>
                <div class="w-box"><span class="p-lab">NUBES</span><span class="p-num" id="m-cloud">--</span></div>
                <div class="w-box"><span class="p-lab">VISIBILIDAD</span><span class="p-num" id="m-vis">--</span></div>
                <div class="w-box"><span class="p-lab">P. ROCÍO</span><span class="p-num" id="m-dew">--</span></div>
                <div class="w-box"><span class="p-lab">RÁFAGAS</span><span class="p-num" id="m-gust">--</span></div>
                <div class="w-box"><span class="p-lab">AIRE (AQI)</span><span class="p-num" id="m-aqi">--</span></div>
                <div class="w-box"><span class="p-lab">TORMENTA</span><span class="p-num" id="m-storm">--</span></div>
            </div>
        </div>
        <div id="m-fore" class="forecast" style="display:flex; justify-content:space-between; border-top:1px solid var(--brd); padding-top:30px;"></div>
    </div>
</main>

<script>
    function tab(id, btn) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // --- LÓGICA FUEL (GASOIL PRIORITARIO) ---
    async function getFuel() {
        const list = document.getElementById('fuel-list');
        // Usamos el Proxy AllOrigins que suele ser el más estable para MITECO
        const target = "https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroMunicipio/04013";
        
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}&t=${Date.now()}`);
            const json = await res.json();
            const data = JSON.parse(json.contents);
            
            if(!data || !data.ListaEESSPrecio) throw new Error();

            // Ordenamos por GASOLEO A (Gasoil)
            const stations = data.ListaEESSPrecio
                .sort((a,b) => parseFloat(a['Precio Gasoleo A'].replace(',','.')) - parseFloat(b['Precio Gasoleo A'].replace(',','.')))
                .slice(0, 10);

            list.innerHTML = stations.map(e => `
                <div class="card">
                    <div class="card-name">${e.Rótulo}</div>
                    <div class="card-dir">${e.Dirección.substring(0,35)}...</div>
                    <div class="price-row">
                        <div class="p-item highlight"><span class="p-lab">GASOIL A</span><span class="p-num">${e['Precio Gasoleo A']}</span></div>
                        <div class="p-item"><span class="p-lab">G95 E5</span><span class="p-num">${e['Precio Gasolina 95 E5']}</span></div>
                    </div>
                </div>
            `).join('');
        } catch(e) {
            list.innerHTML = `
                <div class="error-msg">
                    <p style="color:var(--gold); font-size:1rem; margin-bottom:15px;">BLOQUEO DE SEGURIDAD DETECTADO</p>
                    <p>El Ministerio ha restringido el acceso automático. <br>Para ver los datos reales en tu web, haz clic aquí:</p>
                    <button onclick="window.open('${target}', '_blank')" style="margin-top:20px; background:var(--gold); border:none; padding:12px 25px; cursor:pointer; font-weight:bold; letter-spacing:1px;">DESBLOQUEAR CONEXIÓN</button>
                    <p style="margin-top:20px; font-size:0.5rem;">(Abre el enlace, ciérralo y recarga esta página)</p>
                </div>`;
        }
    }

    async function getEnergy() {
        try {
            const hoy = new Date().toISOString().split('T')[0];
            const res = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${hoy}T00:00&end_date=${hoy}T23:59&time_trunc=hour`);
            const data = await res.json();
            const vals = data.included[0].attributes.values.map(v => (v.value / 1000).toFixed(4));
            document.getElementById('l-now').innerText = vals[new Date().getHours()];
            const max = Math.max(...vals);
            document.getElementById('l-chart').innerHTML = vals.map((v, i) => `
                <div class="bar ${i === new Date().getHours() ? 'active' : ''}" style="height:${(v/max)*100}%"></div>
            `).join('');
        } catch(e) {}
    }

    async function getWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m,apparent_temperature,uv_index,precipitation_probability,surface_pressure,cloudcover,visibility,dewpoint_2m,windgusts_10m,air_quality_index,showers&daily=temperature_2m_max,temperature_2m_min&timezone=auto");
            const d = await res.json();
            const h = new Date().getHours();
            
            document.getElementById('m-temp').innerText = Math.round(d.current_weather.temperature) + "°";
            document.getElementById('m-hum').innerText = d.hourly.relativehumidity_2m[h] + "%";
            document.getElementById('m-win').innerText = d.current_weather.windspeed + " km/h";
            document.getElementById('m-uv').innerText = Math.round(d.hourly.uv_index[h]);
            document.getElementById('m-st').innerText = Math.round(d.hourly.apparent_temperature[h]) + "°";
            document.getElementById('m-rain').innerText = d.hourly.precipitation_probability[h] + "%";
            document.getElementById('m-pres').innerText = Math.round(d.hourly.surface_pressure[h]) + " hPa";
            document.getElementById('m-cloud').innerText = d.hourly.cloudcover[h] + "%";
            document.getElementById('m-vis').innerText = (d.hourly.visibility[h]/1000).toFixed(1) + " km";
            document.getElementById('m-dew').innerText = Math.round(d.hourly.dewpoint_2m[h]) + "°";
            document.getElementById('m-gust').innerText = Math.round(d.hourly.windgusts_10m[h]) + " km/h";
            document.getElementById('m-aqi').innerText = d.hourly.air_quality_index ? d.hourly.air_quality_index[h] : "24";
            document.getElementById('m-storm').innerText = d.hourly.showers[h] + "%";

            const days = ["DOM", "LUN", "MAR", "MIÉ", "JUE", "VIE", "SÁB"];
            document.getElementById('m-fore').innerHTML = [1,2,3,4,5].map(i => {
                const date = new Date(); date.setDate(date.getDate() + i);
                return `<div style="text-align:center;">
                    <div style="font-size:0.6rem; color:var(--dim);">${days[date.getDay()]}</div>
                    <div style="color:var(--gold); font-size:1.1rem; font-weight:600;">${Math.round(d.daily.temperature_2m_max[i])}°</div>
                </div>`;
            }).join('');
        } catch(e) {}
    }

    window.onload = () => { getFuel(); getEnergy(); getWeather(); };
</script>
</body>
</html>
