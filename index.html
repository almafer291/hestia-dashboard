<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA v33.000 | OMNI-SHIELD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000; --surf: #050505; --acc: #D4AF37; 
            --bor: #121212; --txt: #FFF; --dim: #555;
            --ok: #2D5A27; --warn: #D4AF37; --bad: #8B2A2A;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        aside { width: 70px; border-right: 1px solid var(--bor); display: flex; flex-direction: column; align-items: center; padding: 25px 0; background: #000; z-index: 100; }
        .fire-icon { font-size: 2.2rem; color: var(--acc); margin-bottom: 40px; animation: firePulse 2s infinite ease-in-out; }
        @keyframes firePulse { 0%, 100% { filter: drop-shadow(0 0 2px var(--acc)); transform: scale(1); } 50% { filter: drop-shadow(0 0 15px var(--acc)); transform: scale(1.1); } }
        nav { display: flex; flex-direction: column; gap: 28px; }
        .nav-bt { color: var(--dim); cursor: pointer; font-size: 1.6rem; transition: 0.3s; }
        .nav-bt.active { color: var(--acc); }

        main { flex: 1; overflow-y: auto; padding: 20px; background: #000; }
        .view { display: none; }
        .view.active { display: block; animation: viewIn 0.6s ease; }
        @keyframes viewIn { from { opacity: 0; } to { opacity: 1; } }

        .g { display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px; }
        .c { background: var(--surf); border: 1px solid var(--bor); padding: 18px; }
        .t { font-family: 'JetBrains Mono'; font-size: 0.55rem; color: var(--acc); letter-spacing: 3px; text-transform: uppercase; border-bottom: 1px solid #111; padding-bottom: 8px; margin-bottom: 15px; display: block; }
        .v { font-size: 3.8rem; font-weight: 100; color: #fff; line-height: 1; letter-spacing: -3px; }
        .s { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; margin-top: 5px; display: block; font-weight: 800; }
        .r { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 0.65rem; padding: 6px 0; border-bottom: 1px solid #0d0d0d; color: #888; }
        .r b { color: #fff; font-weight: 400; }

        .aqi-card { background: #030303; border: 1px solid #0d0d0d; padding: 10px; text-align: center; }
        .aqi-bar-bg { width: 100%; height: 2px; background: #111; margin-top: 8px; }
        .aqi-bar-fill { height: 100%; transition: 1.5s; }

        .gas-scroll { max-height: 400px; overflow-y: auto; border: 1px solid #111; }
        table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono'; font-size: 0.65rem; }
        th { text-align: left; color: var(--acc); padding: 12px; border-bottom: 1px solid var(--bor); position: sticky; top: 0; background: #050505; }
        td { padding: 10px; border-bottom: 1px solid #080808; }
    </style>
</head>
<body>

<aside>
    <i class="ph-fill ph-fire fire-icon"></i>
    <nav>
        <div class="nav-bt active" onclick="sh('meteo', this)"><i class="ph-duotone ph-broadcast"></i></div>
        <div class="nav-bt" onclick="sh('power', this)"><i class="ph-duotone ph-lightning"></i></div>
    </nav>
</aside>

<main>
    <div id="meteo" class="view active">
        <div class="g">
            <div class="c" style="grid-column: span 9;">
                <span class="t">Global Atmos Node | Almería v33.000</span>
                <div style="display:flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
                    <div><div class="v" id="wt">--°</div><span class="s">Temperatura</span></div>
                    <div style="text-align:center"><div class="v" id="wv" style="font-size:2.4rem">-- km/h</div><span class="s" id="wd">Sinc...</span></div>
                    <div style="text-align:right"><div class="v" id="wh" style="font-size:2.4rem">--%</div><span class="s">Humedad</span></div>
                </div>
                <span class="t">Air Quality Chromatics</span>
                <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 8px;" id="aqi-container"></div>
            </div>
            <div class="c" style="grid-column: span 3;">
                <span class="t">Critical Physics</span>
                <div class="r">UVI Máx Hoy <b id="w-uvmax" style="color:var(--acc)">--</b></div>
                <div class="r">Olivo <b id="pol-ol">--</b></div>
                <div class="r">Gramíneas <b id="pol-gr">--</b></div>
                <canvas id="tempChart" style="max-height:80px; margin-top:15px;"></canvas>
            </div>
        </div>
    </div>

    <div id="power" class="view">
        <div class="g">
            <div class="c" style="grid-column: span 12; display:flex; justify-content: space-around; text-align:center;">
                <div><span class="t">PVPC HOY (€/kWh)</span><div class="v" id="p-now" style="color:var(--acc)">--</div></div>
                <div><span class="t">Mín / Máx</span><div class="v" id="p-range" style="font-size:2rem;">-- / --</div></div>
            </div>
            <div class="c" style="grid-column: span 12;"><canvas id="pChart" style="max-height:160px;"></canvas></div>
            <div class="c" style="grid-column: span 12;">
                <span class="t">Censo de Estaciones (Firebase Sync)</span>
                <div class="gas-scroll">
                    <table>
                        <thead><tr><th>ESTACIÓN</th><th>UBICACIÓN</th><th>G95</th><th>GA</th></tr></thead>
                        <tbody id="f-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 1. CONFIGURACIÓN FIREBASE
    const firebaseConfig = { 
        apiKey: "AIzaSyAhKc7R97_ph2VQOq-uLMXFv-Wnyy0srXw", 
        projectId: "hestia-31da3", 
        appId: "1:577704397868:web:e83026e730640a0bc1d589" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const LAT = 36.83, LON = -2.46;
    const REFRESH_INTERVAL = 30 * 60 * 1000; // 30 Minutos

    // --- MOTOR DE SINCRONIZACIÓN ---
    async function syncData() {
        const docRef = doc(db, "global", "master_data");
        const snap = await getDoc(docRef);
        const now = Date.now();

        if (!snap.exists() || (now - snap.data().lastUpdate > REFRESH_INTERVAL)) {
            console.log("🔄 Datos antiguos o inexistentes. Sincronizando APIs...");
            try {
                // Fetch Meteo
                const m = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current_weather=true&hourly=temperature_2m,relativehumidity_2m&daily=uv_index_max&timezone=auto`).then(r=>r.json());
                // Fetch Air
                const q = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${LAT}&longitude=${LON}&hourly=pm10,pm2_5,nitrogen_dioxide,ozone,olive_pollen,grass_pollen`).then(r=>r.json());
                // Fetch Electricidad
                const hoy = new Date().toISOString().split('T')[0];
                const er = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${hoy}T00:00&end_date=${hoy}T23:59&time_trunc=hour`).then(r=>r.json());
                const ev = er.included[0].attributes.values.map(x => x.value / 1000);

                await setDoc(docRef, {
                    meteo: m,
                    air: q,
                    power: { precios: ev, min: Math.min(...ev), max: Math.max(...ev) },
                    lastUpdate: now
                });
            } catch (e) { console.error("Error en Sync:", e); }
        }
    }

    // --- RENDERIZADO DE INTERFAZ ---
    function updateUI(data) {
        const h = new Date().getHours();
        const { meteo, air, power } = data;

        // Actualizar Textos Meteo
        document.getElementById('wt').innerText = Math.round(meteo.current_weather.temperature) + "°";
        document.getElementById('wv').innerText = meteo.current_weather.windspeed + " km/h";
        document.getElementById('wh').innerText = meteo.hourly.relativehumidity_2m[h] + "%";
        document.getElementById('wd').innerText = meteo.current_weather.winddirection > 130 ? "LEVANTE" : "PONIENTE";
        document.getElementById('w-uvmax').innerText = meteo.daily.uv_index_max[0];
        document.getElementById('pol-ol').innerText = air.hourly.olive_pollen[h] || 0;
        document.getElementById('pol-gr').innerText = air.hourly.grass_pollen[h] || 0;

        // AQI Bars
        const aKeys = [{k:'pm2_5',l:'PM2.5',m:50},{k:'pm10',l:'PM10',m:100},{k:'nitrogen_dioxide',l:'NO2',m:200},{k:'ozone',l:'O3',m:180}];
        document.getElementById('aqi-container').innerHTML = aKeys.map(a => {
            const val = air.hourly[a.k][h]; 
            const p = Math.min((val/a.m)*100, 100);
            const c = p > 70 ? 'var(--bad)' : p > 30 ? 'var(--warn)' : 'var(--ok)';
            return `<div class="aqi-card"><span style="font-size:0.5rem; color:#555">${a.l}</span><br><b style="color:${c}">${val}</b><div class="aqi-bar-bg"><div class="aqi-bar-fill" style="width:${p}%; background:${c}"></div></div></div>`;
        }).join('');

        // Power
        document.getElementById('p-now').innerText = power.precios[h].toFixed(4);
        document.getElementById('p-range').innerText = `${power.min.toFixed(4)} / ${power.max.toFixed(4)}`;

        // Gráficos
        renderCharts(meteo.hourly.temperature_2m.slice(0,24), power.precios);
    }

    let charts = {};
    function renderCharts(tempData, powerData) {
        if(charts.t) charts.t.destroy();
        if(charts.p) charts.p.destroy();

        charts.t = new Chart(document.getElementById('tempChart'), { 
            type:'line', data:{labels:tempData.map((_,i)=>i), datasets:[{data:tempData, borderColor:'#D4AF37', tension:0.4, pointRadius:0}]}, 
            options:{plugins:{legend:{display:false}}, scales:{x:{display:false}, y:{display:false}}}}
        );
        charts.p = new Chart(document.getElementById('pChart'), { 
            type:'bar', data:{labels:powerData.map((_,i)=>i), datasets:[{data:powerData, backgroundColor:powerData.map(x=>x>0.15?'#8B2A2A':(x<0.08?'#2D5A27':'#D4AF37'))}]}, 
            options:{plugins:{legend:{display:false}}, scales:{y:{grid:{color:'#111'}}, x:{display:false}}}}
        );
    }

    // --- ESCUCHADORES REALTIME ---
    
    // Escuchar datos globales (Meteo/Luz)
    onSnapshot(doc(db, "global", "master_data"), (s) => {
        if (s.exists()) updateUI(s.data());
    });

    // Escuchar datos de Fuel (Tu colección existente)
    onSnapshot(doc(db, "market", "fuel"), (s) => {
        const d = s.data();
        if(d?.stations) {
            document.getElementById('f-body').innerHTML = d.stations.slice(0,30).map(x => `
                <tr>
                    <td>${x['Rótulo']}</td>
                    <td style="font-size:0.5rem; color:#444;">${x['Dirección']}</td>
                    <td style="color:var(--acc)">${x['Precio Gasolina 95 E5']}</td>
                    <td>${x['Precio Gasoleo A']}</td>
                </tr>
            `).join('');
        }
    });

    // Navegación
    window.sh = (id, bt) => {
        document.querySelectorAll('.view, .nav-bt').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); bt.classList.add('active');
    };

    // Inicio
    syncData();
</script>
</body>
</html>
