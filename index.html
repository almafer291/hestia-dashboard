<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA PRO | v1700</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #000;
            --surface: #0A0A0A;
            --accent: #D4AF37; 
            --border: #181818;
            --text: #FFF;
            --text-dim: #444;
            --ev-low: #2D5A27; --ev-mid: #8B732A; --ev-high: #944D25; --ev-peak: #8B2A2A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* NAVEGACIÓN RESPONSIVE */
        aside { width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 20px; transition: 0.3s; }
        
        @media (max-width: 900px) {
            body { flex-direction: column; }
            aside { width: 100%; height: 70px; border-right: none; border-bottom: 1px solid var(--border); padding: 10px; flex-direction: row; align-items: center; justify-content: space-between; position: fixed; top: 0; z-index: 100; }
            .brand { margin-bottom: 0 !important; display: flex; align-items: center; gap: 10px; }
            .hestia-txt { margin-top: 0 !important; font-size: 0.7rem !important; }
            nav { flex-direction: row !important; gap: 5px !important; }
            .nav-item { padding: 8px !important; font-size: 0.55rem !important; }
            main { padding: 90px 20px 40px 20px !important; }
        }

        .brand { text-align: center; margin-bottom: 40px; }
        .hestia-txt { font-weight: 600; font-size: 0.9rem; color: var(--accent); letter-spacing: 5px; text-transform: uppercase; margin-top: 10px; display: block; }
        nav { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .nav-item { display: flex; align-items: center; gap: 10px; color: var(--text-dim); padding: 15px; border-radius: 8px; cursor: pointer; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { color: var(--accent); background: rgba(212, 175, 55, 0.05); }

        /* MAIN */
        main { flex: 1; overflow-y: auto; padding: 40px 60px; scroll-behavior: smooth; }
        .panel { display: none; }
        .panel.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* GRID BENTO */
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; margin-bottom: 20px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 4px; }
        .c-tit { font-size: 0.55rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .c-val { font-size: 2.2rem; font-weight: 100; color: #fff; }
        .c-sub { font-size: 0.6rem; color: var(--text-dim); margin-top: 5px; font-weight: 700; text-transform: uppercase; }

        /* BRÚJULA PRO */
        .compass-aero { width: 100px; height: 100px; border: 1px solid #222; border-radius: 50%; position: relative; margin: 0 auto; background: radial-gradient(circle, #080808 0%, #000 70%); box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.05); }
        .compass-aero::before { content: 'N'; position: absolute; top: 5px; left: 47%; font-size: 0.5rem; color: var(--accent); font-weight: 900; }
        .needle-pro { position: absolute; top: 15%; left: 49%; width: 2px; height: 35%; background: linear-gradient(to bottom, var(--accent), transparent); border-radius: 2px; transform-origin: 50% 100%; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); }

        /* CHART CON EJE X */
        .chart-box { grid-column: span 12; padding: 25px; background: #020202; }
        .bars { display: flex; align-items: flex-end; gap: 5px; height: 140px; margin-top: 10px; }
        .bar { flex: 1; border-radius: 1px 1px 0 0; position: relative; min-width: 12px; }
        .x-axis { display: flex; justify-content: space-between; margin-top: 10px; color: var(--text-dim); font-size: 0.5rem; font-weight: 700; padding: 0 5px; }

        /* GASOLINERAS */
        .f-name { font-size: 1.2rem; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .card { grid-column: span 1 !important; }
            .c-val { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<aside>
    <div class="brand"><i class="ph-fill ph-fire" style="font-size: 1.8rem; color: var(--accent);"></i><span class="hestia-txt">Hestia</span></div>
    <nav>
        <div class="nav-item active" onclick="tab('clima', this)"><i class="ph-duotone ph-thermometer-hot"></i><span>Clima</span></div>
        <div class="nav-item" onclick="tab('energia', this)"><i class="ph-duotone ph-lightning"></i><span>Energía</span></div>
        <div class="nav-item" onclick="tab('fuel', this)"><i class="ph-duotone ph-gas-pump"></i><span>Mercado</span></div>
    </nav>
</aside>

<main>
    <div id="clima" class="panel active">
        <div class="grid">
            <div class="card" style="grid-column: span 12; background: linear-gradient(to right, #080808, #000); border-left: 3px solid var(--accent);">
                <span class="c-tit"><i class="ph-bold ph-map-pin"></i>Estado Actual Almería</span>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div><div class="c-val" style="font-size: 4rem;" id="w-temp">--°</div><p class="c-sub" id="w-desc">ACTUALIZANDO...</p></div>
                    <div class="compass-aero"><div class="needle-pro" id="w-needle"></div></div>
                </div>
            </div>
            
            <div class="card" style="grid-column: span 4;"><span class="c-tit"><i class="ph-bold ph-drop"></i>Humedad</span><div class="c-val" id="w-hum">--%</div></div>
            <div class="card" style="grid-column: span 4;"><span class="c-tit"><i class="ph-bold ph-wind"></i>Viento</span><div class="c-val" id="w-win">--<small style="font-size: 0.7rem;">km/h</small></div></div>
            <div class="card" style="grid-column: span 4;"><span class="c-tit"><i class="ph-bold ph-sun"></i>UV</span><div class="c-val" id="w-uv">--</div></div>
            
            <div class="card" style="grid-column: span 3;"><span class="c-tit">Visibilidad</span><div class="c-val" style="font-size: 1.2rem;" id="w-vis">-- km</div></div>
            <div class="card" style="grid-column: span 3;"><span class="c-tit">Presión</span><div class="c-val" style="font-size: 1.2rem;" id="w-pres">-- hPa</div></div>
            <div class="card" style="grid-column: span 3;"><span class="c-tit">Pto. Rocío</span><div class="c-val" style="font-size: 1.2rem;" id="w-dew">--°</div></div>
            <div class="card" style="grid-column: span 3;"><span class="c-tit">Nubes</span><div class="c-val" style="font-size: 1.2rem;" id="w-cloud">--%</div></div>

            <div class="card" style="grid-column: span 12;"><span class="c-tit"><i class="ph-bold ph-atom"></i>Calidad del Aire (Partículas)</span>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px;">
                    <div style="border-left: 1px solid #111; padding-left: 10px;"><small class="c-tit">PM2.5</small><p id="aq-pm2" style="font-weight: 600;">--</p></div>
                    <div style="border-left: 1px solid #111; padding-left: 10px;"><small class="c-tit">Ozono O3</small><p id="aq-o3" style="font-weight: 600;">--</p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="energia" class="panel">
        <div class="grid">
            <div class="card chart-box">
                <span class="c-tit"><i class="ph-bold ph-graph"></i>Curva de Precios (€/kWh)</span>
                <div class="bars" id="e-bars"></div>
                <div class="x-axis"><span>00h</span><span>06h</span><span>12h</span><span>18h</span><span>23h</span></div>
            </div>
            <div class="card" style="grid-column: span 6;"><span class="c-tit">Ahorro vs Media</span><div class="c-val" id="e-diff">--%</div></div>
            <div class="card" style="grid-column: span 6; border-left: 2px solid var(--accent);"><span class="c-tit">Precio Actual</span><div class="c-val" style="color: var(--accent);" id="e-now">--</div></div>
        </div>
    </div>

    <div id="fuel" class="panel">
        <div class="grid" id="f-grid"></div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhKc7R97_ph2VQOq-uLMXFv-Wnyy0srXw", projectId: "hestia-31da3", appId: "1:577704397868:web:e83026e730640a0bc1d589" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // GASOLINERAS GOLD
    onSnapshot(doc(db, "market", "fuel"), (snap) => {
        const data = snap.data();
        if (data?.stations) {
            const sorted = data.stations.filter(s => s['Precio Gasolina 95 E5']).sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.'))).slice(0, 8);
            document.getElementById('f-grid').innerHTML = sorted.map(s => `
                <div class="card" style="grid-column: span 6;">
                    <div class="f-name">${s['Rótulo']}</div>
                    <p style="font-size:0.55rem; color:#444; margin-bottom:12px;">${s['Dirección']}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div><small class="c-tit">G95</small><b style="font-size:1.4rem;">${s['Precio Gasolina 95 E5']}€</b></div>
                        <div style="text-align:right"><small class="c-tit">DIESEL</small><b style="font-size:1.4rem; color:#fff;">${s['Precio Gasoleo A']}€</b></div>
                    </div>
                </div>
            `).join('');
        }
    });

    // CLIMA PRO
    async function getW() {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=pm2_5,ozone,relativehumidity_2m,surface_pressure,dewpoint_2m,cloudcover,visibility,uv_index&timezone=auto").then(r => r.json());
        const h = new Date().getHours();
        
        document.getElementById('w-temp').innerText = Math.round(res.current_weather.temperature) + "°";
        document.getElementById('w-hum').innerText = res.hourly.relativehumidity_2m[h] + "%";
        document.getElementById('w-win').innerText = res.current_weather.windspeed;
        document.getElementById('w-uv').innerText = res.hourly.uv_index[h];
        document.getElementById('w-vis').innerText = (res.hourly.visibility[h]/1000).toFixed(1);
        document.getElementById('w-pres').innerText = Math.round(res.hourly.surface_pressure[h]);
        document.getElementById('w-dew').innerText = Math.round(res.hourly.dewpoint_2m[h]);
        document.getElementById('w-cloud').innerText = res.hourly.cloudcover[h];
        document.getElementById('aq-pm2').innerText = (res.hourly.pm2_5[h] || 1.4) + " µg/m³";
        document.getElementById('aq-o3').innerText = (res.hourly.ozone[h] || 52) + " µg/m³";
        document.getElementById('w-needle').style.transform = `rotate(${res.current_weather.winddirection}deg)`;
        
        const codes = { 0: "CIELO DESPEJADO", 1: "LIGERAS NUBES", 3: "CUBIERTO", 61: "LLUVIA DÉBIL" };
        document.getElementById('w-desc').innerText = codes[res.current_weather.weathercode] || "CONDICIONES ESTABLES";
    }

    // ENERGIA
    async function getE() {
        const hoy = new Date().toISOString().split('T')[0];
        const res = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${hoy}T00:00&end_date=${hoy}T23:59&time_trunc=hour`).then(r => r.json());
        const prices = res.included[0].attributes.values.map(v => v.value / 1000);
        const h = new Date().getHours();
        const current = prices[h], max = Math.max(...prices), avg = prices.reduce((a,b)=>a+b)/24;

        document.getElementById('e-now').innerText = current.toFixed(4) + " €";
        const diff = (((current - avg) / avg) * 100).toFixed(1);
        document.getElementById('e-diff').innerText = (diff > 0 ? "+" : "") + diff;

        document.getElementById('e-bars').innerHTML = prices.map((p, i) => {
            let color = "var(--ev-mid)";
            if (p === Math.min(...prices)) color = "var(--ev-low)";
            else if (p === max) color = "var(--ev-peak)";
            else if (p < avg) color = "var(--accent)";
            return `<div class="bar" style="height:${(p/max)*100}%; background:${color}; opacity:${i === h ? '1' : '0.4'}"></div>`;
        }).join('');
    }

    window.tab = (id, btn) => {
        document.querySelectorAll('.panel, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    getW(); getE();
</script>
</body>
</html>
