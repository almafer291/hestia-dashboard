<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA v120 | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #030303; --card: #0a0a0a; --brd: rgba(197, 160, 89, 0.2); --txt: #ececec; --dim: #555; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--txt); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        nav { width: 80px; border-right: 1px solid var(--brd); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #000; flex-shrink: 0; }
        .logo-box { margin-bottom: 50px; text-align: center; }
        .llama-svg { width: 30px; height: 35px; fill: none; stroke: var(--gold); stroke-width: 1.5; }
        .n-btn { background: none; border: none; color: var(--dim); cursor: pointer; margin-bottom: 50px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase; transition: 0.3s; }
        .n-btn.active { color: var(--gold); font-weight: 800; border-left: 2px solid var(--gold); }

        /* Main */
        main { flex: 1; padding: 40px; overflow-y: auto; background: #030303; }
        .panel { display: none; max-width: 1100px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-size: 0.65rem; color: var(--dim); letter-spacing: 6px; text-transform: uppercase; margin-bottom: 30px; border-bottom: 1px solid var(--brd); padding-bottom: 10px; }
        h1 b { color: var(--gold); }

        /* Fuel Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--brd); padding: 20px; }
        .card-name { font-size: 0.8rem; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .card-dir { font-size: 0.5rem; color: var(--dim); text-transform: uppercase; margin-bottom: 15px; }
        .price-box { display: flex; justify-content: space-between; background: #000; padding: 12px; border: 1px solid #111; border-left: 3px solid var(--gold); }
        .p-num { font-size: 1.4rem; color: var(--gold); font-family: monospace; }

        /* Weather 12 */
        .w-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .w-item { background: #070707; border: 1px solid var(--brd); padding: 15px; text-align: center; }
        .w-val { display: block; font-size: 1.1rem; color: var(--gold); margin-top: 5px; }
        .temp-big { font-size: 8rem; font-weight: 100; color: var(--gold); letter-spacing: -5px; line-height: 1; }
    </style>
</head>
<body>

<nav>
    <div class="logo-box">
        <svg class="llama-svg" viewBox="0 0 24 24">
            <path d="M12 2C12 2 7 7 7 12C7 14.76 9.24 17 12 17C14.76 17 17 14.76 17 12C17 7 12 2 12 2Z" />
            <path d="M12 14C13.1 14 14 13.1 14 12C14 10 12 8 12 8C12 8 10 10 10 12C10 13.1 10.9 14 12 14Z" stroke-width="0.8" />
        </svg>
    </div>
    <button onclick="tab('g', this)" class="n-btn active">GASOIL</button>
    <button onclick="tab('m', this)" class="n-btn">CLIMA</button>
</nav>

<main>
    <div id="g" class="panel active">
        <h1>GASOIL A <b>ALMERÍA</b></h1>
        <div id="fuel-list" class="grid">Cargando datos reales...</div>
    </div>

    <div id="m" class="panel">
        <h1>WEATHER <b>OBSERVATORY</b></h1>
        <div id="m-temp-big" class="temp-big">--°</div>
        <div id="w-grid" class="w-grid"></div>
    </div>
</main>

<script>
    function tab(id, btn) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // --- FUEL SIN FILTROS (MÉTODO DIRECTO) ---
    async function getFuel() {
        const list = document.getElementById('fuel-list');
        try {
            // Usamos un proxy que no añade cabeceras prohibidas y funciona en Vercel
            const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroMunicipio/04013'));
            const data = await response.json();
            const contents = JSON.parse(data.contents);
            
            const stations = contents.ListaEESSPrecio
                .sort((a,b) => parseFloat(a['Precio Gasoleo A'].replace(',','.')) - parseFloat(b['Precio Gasoleo A'].replace(',','.')))
                .slice(0, 9);

            list.innerHTML = stations.map(e => `
                <div class="card">
                    <div class="card-name">${e.Rótulo}</div>
                    <div class="card-dir">${e.Dirección}</div>
                    <div class="price-box">
                        <span style="font-size:0.5rem; color:var(--dim);">GASOIL A</span>
                        <span class="p-num">${e['Precio Gasoleo A']}€</span>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            list.innerHTML = `<div class="card" style="grid-column: 1/-1; border-color: red;">Error de conexión. Reintentando...</div>`;
            setTimeout(getFuel, 5000);
        }
    }

    // --- CLIMA 12 DATOS (ESTRUCTURA ROBUSTA) ---
    async function getWeather() {
        const grid = document.getElementById('w-grid');
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m,apparent_temperature,uv_index,precipitation_probability,surface_pressure,cloudcover,visibility,dewpoint_2m,windgusts_10m,air_quality_index,showers&timezone=auto");
            const d = await res.json();
            const h = new Date().getHours();
            
            document.getElementById('m-temp-big').innerText = Math.round(d.current_weather.temperature) + "°";

            const metrics = [
                { label: "HUMEDAD", val: d.hourly.relativehumidity_2m[h] + "%" },
                { label: "VIENTO", val: d.current_weather.windspeed + "km/h" },
                { label: "UV", val: Math.round(d.hourly.uv_index[h]) },
                { label: "SENSACIÓN", val: Math.round(d.hourly.apparent_temperature[h]) + "°" },
                { label: "PRECIP %", val: d.hourly.precipitation_probability[h] + "%" },
                { label: "PRESIÓN", val: Math.round(d.hourly.surface_pressure[h]) + "hPa" },
                { label: "NUBES", val: d.hourly.cloudcover[h] + "%" },
                { label: "VISIBILIDAD", val: (d.hourly.visibility[h]/1000).toFixed(1) + "km" },
                { label: "P. ROCÍO", val: Math.round(d.hourly.dewpoint_2m[h]) + "°" },
                { label: "RÁFAGAS", val: Math.round(d.hourly.windgusts_10m[h]) + "km/h" },
                { label: "AIRE", val: d.hourly.air_quality_index ? d.hourly.air_quality_index[h] : "Limpio" },
                { label: "TORMENTA", val: d.hourly.showers[h] + "%" }
            ];

            grid.innerHTML = metrics.map(m => `
                <div class="w-item">
                    <div style="font-size:0.45rem; color:var(--dim); letter-spacing:1px;">${m.label}</div>
                    <div class="w-val">${m.val}</div>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    window.onload = () => { getFuel(); getWeather(); };
</script>
</body>
</html>
