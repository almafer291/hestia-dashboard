<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA v165 | Aeterna Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; --gold-dim: #a68a2c; 
            --bronze: #ff8c42; 
            --glow: rgba(255, 140, 66, 0.3);
            --bg: #050505; --card: #0f0f0f; --txt: #ffffff; --dim: #666;
            --green: #00ff88; --red: #ff3344; --brd: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        nav { width: 280px; background: #000; border-right: 1px solid var(--brd); display: flex; flex-direction: column; padding: 40px 25px; flex-shrink: 0; }
        .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 60px; }
        
        /* LLAMA HUECA BRONCE */
        .llama-contorno { width: 40px; height: 40px; filter: drop-shadow(0 0 8px var(--glow)); }
        .llama-contorno path { stroke: var(--bronze); stroke-width: 1.5; fill: none; stroke-linecap: round; }

        .brand h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; letter-spacing: 4px; font-weight: 700; }

        .n-btn { background: none; border: none; color: var(--dim); cursor: pointer; padding: 15px 20px; text-align: left; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; border-radius: 12px; margin-bottom: 8px; font-weight: 600; }
        .n-btn:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .n-btn.active { color: var(--gold); background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%); box-shadow: inset 4px 0 0 var(--gold); }

        /* MAIN */
        main { flex: 1; padding: 50px; overflow-y: auto; background: radial-gradient(circle at 0% 0%, #151515 0%, #050505 100%); }
        .panel { display: none; animation: fadeIn 0.5s ease-out; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .section-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 700; line-height: 1; margin-bottom: 40px; }
        .section-title b { color: var(--gold); font-style: italic; }

        /* BENTO GRID */
        .bento { display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px; }
        .tile { background: var(--card); border: 1px solid var(--brd); border-radius: 25px; padding: 30px; transition: 0.4s; }
        .tile:hover { border-color: var(--gold); transform: translateY(-3px); }

        .t-lbl { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; color: var(--gold-dim); margin-bottom: 15px; display: block; font-weight: 800; }
        .t-val { font-size: 2.8rem; font-weight: 800; color: #fff; line-height: 1; }
        .t-unit { font-size: 0.8rem; color: var(--dim); margin-left: 5px; }

        /* ENERGY */
        .tile-full { grid-column: span 6; }
        .chart { display: flex; align-items: flex-end; justify-content: space-between; height: 160px; gap: 4px; margin-top: 25px; }
        .bar { flex: 1; background: #1a1a1a; border-radius: 3px; transition: 0.5s; position: relative; }
        .bar.active { background: var(--gold); box-shadow: 0 0 15px var(--gold); }

        /* FUEL TABLE */
        .f-table { width: 100%; border-collapse: collapse; }
        .f-table td { padding: 15px 0; border-bottom: 1px solid var(--brd); }
        .f-name { font-weight: 600; font-size: 0.9rem; display: block; color: #fff; }
        .f-addr { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; }
        .f-price { font-family: monospace; font-weight: 800; color: var(--gold); font-size: 1.3rem; text-align: right; }
    </style>
</head>
<body>

<nav>
    <div class="brand">
        <svg class="llama-contorno" viewBox="0 0 24 24">
            <path d="M12 2C12 2 7 7.5 7 13.5C7 16.5 9.24 19 12 19C14.76 19 17 16.5 17 13.5C17 7.5 12 2 12 2Z" />
            <path d="M12 7C12 7 10 9.5 10 12.5C10 13.88 11.12 15 12.5 15" />
        </svg>
        <h1>HESTIA</h1>
    </div>
    <button onclick="tab('m', this)" class="n-btn active">Atmosphere</button>
    <button onclick="tab('l', this)" class="n-btn">Energy</button>
    <button onclick="tab('f', this)" class="n-btn">Fuel Market</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h2 class="section-title">Almería <b>Atmosphere</b></h2>
        <div class="bento">
            <div class="tile" style="grid-column: span 3; background: linear-gradient(45deg, #0f0f0f, #1a1a1a);">
                <span class="t-lbl">Temperatura</span>
                <div class="t-val" id="m-temp" style="font-size: 6rem;">--</div>
                <div id="m-desc" style="letter-spacing: 4px; color: var(--bronze); font-weight: 700; text-transform: uppercase; font-size: 0.7rem;">Sincronizando...</div>
            </div>
            <div class="tile"><span class="t-lbl">Humedad</span><div class="t-val" id="m-hum">--</div><span class="t-unit">%</span></div>
            <div class="tile"><span class="t-lbl">Viento</span><div class="t-val" id="m-win">--</div><span class="t-unit">km/h</span></div>
            <div class="tile"><span class="t-lbl">UV</span><div class="t-val" id="m-uv">--</div><span class="t-unit">Index</span></div>
        </div>
    </div>

    <div id="l" class="panel">
        <h2 class="section-title">Smart <b>Energy</b></h2>
        <div class="bento">
            <div class="tile tile-full">
                <span class="t-lbl">Precio PVPC Actual</span>
                <div class="t-val" id="l-now" style="color: var(--gold); font-size: 4rem;">--</div>
                <div class="chart" id="l-chart"></div>
            </div>
            <div class="tile"><span class="t-lbl">Mínimo Hoy</span><div class="t-val" id="l-min" style="color:var(--green)">--</div></div>
            <div class="tile"><span class="t-lbl">Máximo Hoy</span><div class="t-val" id="l-max" style="color:var(--red)">--</div></div>
        </div>
    </div>

    <div id="f" class="panel">
        <h2 class="section-title">Fuel <b>Sync</b></h2>
        <div class="bento">
            <div class="tile" style="grid-column: span 3;"><span class="t-lbl">Gasolina 95 E5</span><table class="f-table" id="table-95"></table></div>
            <div class="tile" style="grid-column: span 3;"><span class="t-lbl">Diésel A</span><table class="f-table" id="table-diesel"></table></div>
        </div>
    </div>
</main>

<script type="module">
    // INTEGRACIÓN FIREBASE CON TUS DATOS DE IMAGEN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAhKc7R97_ph2VQOq-uLMXFv-Wnyy0srXw",
        authDomain: "hestia-31da3.firebaseapp.com",
        projectId: "hestia-31da3",
        storageBucket: "hestia-31da3.firebasestorage.app",
        messagingSenderId: "577704397868",
        appId: "1:577704397868:web:e83026e730640a0bc1d589"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Escuchar cambios en la gasolina (Colección market, Documento fuel)
    onSnapshot(doc(db, "market", "fuel"), (snap) => {
        const data = snap.data();
        if (data && data.stations) {
            renderFuel(data.stations);
        }
    });

    function renderFuel(stations) {
        const fill = (id, key) => {
            const sorted = [...stations].sort((a,b) => parseFloat(a[key].replace(',','.')) - parseFloat(b[key].replace(',','.')));
            document.getElementById(id).innerHTML = sorted.slice(0, 5).map(e => `
                <tr>
                    <td><span class="f-name">${e['Rótulo']}</span><span class="f-addr">${e['Dirección']}</span></td>
                    <td class="f-price">${e[key]}</td>
                </tr>
            `).join('');
        };
        fill('table-95', 'Precio Gasolina 95 E5');
        fill('table-diesel', 'Precio Gasoleo A');
    }

    // Lógica de Tabs
    window.tab = (id, btn) => {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    // APIs Clima y Energía (Libres de CORS)
    async function loadData() {
        // Clima Almería
        const w = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m,uv_index&timezone=auto").then(r => r.json());
        const h = new Date().getHours();
        document.getElementById('m-temp').innerText = Math.round(w.current_weather.temperature) + "°";
        document.getElementById('m-hum').innerText = w.hourly.relativehumidity_2m[h];
        document.getElementById('m-win').innerText = Math.round(w.current_weather.windspeed);
        document.getElementById('m-uv').innerText = w.hourly.uv_index[h];
        document.getElementById('m-desc').innerText = "Cielo Despejado • Almería";

        // Energía REE
        const hoy = new Date().toISOString().split('T')[0];
        const e = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${hoy}T00:00&end_date=${hoy}T23:59&time_trunc=hour`).then(r => r.json());
        const prices = e.included[0].attributes.values.map(v => v.value / 1000);
        const nowH = new Date().getHours();
        document.getElementById('l-now').innerText = prices[nowH].toFixed(4) + "€";
        document.getElementById('l-min').innerText = Math.min(...prices).toFixed(4);
        document.getElementById('l-max').innerText = Math.max(...prices).toFixed(4);
        
        const max = Math.max(...prices);
        document.getElementById('l-chart').innerHTML = prices.map((p, i) => `
            <div class="bar ${i === nowH ? 'active' : ''}" style="height:${(p/max)*100}%"></div>
        `).join('');
    }

    loadData();
</script>
</body>
</html>
