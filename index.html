<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v39 | Almería Direct</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166,124,82,0.3); --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 70px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 40px 0; background: #080808; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 40px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.7rem; letter-spacing: 2px; }
        .n-btn.active { color: var(--bronce); font-weight: bold; }
        main { flex: 1; padding: 40px; overflow-y: auto; background: #000; }
        .panel { display: none; } .panel.active { display: block; }
        .card { background: #0a0a0a; border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .big { font-size: 5rem; font-weight: 100; margin: 0; color: #fff; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid #1a1a1a; }
        .price-tag { color: var(--bronce); font-weight: bold; font-family: monospace; font-size: 1.1rem; text-align: right; }
    </style>
</head>
<body>

<nav>
    <div style="color:var(--bronce); font-weight:bold; margin-bottom:50px;">v39</div>
    <button class="n-btn active" onclick="tab('m', this)">CLIMA</button>
    <button class="n-btn" onclick="tab('l', this)">LUZ</button>
    <button class="n-btn" onclick="tab('g', this)">FUEL</button>
    <button class="n-btn" onclick="tab('i', this)">IOT</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h1>Almería</h1>
        <div class="card">
            <div class="big" id="m-temp">--°</div>
            <p id="m-city" style="color:var(--bronce); letter-spacing:3px;">SINCRONIZANDO...</p>
        </div>
    </div>

    <div id="l" class="panel">
        <h1>Precio Luz (Directo)</h1>
        <div class="card">
            <div style="display:flex; justify-content:space-around; text-align:center; margin-bottom:20px;">
                <div><small>AHORA</small><br><b id="l-now" style="font-size:1.8rem; color:var(--bronce)">--</b></div>
                <div><small>MÍNIMO</small><br><b id="l-min" style="color:#00ff88">--</b></div>
            </div>
            <canvas id="c-luz" height="100"></canvas>
        </div>
    </div>

    <div id="g" class="panel">
        <h1>Gasolineras Almería</h1>
        <div class="card"><table id="g-table"><tr><td>Cargando datos regionales...</td></tr></table></div>
    </div>

    <div id="i" class="panel">
        <h1>Relés</h1>
        <div class="card">
            <button onclick="this.innerText='R1 ON'; this.style.color='#00ff88'" style="width:60px; height:60px; border-radius:50%; border:1px solid var(--border); background:none; color:#ff4444; cursor:pointer;">R1</button>
        </div>
    </div>
</main>

<script>
    function tab(id, b) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
        if(id==='m') loadM(); if(id==='l') loadL(); if(id==='g') loadG();
    }

    async function loadM() {
        const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.45&current_weather=true');
        const d = await r.json();
        document.getElementById('m-temp').innerText = Math.round(d.current_weather.temperature)+'°';
        document.getElementById('m-city').innerText = "ALMERÍA CAPITAL";
    }

    async function loadL() {
        try {
            // Usamos un proxy alternativo más rápido: CORS Proxy IO
            const r = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://api.preciodelaluz.org/v1/prices/all?zone=PCB'));
            const data = await r.json();
            const prices = Object.values(data).map(h => h.price/1000);
            const now = new Date().getHours();
            
            document.getElementById('l-now').innerText = prices[now].toFixed(4) + "€";
            document.getElementById('l-min').innerText = Math.min(...prices).toFixed(4) + "€";

            new Chart(document.getElementById('c-luz'), {
                type:'bar', data:{ labels: Array.from({length:24},(_,i)=>i+'h'), datasets:[{data:prices, backgroundColor:prices.map((p,i)=>i===now?'#a67c52':'#1a1a1a')}]},
                options:{plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}}}
            });
        } catch(e) { document.getElementById('l-now').innerText = "Error API"; }
    }

    async function loadG() {
        try {
            // Intentamos acceso directo a una fuente más ligera
            const r = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04'));
            const data = await r.json();
            const list = data.ListaEESSPrecio.filter(e => e.Municipio.toUpperCase()==="ALMERÍA").slice(0,8);
            
            document.getElementById('g-table').innerHTML = list.map(e => `
                <tr>
                    <td><b>${e['Rótulo']}</b><br><small style="color:#555">${e['Dirección'].toLowerCase()}</small></td>
                    <td class="price-tag">${e['Precio Gasolina 95 E5']}€</td>
                </tr>`).join('');
        } catch(e) { document.getElementById('g-table').innerHTML = "<tr><td>Error de Red Local.</td></tr>"; }
    }

    window.onload = loadM;
</script>
</body>
</html>
