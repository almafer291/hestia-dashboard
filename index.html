<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HestiaLake | Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bronce-deep: #7d4e24;
            --bronce-gold: #c5934c;
            --bronce-soft: #d9a06f;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(217, 160, 111, 0.2);
            --bg: #0a0a0b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #2a1d15 0%, #0a0a0b 80%);
            color: #e0e0e0; margin: 0; padding: 0; min-height: 100vh;
        }

        /* --- LOGO HESTIA LLAMA --- */
        .header { text-align: center; padding: 40px 20px; }
        .logo-container { width: 80px; height: 80px; margin: 0 auto 15px; filter: drop-shadow(0 0 10px var(--bronce-gold)); }
        .brand-title {
            font-family: 'Cinzel', serif; font-size: 2.8rem; margin: 0;
            background: linear-gradient(to bottom, #fff, var(--bronce-soft));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 6px;
        }

        /* --- NAVEGACIÓN --- */
        .nav-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .nav-btn {
            background: var(--glass); border: 1px solid var(--glass-border);
            color: var(--bronce-soft); padding: 10px 20px; border-radius: 20px;
            cursor: pointer; font-family: 'Cinzel', serif; transition: 0.3s;
        }
        .nav-btn.active { background: var(--bronce-deep); color: white; box-shadow: 0 0 15px rgba(125,78,36,0.5); }

        /* --- PANELES --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        .panel { display: none; animation: fadeIn 0.5s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--glass); border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; margin-bottom: 20px;
        }

        .big-data { font-size: 3rem; font-weight: 200; color: var(--bronce-gold); margin: 5px 0; }
        .gas-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 0; border-bottom: 1px solid rgba(217, 160, 111, 0.1); 
        }
        .gas-price { font-family: 'Cinzel', serif; font-size: 1.2rem; color: #fff; }
        .status-on { color: #50fa7b; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-container">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 5C50 5 85 35 85 65C85 84.33 69.33 100 50 100C30.67 100 15 84.33 15 65C15 35 50 5 50 5Z" fill="url(#g)" opacity="0.3"/>
            <path d="M50 25C50 25 75 50 75 70C75 83.81 63.81 95 50 95C36.19 95 25 83.81 25 70C25 50 50 25 50 25Z" fill="url(#g)"/>
            <path d="M50 45C50 45 60 60 60 75C60 80.52 55.52 85 50 85C44.48 85 40 80.52 40 75C40 60 50 45 50 45Z" fill="#fff" opacity="0.6"/>
            <defs><linearGradient id="g" x1="50" y1="5" x2="50" y2="100"><stop stop-color="#d9a06f"/><stop offset="1" stop-color="#7d4e24"/></linearGradient></defs>
        </svg>
    </div>
    <h1 class="brand-title">HESTIALAKE</h1>
</div>

<div class="nav-bar">
    <button class="nav-btn active" onclick="showPanel('meteo', this)">Clima</button>
    <button class="nav-btn" onclick="showPanel('energia', this)">Energía</button>
    <button class="nav-btn" onclick="showPanel('gas', this)">Combustible</button>
</div>

<div class="container">
    <div id="meteo" class="panel active">
        <div class="card">
            <h3 style="color:var(--bronce-soft)">Exterior Almería Capital</h3>
            <div id="temp-ext" class="big-data">--°C</div>
            <p id="desc-ext">SINCRONIZANDO...</p>
        </div>
        <div class="card">
            <h3 style="color:var(--bronce-soft)">Interior Hestia</h3>
            <div class="big-data">23.4°C</div>
            <p>Humedad Casa: 48%</p>
        </div>
    </div>

    <div id="energia" class="panel">
        <div class="card">
            <h3>Precio Luz Hoy (PVPC)</h3>
            <div id="price-luz" class="big-data">-- €</div>
            <p>COSTE ACTUAL POR KWh</p>
        </div>
        <div class="card">
            <h3>Relés Actuadores</h3>
            <div class="gas-row"><span>R1: Clima Salón</span> <span class="status-on">AUTO / ON</span></div>
            <div class="gas-row"><span>R2: Luces Terraza</span> <span>MANUAL / OFF</span></div>
        </div>
    </div>

    <div id="gas" class="panel">
        <div class="card">
            <h3>Top Gasolineras Almería Capital</h3>
            <div id="gas-list">Obteniendo datos oficiales...</div>
        </div>
    </div>
</div>

<script>
    function showPanel(id, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'gas') loadGas();
        if(id === 'energia') loadLuz();
        if(id === 'meteo') loadMeteo();
    }

    async function loadLuz() {
        try {
            const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.preciodelaluz.org/v1/prices/all?zone=PCB'));
            const data = JSON.parse((await res.json()).contents);
            const hour = new Date().getHours();
            const current = data[Object.keys(data)[hour]];
            document.getElementById('price-luz').innerText = (current.price / 1000).toFixed(4) + " €";
        } catch(e) { document.getElementById('price-luz').innerText = "Error API"; }
    }

    async function loadGas() {
        const list = document.getElementById('gas-list');
        try {
            const res = await fetch('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04');
            const data = await res.json();
            const capital = data.ListaEESSPrecio.filter(e => e.Municipio.toUpperCase() === "ALMERÍA")
                .sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.')))
                .slice(0, 10);

            list.innerHTML = capital.map(e => `
                <div class="gas-row">
                    <div><b>${e.Rotulo}</b><br><small>${e.Direccion}</small></div>
                    <div class="gas-price">${e['Precio Gasolina 95 E5']}€</div>
                </div>
            `).join('');
        } catch(e) { list.innerText = "Error API Gas"; }
    }

    async function loadMeteo() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.8381&longitude=-2.4597&current_weather=true');
            const data = await res.json();
            document.getElementById('temp-ext').innerText = data.current_weather.temperature + "°C";
            document.getElementById('desc-ext').innerText = "Viento: " + data.current_weather.windspeed + " km/h";
        } catch(e) {}
    }

    loadMeteo(); // Carga inicial
</script>
</body>
</html>
