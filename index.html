<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA v700 | Atelier Nero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #0A0A0A;
            --accent: #D4AF37; /* Bronce/Oro Kill Bill */
            --border: #1A1A1A;
            --text: #E0E0E0;
            --text-dim: #555555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* HEADER / LOGO */
        header {
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); background: var(--bg);
        }
        .logo-box { display: flex; align-items: center; gap: 12px; }
        .llama { color: var(--accent); font-size: 1.8rem; }
        .logo-text { font-weight: 800; letter-spacing: 2px; font-size: 1.1rem; text-transform: uppercase; }

        /* NAVEGACIÓN INFERIOR (ESTILO APP) */
        nav {
            position: fixed; bottom: 0; width: 100%; background: #050505;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid var(--border); z-index: 100;
        }
        .nav-item { color: var(--text-dim); font-size: 1.6rem; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }

        /* CONTENIDO PRINCIPAL */
        main { flex: 1; overflow-y: auto; padding: 20px 20px 100px 20px; }
        .panel { display: none; }
        .panel.active { display: block; }

        /* GRID TÉCNICO CLIMA */
        .weather-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .w-item { background: var(--surface); padding: 20px; display: flex; flex-direction: column; gap: 5px; }
        .w-item.full { grid-column: span 2; }
        .label { font-size: 0.65rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; font-weight: 600; }
        .value { font-size: 2rem; font-weight: 700; color: #fff; }
        .sub-value { font-size: 0.8rem; color: var(--accent); }

        /* BRÚJULA MINIMAL */
        .compass-wrap { display: flex; align-items: center; justify-content: center; padding: 20px; }
        .compass { width: 100px; height: 100px; border: 1px solid var(--border); border-radius: 50%; position: relative; }
        .needle { 
            position: absolute; top: 10%; left: 49%; width: 2px; height: 40%; 
            background: var(--accent); border-radius: 2px; transform-origin: 50% 100%; transition: 1s;
        }

        /* ELECTRICIDAD MINIMAL */
        .elec-card { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .elec-line { display: flex; align-items: flex-end; gap: 3px; height: 60px; margin-top: 15px; }
        .e-bar { flex: 1; background: #1a1a1a; border-radius: 1px; }
        .e-bar.active { background: var(--accent); }

        /* RELÉS (ESTILO APP TÁCTIL) */
        .rele-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .rele-btn { 
            background: var(--surface); border: 1px solid var(--border); padding: 20px; 
            border-radius: 12px; display: flex; align-items: center; justify-content: space-between;
        }
        .rele-btn.on { border-color: var(--accent); }
        .switch { width: 40px; height: 20px; background: #222; border-radius: 10px; position: relative; }
        .rele-btn.on .switch { background: var(--accent); }
        .dot { width: 16px; height: 16px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.2s; }
        .rele-btn.on .dot { left: 22px; }

        /* FUEL REGISTRY TABLE */
        .fuel-list { display: flex; flex-direction: column; gap: 10px; }
        .fuel-item { background: var(--surface); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .f-price { color: var(--accent); font-weight: 800; font-size: 1.2rem; }

        @media (min-width: 768px) {
            .weather-grid { grid-template-columns: repeat(4, 1fr); }
            .rele-grid { grid-template-columns: repeat(3, 1fr); }
            nav { width: 90px; height: 100vh; flex-direction: column; left: 0; bottom: auto; top: 0; }
            main { margin-left: 90px; padding: 40px; }
            header { margin-left: 90px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <i class="ph-fill ph-fire llama"></i>
        <span class="logo-text">Atelier Nero</span>
    </div>
    <div id="connection" style="font-size: 0.6rem; color: #444;">BT DISCONNECTED</div>
</header>

<main>
    <div id="panel-clima" class="panel active">
        <div class="weather-grid">
            <div class="w-item full" style="text-align: center;">
                <span class="label">Temperatura Exterior</span>
                <div class="value" id="cur-temp" style="font-size: 4rem;">--°</div>
                <div class="sub-value" id="cur-desc">ALMERÍA</div>
            </div>
            <div class="w-item"><span class="label">Humedad</span><div class="value" id="cur-hum">--%</div></div>
            <div class="w-item"><span class="label">UV Index</span><div class="value" id="cur-uv">--</div></div>
            <div class="w-item"><span class="label">Presión</span><div class="value" id="cur-pres" style="font-size: 1.2rem;">-- hPa</div></div>
            <div class="w-item"><span class="label">Lluvia</span><div class="value" id="cur-rain">--%</div></div>
            <div class="w-item full">
                <span class="label" style="display: block; text-align: center;">Dirección Viento</span>
                <div class="compass-wrap">
                    <div class="compass"><div class="needle" id="needle"></div></div>
                </div>
                <div id="cur-wind" style="text-align: center; font-weight: 700; color: var(--accent);">-- km/h</div>
            </div>
        </div>
    </div>

    <div id="panel-elec" class="panel">
        <div class="elec-card">
            <span class="label">Precio PVPC Actual</span>
            <div class="value" id="e-now" style="color: var(--accent);">-- €/kWh</div>
            <div class="elec-line" id="e-line"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="elec-card"><span class="label">Mínimo</span><div class="value" id="e-min" style="font-size: 1.2rem;">--</div></div>
            <div class="elec-card"><span class="label">Máximo</span><div class="value" id="e-max" style="font-size: 1.2rem;">--</div></div>
        </div>
    </div>

    <div id="panel-fuel" class="panel">
        <div class="fuel-list" id="f-list"></div>
    </div>

    <div id="panel-reles" class="panel">
        <div class="rele-grid">
            <div class="rele-btn" onclick="this.classList.toggle('on')">
                <span>Iluminación Salón</span>
                <div class="switch"><div class="dot"></div></div>
            </div>
            <div class="rele-btn" onclick="this.classList.toggle('on')">
                <span>Climatización</span>
                <div class="switch"><div class="dot"></div></div>
            </div>
            <div class="rele-btn" onclick="this.classList.toggle('on')">
                <span>Carga EV</span>
                <div class="switch"><div class="dot"></div></div>
            </div>
        </div>
    </div>
</main>

<nav>
    <i class="ph-fill ph-cloud-sun nav-item active" onclick="tab('panel-clima', this)"></i>
    <i class="ph-fill ph-lightning nav-item" onclick="tab('panel-elec', this)"></i>
    <i class="ph-fill ph-gas-pump nav-item" onclick="tab('panel-fuel', this)"></i>
    <i class="ph-fill ph-bluetooth nav-item" onclick="tab('panel-reles', this)"></i>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAhKc7R97_ph2VQOq-uLMXFv-Wnyy0srXw",
        projectId: "hestia-31da3",
        appId: "1:577704397868:web:e83026e730640a0bc1d589"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // GAS (FIREBASE)
    onSnapshot(doc(db, "market", "fuel"), (snap) => {
        const data = snap.data();
        if (data && data.stations) {
            const sorted = data.stations
                .filter(s => s['Precio Gasolina 95 E5'])
                .sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.')))
                .slice(0, 8);
            
            document.getElementById('f-list').innerHTML = sorted.map(s => `
                <div class="fuel-item">
                    <div><b>${s['Rótulo']}</b><br><small style="color:#444">${s['Dirección'].substring(0,30)}</small></div>
                    <div class="f-price">${s['Precio Gasolina 95 E5']}€</div>
                </div>
            `).join('');
        }
    });

    // CLIMA API
    async function getW() {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m,uv_index,surface_pressure,precipitation_probability&timezone=auto").then(r => r.json());
        const h = new Date().getHours();
        document.getElementById('cur-temp').firstChild.textContent = Math.round(res.current_weather.temperature) + "°";
        document.getElementById('cur-hum').innerText = res.hourly.relativehumidity_2m[h] + "%";
        document.getElementById('cur-uv').innerText = res.hourly.uv_index[h];
        document.getElementById('cur-pres').innerText = Math.round(res.hourly.surface_pressure[h]) + " hPa";
        document.getElementById('cur-rain').innerText = res.hourly.precipitation_probability[h] + "%";
        document.getElementById('cur-wind').innerText = res.current_weather.windspeed + " km/h";
        document.getElementById('needle').style.transform = `rotate(${res.current_weather.winddirection}deg)`;
    }

    // ENERGÍA PVPC
    async function getE() {
        const hoy = new Date().toISOString().split('T')[0];
        const res = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${hoy}T00:00&end_date=${hoy}T23:59&time_trunc=hour`).then(r => r.json());
        const prices = res.included[0].attributes.values.map(v => v.value / 1000);
        const nowH = new Date().getHours();
        
        document.getElementById('e-now').firstChild.textContent = prices[nowH].toFixed(4) + " €/kWh";
        document.getElementById('e-min').innerText = Math.min(...prices).toFixed(4);
        document.getElementById('e-max').innerText = Math.max(...prices).toFixed(4);

        const max = Math.max(...prices);
        document.getElementById('e-line').innerHTML = prices.map((p, i) => `
            <div class="e-bar ${i === nowH ? 'active' : ''}" style="height:${(p/max)*100}%"></div>
        `).join('');
    }

    window.tab = (id, btn) => {
        document.querySelectorAll('.panel, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    getW(); getE();
</script>
</body>
</html>
