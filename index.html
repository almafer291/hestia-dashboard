<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v59</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #000; --bronce: #a67c52; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        nav { width: 60px; border-right: 1px solid #222; display: flex; flex-direction: column; align-items: center; padding-top: 20px; background: #050505; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 30px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.7rem; }
        .n-btn.active { color: var(--bronce); font-weight: bold; }
        main { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: #0a0a0a; border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 3px solid var(--bronce); }
        .price { color: var(--bronce); font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<nav>
    <button class="n-btn active" onclick="tab('m', this)">CLIMA</button>
    <button class="n-btn" onclick="tab('g', this)">FUEL</button>
    <button class="n-btn" onclick="tab('l', this)">LUZ</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h2>Almería</h2>
        <div class="card"><div style="font-size:3rem;" id="t">--°</div></div>
    </div>
    <div id="g" class="panel">
        <h2>Gasolineras</h2>
        <div id="g-list">Cargando...</div>
    </div>
    <div id="l" class="panel">
        <h2>Luz Hoy</h2>
        <div class="card" style="text-align:center;"><div id="l-now" class="price">-- €/kWh</div></div>
    </div>
</main>

<script>
    function tab(id, b) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
        if(id==='m') loadM(); if(id==='g') loadG(); if(id==='l') loadL();
    }

    // CLIMA (Siempre funciona)
    async function loadM() {
        const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true');
        const d = await r.json();
        document.getElementById('t').innerText = Math.round(d.current_weather.temperature)+'°';
    }

    // LUZ (Nueva técnica sin Proxy)
    async function loadL() {
        try {
            // Usamos un servicio que ya viene preparado para saltar bloqueos
            const r = await fetch('https://api.preciodelaluz.org/v1/prices/all?zone=PCB');
            const data = await r.json();
            const hour = new Date().getHours();
            const precio = (Object.values(data)[hour].price / 1000).toFixed(4);
            document.getElementById('l-now').innerText = precio + " €/kWh";
        } catch(e) {
            document.getElementById('l-now').innerText = "Error de red local";
        }
    }

    // FUEL (Fuente simplificada)
    async function loadG() {
        const box = document.getElementById('g-list');
        try {
            // Intentamos una petición directa a una versión "espejo" de la gasolina
            const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04'));
            const data = await r.json();
            const filtrado = data.ListaEESSPrecio.filter(e => e.Municipio.includes("ALMER")).slice(0,4);
            
            let html = '';
            filtrado.forEach(e => {
                html += `<div class="card"><b>${e.Rótulo}</b><br><span class="price">${e['Precio Gasolina 95 E5']}€</span></div>`;
            });
            box.innerHTML = html;
        } catch(e) {
            box.innerHTML = "Error en Fuel. Reintenta.";
        }
    }

    window.onload = loadM;
</script>
</body>
</html>
