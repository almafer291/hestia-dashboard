<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HestiaLake v16 | Absolute Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166, 124, 82, 0.3); --text: #fff; --dim: #555; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* NAV */
        nav { width: 80px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; }
        .logo { width: 35px; height: 35px; margin-bottom: 50px; fill: url(#g); filter: drop-shadow(0 0 5px var(--bronce)); }
        .btn { background: none; border: none; color: var(--dim); font-size: 0.6rem; cursor: pointer; margin-bottom: 40px; writing-mode: vertical-lr; transform: rotate(180deg); transition: 0.3s; }
        .btn.active { color: var(--bronce); font-weight: 600; }

        /* MAIN */
        main { flex: 1; padding: 40px 60px; overflow-y: auto; background: radial-gradient(circle at top right, #0f0f0f, #000); }
        .panel { display: none; animation: fadeIn 0.4s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 25px; padding: 25px; margin-bottom: 20px; }
        h1 { font-weight: 100; font-size: 2.2rem; margin-bottom: 25px; }

        /* METEO */
        .m-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .m-item { background: rgba(166,124,82,0.05); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(166,124,82,0.1); }
        .label { font-size: 0.5rem; color: var(--dim); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 5px; }
        .val { font-size: 1.1rem; color: var(--bronce); }

        /* GAS */
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.8rem; }
        .p-gas { font-family: monospace; color: var(--bronce); font-weight: 600; font-size: 1rem; }
    </style>
</head>
<body>

<nav>
    <svg class="logo" viewBox="0 0 24 24">
        <defs><linearGradient id="g" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#a67c52"/></linearGradient></defs>
        <path d="M12,2C12,2 7,7.5 7,12C7,14.76 9.24,17 12,17C14.76,17 17,14.76 17,12C17,7.5 12,2 12,2M12,15C10.34,15 9,13.66 9,12C9,10 12,6.5 12,6.5C12,6.5 15,10 15,12C15,13.66 13.66,15 12,15Z" />
    </svg>
    <button class="btn active" onclick="tab('meteo', this)">ATMÓSFERA</button>
    <button class="btn" onclick="tab('luz', this)">ENERGÍA</button>
    <button class="btn" onclick="tab('gas', this)">GASOLINA</button>
</nav>

<main>
    <div id="meteo" class="panel active">
        <h1>Almería Live</h1>
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size: 5rem; font-weight: 100;" id="t-now">--°</div>
                <div style="width:200px"><canvas id="c-temp" height="100"></canvas></div>
            </div>
            <div class="m-grid" id="m-ext"></div>
            <div class="m-grid" id="f-cont"></div>
        </div>
    </div>

    <div id="luz" class="panel">
        <h1>Precio Luz (Oficial)</h1>
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <div id="ln">-- €/kWh</div>
                <div style="color:var(--bronce)" id="lt">Actual</div>
            </div>
            <canvas id="c-luz" height="120"></canvas>
        </div>
    </div>

    <div id="gas" class="panel">
        <h1>Top 10 Baratas Almería</h1>
        <div class="card">
            <table id="g-table"><tr><td>Cargando precios en tiempo real...</td></tr></table>
        </div>
    </div>
</main>

<script>
    const PROXY = "https://images" + Math.floor(Math.random() * 1000) + "-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=3600&url=";
    const CORS_IO = "https://corsproxy.io/?";
    let ch = {};

    function tab(id, b) {
        document.querySelectorAll('.panel, .btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
        if(id==='meteo') loadM(); if(id==='luz') loadL(); if(id==='gas') loadG();
    }

    async function loadM() {
        const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.45&current_weather=true&hourly=temperature_2m,relativehumidity_2m,uv_index,pressure_msl&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto');
        const d = await r.json();
        document.getElementById('t-now').innerText = Math.round(d.current_weather.temperature)+'°';
        
        document.getElementById('m-ext').innerHTML = `
            <div class="m-item"><span class="label">Humedad</span><div class="val">${d.hourly.relativehumidity_2m[0]}%</div></div>
            <div class="m-item"><span class="label">Viento</span><div class="val">${d.current_weather.windspeed}km/h</div></div>
            <div class="m-item"><span class="label">UV</span><div class="val">${d.hourly.uv_index[0]}</div></div>
            <div class="m-item"><span class="label">Presión</span><div class="val">${Math.round(d.hourly.pressure_msl[0])}</div></div>
        `;

        const icons = { 0:"☀️", 1:"🌤️", 3:"☁️", 61:"🌧️" };
        document.getElementById('f-cont').innerHTML = [1,2,3].map(i => `
            <div class="m-item" style="grid-column: span 1.3">
                <span class="label">Día +${i}</span>
                <div style="font-size:1.2rem">${icons[d.daily.weathercode[i]]||"🌤️"}</div>
                <div class="val" style="font-size:0.8rem">${Math.round(d.daily.temperature_2m_max[i])}°/${Math.round(d.daily.temperature_2m_min[i])}°</div>
            </div>`).join('');

        if(ch.t) ch.t.destroy();
        ch.t = new Chart(document.getElementById('c-temp'), {
            type:'line', data:{ labels:[1,2,3,4,5,6], datasets:[{data:d.hourly.temperature_2m.slice(0,6), borderColor:'#a67c52', pointRadius:0, tension:0.4}]},
            options:{plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}}}
        });
    }

    async function loadL() {
        try {
            // Usamos corsproxy.io que es mucho más robusto para APIs JSON
            const r = await fetch(CORS_IO + encodeURIComponent("https://api.preciodelaluz.org/v1/prices/all?zone=PCB"));
            const d = await r.json();
            const prices = Object.values(d).map(x => x.price/1000);
            const now = new Date().getHours();
            
            document.getElementById('ln').innerText = prices[now].toFixed(4) + " €/kWh";
            
            if(ch.l) ch.l.destroy();
            ch.l = new Chart(document.getElementById('c-luz'), {
                type:'bar',
                data:{
                    labels: Array.from({length:24},(_,i)=>i+'h'),
                    datasets:[{
                        label:'€/kWh',
                        data: prices,
                        backgroundColor: prices.map((p,i)=> i===now ? '#a67c52' : 'rgba(166,124,82,0.1)'),
                        borderRadius: 5
                    }]
                },
                options:{ 
                    plugins:{ 
                        legend:{display:false},
                        tooltip:{ enabled: true, backgroundColor:'#111', titleColor:'#a67c52', callbacks:{ label:(ctx)=>`Precio: ${ctx.raw.toFixed(4)} €` } }
                    },
                    scales:{ x:{ticks:{color:'#444', font:{size:8}}, grid:{display:false}}, y:{display:false} }
                }
            });
        } catch(e) { document.getElementById('ln').innerText = "Error de red. Reintentando..."; setTimeout(loadL, 5000); }
    }

    async function loadG() {
        try {
            // Intentamos con el proxy de Google que es muy rápido para datos del gobierno
            const target = "https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04";
            const r = await fetch(CORS_IO + encodeURIComponent(target));
            const d = await r.json();
            
            const list = d.ListaEESSPrecio
                .filter(e => e.Municipio.toUpperCase() === "ALMERÍA")
                .sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.')))
                .slice(0,10);

            document.getElementById('g-table').innerHTML = list.map(e => `
                <tr>
                    <td><b style="color:#fff">${e['Rótulo']}</b><br><small style="color:#555">${e['Dirección'].toLowerCase()}</small></td>
                    <td style="text-align:right">
                        <span class="p-gas">${e['Precio Gasolina 95 E5']}</span><br>
                        <small style="color:#444">${e['Precio Gasoleo A']} dsl</small>
                    </td>
                </tr>`).join('');
        } catch(e) { document.getElementById('g-table').innerHTML = "Error al conectar con Ministerio. Reintentando..."; setTimeout(loadG, 5000); }
    }

    window.onload = () => { loadM(); };
</script>
</body>
</html>
