<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v48 | Almería Fuel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166,124,82,0.2); --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        nav { width: 65px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #050505; flex-shrink: 0; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 40px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.7rem; letter-spacing: 2px; }
        .n-btn.active { color: var(--bronce); font-weight: bold; }

        main { flex: 1; padding: 25px; overflow-y: auto; background: #000; }
        .panel { display: none; } .panel.active { display: block; }
        
        .card { background: #0a0a0a; border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--bronce); }
        h1 { font-size: 1.2rem; color: var(--bronce); margin-bottom: 20px; letter-spacing: 2px; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 0; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; }
        .p-95 { color: var(--bronce); font-weight: bold; font-family: monospace; font-size: 1.1rem; text-align: right; }
        .loc { color: #555; font-size: 0.75rem; display: block; text-transform: lowercase; }
    </style>
</head>
<body>

<nav>
    <button class="n-btn active" onclick="tab('m', this)">CLIMA</button>
    <button class="n-btn" onclick="tab('g', this)">FUEL</button>
    <button class="n-btn" onclick="tab('l', this)">LUZ</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h1>ALMERÍA LIVE</h1>
        <div class="card"><div style="font-size:4rem" id="t">--°</div><p>Despejado</p></div>
    </div>

    <div id="g" class="panel">
        <h1>GASOLINERAS ALMERÍA</h1>
        <div class="card" id="g-list">Cargando datos oficiales...</div>
    </div>

    <div id="l" class="panel">
        <h1>ENERGÍA HOY</h1>
        <div class="card" id="l-now">Próximamente...</div>
    </div>
</main>

<script>
    // Usamos el Proxy AllOrigins para saltar el CORS del Ministerio
    const P = "https://api.allorigins.win/get?url=";

    function tab(id, b) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
        if(id==='m') loadM(); if(id==='g') loadG();
    }

    async function loadM() {
        const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true');
        const d = await r.json();
        document.getElementById('t').innerText = Math.round(d.current_weather.temperature)+'°';
    }

    async function loadG() {
        const box = document.getElementById('g-list');
        try {
            // URL Filtrada por Provincia 04 (Almería) para que no pese 10MB
            const api = "https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04";
            const r = await fetch(P + encodeURIComponent(api));
            const data = await r.json();
            const res = JSON.parse(data.contents);
            
            // Filtramos solo las de Almería Capital y ordenamos por precio
            const lista = res.ListaEESSPrecio
                .filter(e => e.Municipio === "ALMERÍA")
                .sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.')))
                .slice(0, 10);

            let h = '<table>';
            lista.forEach(e => {
                h += `<tr>
                    <td><b>${e.Rótulo}</b><span class="loc">${e.Dirección}</span></td>
                    <td class="p-95">${e['Precio Gasolina 95 E5']}€</td>
                </tr>`;
            });
            box.innerHTML = h + '</table>';
        } catch(e) {
            box.innerHTML = "Error al conectar con el Ministerio. Reintenta en 5 segundos.";
        }
    }

    window.onload = loadM;
</script>
</body>
</html>
