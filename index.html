<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HestiaLake | Organic Bronze</title>
    <link href="https://fonts.googleapis.com/css2?family=Federo&family=Tenor+Sans&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bronce: #c5934c;
            --bronce-deep: #8c5624;
            --bronce-glow: rgba(197, 147, 76, 0.3);
            --bg: #030303;
            --glass: rgba(20, 15, 10, 0.4);
            --border: rgba(197, 147, 76, 0.15);
        }

        body {
            font-family: 'Tenor Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 10% 10%, #1a120b 0%, #030303 50%);
            color: #e0d0c0; margin: 0; display: flex; min-height: 100vh; overflow-x: hidden;
        }

        /* --- NAVEGACIÓN LATERAL ELÍPTICA --- */
        nav {
            width: 280px; background: rgba(5, 5, 5, 0.6);
            backdrop-filter: blur(30px) saturate(180%);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 60px 20px;
            position: fixed; height: 100vh; z-index: 1000;
            border-radius: 0 50px 50px 0;
        }

        .logo-area { text-align: center; margin-bottom: 60px; position: relative; }
        .logo-svg { width: 80px; filter: drop-shadow(0 0 20px var(--bronce-glow)); }
        
        .brand {
            font-family: 'Federo', sans-serif; font-size: 1.8rem;
            color: #fff; margin-top: 15px; letter-spacing: 2px;
            background: linear-gradient(to bottom, #fff, var(--bronce));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-btn {
            background: none; border: none; color: #a09080;
            padding: 18px 25px; text-align: left; font-family: 'Federo', sans-serif;
            cursor: pointer; transition: 0.5s; border-radius: 30px;
            margin-bottom: 10px; font-size: 1rem; letter-spacing: 1px;
            display: flex; align-items: center; gap: 15px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--glass); color: #fff;
            box-shadow: 0 0 15px var(--bronce-glow);
            transform: translateX(10px);
        }

        /* --- CONTENIDO --- */
        main { flex: 1; margin-left: 320px; padding: 60px 40px; max-width: 1400px; }
        .panel { display: none; animation: organicIn 1s ease forwards; }
        .panel.active { display: block; }

        @keyframes organicIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        .card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 40px; padding: 35px; margin-bottom: 30px;
            backdrop-filter: blur(20px);
        }

        h2 { font-family: 'Federo', sans-serif; color: var(--bronce); font-weight: 400; margin: 0 0 25px 0; font-size: 1.6rem; }

        /* --- ENERGÍA: STATS --- */
        .energy-stats { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 30px; }
        .e-stat { flex: 1; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 25px; border: 1px solid var(--border); text-align: center; }
        .e-lab { font-size: 0.7rem; color: #a09080; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .e-val { font-size: 1.8rem; color: #fff; }

        /* --- GASOLINERAS --- */
        .gas-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .gas-card {
            background: rgba(20, 15, 10, 0.2); border: 1px solid var(--border);
            border-radius: 25px; padding: 20px;
        }
        .g-prices { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px; }
        .p-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; flex: 1; text-align: center; }

        /* --- RELÉS --- */
        .relay-ctrl { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .r-btn {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            color: #ff5555; padding: 20px 40px; border-radius: 50px;
            font-family: 'Federo'; cursor: pointer; transition: 0.5s;
        }
        .r-btn.on { color: #50fa7b; border-color: #50fa7b; box-shadow: 0 0 20px rgba(80,250,123,0.2); }
    </style>
</head>
<body>

<nav>
    <div class="logo-area">
        <svg class="logo-svg" viewBox="0 0 100 100"><path d="M50 10C50 10 85 40 85 65C85 83 70 95 50 95C30 95 15 83 15 65C15 40 50 10 50 10Z" fill="url(#L)" /><path d="M50 50C55 60 58 68 50 78C42 68 45 60 50 50" fill="white" opacity="0.6"/><defs><linearGradient id="L" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#fff"/><stop offset="100%" style="stop-color:#b87333"/></linearGradient></defs></svg>
        <div class="brand">HESTIALAKE</div>
    </div>
    <button class="nav-btn active" onclick="showPanel('meteo', this)">Atmosfera</button>
    <button class="nav-btn" onclick="showPanel('energia', this)">Energía</button>
    <button class="nav-btn" onclick="showPanel('gas', this)">Combustible</button>
    <button class="nav-btn" onclick="showPanel('reles', this)">Domótica (5)</button>
</nav>

<main>
    <div id="meteo" class="panel active">
        <div class="card">
            <h2>Almería Capital Atmos</h2>
            <div style="font-size: 4rem; margin-bottom: 20px;" id="m-temp">--°C</div>
            <p id="m-desc">Sincronizando tiempo...</p>
        </div>
    </div>

    <div id="energia" class="panel">
        <div class="card">
            <h2>Energía PVPC (España)</h2>
            <div class="energy-stats">
                <div class="e-stat"><span class="e-lab">Mínimo</span><b class="e-val" id="e-min" style="color:#50fa7b">--</b></div>
                <div class="e-stat"><span class="e-lab">Actual</span><b class="e-val" id="e-now" style="color:var(--bronce)">--</b></div>
                <div class="e-stat"><span class="e-lab">Máximo</span><b class="e-val" id="e-max" style="color:#ff5555">--</b></div>
            </div>
            <canvas id="energyChart" height="120"></canvas>
        </div>
    </div>

    <div id="gas" class="panel">
        <div class="card">
            <h2>Combustible Almería</h2>
            <div class="gas-list" id="gas-content">Cargando...</div>
        </div>
    </div>

    <div id="reles" class="panel">
        <div class="card">
            <h2>Control Maestro</h2>
            <div class="relay-ctrl">
                <button class="r-btn" onclick="toggleRelay(1, this)">R1 OFF</button>
                <button class="r-btn" onclick="toggleRelay(2, this)">R2 OFF</button>
                <button class="r-btn" onclick="toggleRelay(3, this)">R3 OFF</button>
                <button class="r-btn" onclick="toggleRelay(4, this)">R4 OFF</button>
                <button class="r-btn" onclick="toggleRelay(5, this)">R5 OFF</button>
            </div>
        </div>
    </div>
</main>

<script>
    let eChart;

    function showPanel(id, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'energia') fetchEnergia();
        if(id === 'gas') fetchGas();
    }

    // --- NUEVA LÓGICA DE ENERGÍA (API ESIOS OFICIAL + PROXY) ---
    async function fetchEnergia() {
        try {
            // Usamos un proxy público para evitar errores de CORS
            const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.preciodelaluz.org/v1/prices/all?zone=PCB'));
            const data = JSON.parse((await r.json()).contents);
            
            const prices = Object.values(data).map(h => h.price / 1000); // Pasar a €/kWh
            const hours = Object.keys(data).map(h => h.split('-')[0] + 'h');
            const currentHour = new Date().getHours();

            // Actualizar Texto
            document.getElementById('e-min').innerText = Math.min(...prices).toFixed(4) + '€';
            document.getElementById('e-max').innerText = Math.max(...prices).toFixed(4) + '€';
            document.getElementById('e-now').innerText = prices[currentHour].toFixed(4) + '€';

            // Gráfica
            if(eChart) eChart.destroy();
            const ctx = document.getElementById('energyChart').getContext('2d');
            eChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: hours,
                    datasets: [{
                        label: '€/kWh',
                        data: prices,
                        borderColor: '#c5934c',
                        backgroundColor: 'rgba(197, 147, 76, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#807060' } } }
                }
            });
        } catch(e) {
            document.getElementById('e-now').innerText = "Error API";
            console.error(e);
        }
    }

    async function fetchGas() {
        try {
            const r = await fetch('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04');
            const d = await r.json();
            const capital = d.ListaEESSPrecio.filter(e => e['Municipio'].toUpperCase() === "ALMERÍA").slice(0, 10);
            document.getElementById('gas-content').innerHTML = capital.map(e => `
                <div class="gas-card">
                    <div style="color:#fff; font-family:Federo">${e['Rótulo']}</div>
                    <div style="font-size:0.7rem; color:#807060">${e['Dirección']}</div>
                    <div class="g-prices">
                        <div class="p-box"><span style="font-size:0.6rem">G95</span><br><b>${e['Precio Gasolina 95 E5']}€</b></div>
                        <div class="p-box"><span style="font-size:0.6rem">DSL</span><br><b>${e['Precio Gasoleo A']}€</b></div>
                    </div>
                </div>
            `).join('');
        } catch(e) {}
    }

    function toggleRelay(num, btn) {
        btn.classList.toggle('on');
        btn.innerText = `R${num} ${btn.classList.contains('on') ? 'ON' : 'OFF'}`;
    }

    // Inicio
    fetchEnergia();
</script>
</body>
</html>
