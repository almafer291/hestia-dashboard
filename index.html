<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v52 | Almería Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166,124,82,0.2); --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 65px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #080808; flex-shrink: 0; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 40px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.7rem; letter-spacing: 2px; }
        .n-btn.active { color: var(--bronce); font-weight: bold; }
        main { flex: 1; padding: 25px; overflow-y: auto; background: #000; }
        .panel { display: none; } .panel.active { display: block; }
        .card { background: #0a0a0a; border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--bronce); }
        .big { font-size: 4rem; font-weight: 100; margin: 0; }
        .price { color: var(--bronce); font-weight: bold; font-family: monospace; font-size: 1.3rem; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px 0; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; }
    </style>
</head>
<body>

<nav>
    <button class="n-btn active" onclick="tab('m', this)">CLIMA</button>
    <button class="n-btn" onclick="tab('g', this)">GASOLINA</button>
    <button class="n-btn" onclick="tab('l', this)">LUZ</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h1>Almería</h1>
        <div class="card"><div class="big" id="t">--°</div><p>Online</p></div>
    </div>
    <div id="g" class="panel">
        <h1>Gasolineras Baratas</h1>
        <div class="card" id="g-box">Cargando datos directos...</div>
    </div>
    <div id="l" class="panel">
        <h1>Luz Hoy</h1>
        <div class="card"><div id="l-now" class="price">Consultando...</div></div>
    </div>
</main>

<script>
    function tab(id, b) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
        if(id==='m') loadM(); if(id==='g') loadG(); if(id==='l') loadL();
    }

    // CLIMA: Funciona directo siempre
    async function loadM() {
        const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true');
        const d = await r.json();
        document.getElementById('t').innerText = Math.round(d.current_weather.temperature)+'°';
    }

    // LUZ: Usamos la API de "Precios de la luz" pero con un truco de "no-cors"
    async function loadL() {
        try {
            // Intentamos capturar el dato de una fuente secundaria que no bloquea: SIMPLYRE
            const r = await fetch('https://api.preciodelaluz.org/v1/prices/all?zone=PCB');
            const data = await r.json();
            const now = new Date().getHours();
            document.getElementById('l-now').innerText = (Object.values(data)[now].price/1000).toFixed(4) + " €/kWh";
        } catch(e) {
            document.getElementById('l-now').innerText = "Error de Servidor Local";
        }
    }

    // GASOLINA: Si el Ministerio nos bloquea, usamos un "Scraper" de respaldo
    async function loadG() {
        const box = document.getElementById('g-box');
        try {
            // Usamos un servicio que convierte la web del ministerio en un JSON de confianza
            const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04'));
            const res = await r.json();
            const lista = res.ListaEESSPrecio.filter(e => e.Municipio === "ALMERÍA").slice(0,6);
            
            let h = '<table>';
            lista.forEach(e => {
                h += `<tr><td><b>${e.Rótulo}</b></td><td style="text-align:right" class="price">${e['Precio Gasolina 95 E5']}€</td></tr>`;
            });
            box.innerHTML = h + '</table>';
        } catch(e) {
            box.innerHTML = "El Ministerio ha cortado la conexión. Reintenta en 1 min.";
        }
    }

    window.onload = loadM;
</script>
</body>
</html>
