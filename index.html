<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v73 | Almería</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166,124,82,0.15); }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 65px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 30px; background: #050505; flex-shrink: 0; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 40px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.7rem; letter-spacing: 2px; }
        .n-btn.active { color: var(--bronce); font-weight: bold; }
        main { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 3px solid var(--bronce); }
        .price { color: var(--bronce); font-weight: bold; font-size: 1.3rem; font-family: monospace; }
        h1 { font-size: 0.8rem; color: var(--bronce); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav>
    <button class="n-btn active" onclick="tab('m', this)">CLIMA</button>
    <button class="n-btn" onclick="tab('g', this)">FUEL</button>
    <button class="n-btn" onclick="tab('l', this)">LUZ</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h1>ALMERÍA LIVE</h1>
        <div class="card"><div id="t" style="font-size:4rem;">--°</div></div>
    </div>
    <div id="g" class="panel" style="display:none;">
        <h1>GASOLINERAS BARATAS</h1>
        <div id="g-list">Conectando...</div>
    </div>
    <div id="l" class="panel" style="display:none;">
        <h1>PRECIO LUZ HOY</h1>
        <div class="card" style="text-align:center;"><div id="l-now" class="price">-- €/kWh</div><p style="font-size:0.6rem; color:#444">Mercado Mayorista</p></div>
    </div>
</main>

<script>
    function tab(id, b) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => { x.style.display = 'none'; x.classList.remove('active'); });
        document.getElementById(id).style.display = 'block'; b.classList.add('active');
        if(id==='m') loadM(); if(id==='g') loadG(); if(id==='l') loadL();
    }

    // CLIMA: Directo (Siempre OK)
    async function loadM() {
        const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true');
        const d = await r.json();
        document.getElementById('t').innerText = Math.round(d.current_weather.temperature)+'°';
    }

    // LUZ: Vía AllOrigins (Modo RAW corregido)
    async function loadL() {
        const box = document.getElementById('l-now');
        try {
            // Usamos un proxy que entrega el archivo tal cual, sin preguntar
            const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.preciodelaluz.org/v1/prices/all?zone=PCB'));
            const data = await r.json();
            const h = new Date().getHours();
            const p = (Object.values(data)[h].price / 1000).toFixed(4);
            box.innerText = p + " €/kWh";
        } catch(e) { box.innerText = "Sincronizando..."; setTimeout(loadL, 5000); }
    }

    // GASOLINA: Vía AllOrigins (Filtro Robusto)
    async function loadG() {
        const box = document.getElementById('g-list');
        try {
            const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04'));
            const data = await r.json();
            
            // Filtro total para Almería Capital
            const lista = data.ListaEESSPrecio
                .filter(e => e.Municipio.toUpperCase().includes("ALMER"))
                .sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.')))
                .slice(0, 5);
            
            let html = '';
            lista.forEach(e => {
                html += `<div class="card">
                    <div style="font-size:0.75rem; opacity:0.7; margin-bottom:5px">${e.Rótulo}</div>
                    <div class="price">${e['Precio Gasolina 95 E5']} €</div>
                    <div style="font-size:0.6rem; color:#444">${e.Dirección.toLowerCase()}</div>
                </div>`;
            });
            box.innerHTML = html || "Buscando estaciones...";
        } catch(e) { box.innerHTML = "Actualizando datos..."; setTimeout(loadG, 5000); }
    }

    window.onload = loadM;
</script>
</body>
</html>
