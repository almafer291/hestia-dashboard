<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v64 | Almería</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166,124,82,0.2); }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 60px; border-right: 1px solid #222; display: flex; flex-direction: column; align-items: center; padding-top: 20px; background: #050505; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 30px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.7rem; letter-spacing: 2px; }
        .n-btn.active { color: var(--bronce); font-weight: bold; }
        main { flex: 1; position: relative; background: #000; }
        .panel { display: none; width: 100%; height: 100%; border: none; }
        .panel.active { display: block; }
        .clima-card { padding: 40px; text-align: center; }
    </style>
</head>
<body>

<nav>
    <button class="n-btn active" onclick="tab('m', this)">CLIMA</button>
    <button class="n-btn" onclick="tab('g', this)">FUEL</button>
    <button class="n-btn" onclick="tab('l', this)">LUZ</button>
</nav>

<main>
    <div id="m" class="panel active clima-card">
        <h2 style="color:var(--bronce)">ALMERÍA</h2>
        <div style="font-size:5rem;" id="t">--°</div>
        <p>SISTEMA OPERATIVO</p>
    </div>

    <iframe id="g" class="panel" src="https://www.dieselogasolina.com/gasolineras-baratas/almeria/almeria.html"></iframe>

    <iframe id="l" class="panel" src="https://tarifaluzhora.es/"></iframe>
</main>

<script>
    function tab(id, b) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        b.classList.add('active');
    }

    // El clima lo mantenemos porque es lo único que Vercel te deja cargar
    async function loadM() {
        try {
            const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true');
            const d = await r.json();
            document.getElementById('t').innerText = Math.round(d.current_weather.temperature)+'°';
        } catch(e) { document.getElementById('t').innerText = "??°"; }
    }

    window.onload = loadM;
</script>
</body>
</html>
