<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v28 | Real Time Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166,124,82,0.3); --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Navegación lateral */
        nav { width: 80px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 40px 0; background: #050505; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 40px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s; }
        .n-btn.active { color: var(--bronce); font-weight: bold; }

        /* Contenedor principal */
        main { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #111, #000); }
        .panel { display: none; } .panel.active { display: block; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        
        /* Luz y Clima */
        .big-val { font-size: 5rem; font-weight: 100; margin: 0; }
        .l-grid { display: flex; justify-content: space-around; text-align: center; margin-bottom: 20px; }

        /* Tabla Gasolineras */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .g-name { font-weight: bold; color: #fff; display: block; }
        .g-dir { font-size: 0.75rem; color: #777; text-transform: lowercase; }
        .g-prices { text-align: right; font-family: monospace; }
        .p-95 { color: var(--bronce); font-weight: bold; font-size: 1.1rem; }
        .p-dsl { color: #555; font-size: 0.9rem; }

        /* Relés */
        .r-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .r-btn { aspect-ratio: 1; border-radius: 50%; border: 1px solid var(--border); background: none; color: #ff4444; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .r-btn.on { color: #00ff88; border-color: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.2); }
    </style>
</head>
<body>

<nav>
    <div style="color:var(--bronce); font-weight:bold; margin-bottom:50px;">H28</div>
    <button class="n-btn active" onclick="tab('m', this)">CLIMA</button>
    <button class="n-btn" onclick="tab('l', this)">ENERGÍA</button>
    <button class="n-btn" onclick="tab('g', this)">FUEL</button>
    <button class="n-btn" onclick="tab('i', this)">SISTEMA</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h1>Almería Live</h1>
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <div class="big-val" id="m-temp">--°</div>
            <div style="width:250px"><canvas id="c-temp"></canvas></div>
        </div>
    </div>

    <div id="l" class="panel">
        <h1>Precio Luz Hoy (PVPC)</h1>
        <div class="card">
            <div class="l-grid">
                <div><small style="color:#666">MÍNIMO</small><br><b id="l-min" style="color:#00ff88">--</b></div>
                <div><small style="color:#666">ACTUAL</small><br><b id="l-now" style="font-size:1.8rem; color:var(--bronce)">--</b></div>
                <div><small style="color:#666">MÁXIMO</small><br><b id="l-max" style="color:#ff4444">--</b></div>
            </div>
            <canvas id="c-luz" height="100"></canvas>
        </div>
    </div>

    <div id="g" class="panel">
        <h1>Estaciones en Almería Capital</h1>
        <div class="card">
            <table id="g-table">
                <tr><td style="color:var(--bronce)">Sincronizando con el Ministerio...</td></tr>
            </table>
        </div>
    </div>

    <div id="i" class="panel">
        <h1>Control Relés</h1>
        <div class="card">
            <div class="r-grid">
                <button class="r-btn" onclick="t(this,1)">R1</button>
                <button class="r-btn" onclick="t(this,2)">R2</button>
                <button class="r-btn" onclick="t(this,3)">R3</button>
                <button class="r-btn" onclick="t(this,4)">R4</button>
            </div>
        </div>
    </div>
</main>

<script>
    let chs = {};
    // Usamos el proxy de AllOrigins para saltar el bloqueo CORS del Ministerio
    const PROXY = "https://api.allorigins.win/get?url=";

    function tab(id, b) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
        if(id==='m') loadM(); if(id==='l') loadL(); if(id==='g') loadG();
    }

    async function loadM() {
        const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.45&current_weather=true&hourly=temperature_2m&timezone=auto');
        const d = await r.json();
        document.getElementById('m-temp').innerText = Math.round(d.current_weather.temperature)+'°';
        if(chs.t) chs.t.destroy();
        chs.t = new Chart(document.getElementById('c-temp'), {
            type:'line', data:{ labels:[1,2,3,4,5], datasets:[{data:d.hourly.temperature_2m.slice(0,5), borderColor:'#a67c52', tension:0.4, pointRadius:0}]},
            options:{plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}}}
        });
    }

    async function loadL() {
        try {
            const r = await fetch('https://api.preciodelaluz.org/v1/prices/all?zone=PCB');
            const data = await r.json();
            const prices = Object.values(data).map(h => h.price/1000);
            const now = new Date().getHours();
            
            document.getElementById('l-now').innerText = prices[now].toFixed(4) + " €";
            document.getElementById('l-min').innerText = Math.min(...prices).toFixed(4);
            document.getElementById('l-max').innerText = Math.max(...prices).toFixed(4);

            if(chs.l) chs.l.destroy();
            chs.l = new Chart(document.getElementById('c-luz'), {
                type:'bar', 
                data:{ 
                    labels: Array.from({length: 24}, (_, i) => i + 'h'),
                    datasets:[{
                        data: prices, 
                        backgroundColor: prices.map((p,i) => i === now ? '#a67c52' : 'rgba(166,124,82,0.1)'),
                        borderRadius: 4
                    }]
                },
                options:{ plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false},ticks:{color:'#444'}}, y:{display:false} } }
            });
        } catch(e) { console.error("Error Luz:", e); }
    }

    async function loadG() {
        const urlMin = "https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04";
        try {
            const res = await fetch(PROXY + encodeURIComponent(urlMin));
            const json = await res.json();
            const data = JSON.parse(json.contents);
            
            // Filtramos por Municipio Almería y ordenamos por precio de Gasolina 95
            const list = data.ListaEESSPrecio
                .filter(e => e.Municipio.toUpperCase() === "ALMERÍA")
                .sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.')))
                .slice(0, 10);
            
            document.getElementById('g-table').innerHTML = list.map(e => `
                <tr>
                    <td>
                        <span class="g-name">${e['Rótulo']}</span>
                        <span class="g-dir">${e['Dirección']}</span>
                    </td>
                    <td class="g-prices">
                        <span class="p-95">${e['Precio Gasolina 95 E5']} €</span><br>
                        <span class="p-dsl">${e['Precio Gasoleo A']} € diesel</span>
                    </td>
                </tr>
            `).join('');
        } catch(e) { 
            document.getElementById('g-table').innerHTML = "<tr><td>Error al conectar con el Ministerio. Reintentando...</td></tr>";
            console.error("Error Fuel:", e);
        }
    }

    function t(b,n) { b.classList.toggle('on'); b.innerText = b.classList.contains('on')?`R${n} ON`:`R${n} OFF`; }
    window.onload = loadM;
</script>
</body>
</html>
