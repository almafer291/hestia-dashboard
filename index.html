<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v77 | Almería Pure</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166,124,82,0.2); }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; height: 100vh; }
        
        /* Navegación */
        nav { width: 65px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #050505; flex-shrink: 0; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 40px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.7rem; letter-spacing: 2px; }
        .n-btn.active { color: var(--bronce); font-weight: bold; }
        
        /* Contenido */
        main { flex: 1; padding: 25px; overflow-y: auto; }
        .panel { display: none; }
        .panel.active { display: block; }
        
        .card { background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 3px solid var(--bronce); display: flex; justify-content: space-between; align-items: center; }
        .name { font-size: 0.8rem; text-transform: uppercase; color: #ccc; max-width: 60%; }
        .price { font-family: monospace; color: var(--bronce); font-weight: bold; font-size: 1.2rem; }
        h1 { font-size: 0.9rem; color: var(--bronce); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; text-align: center; }
    </style>
</head>
<body>

<nav>
    <button class="n-btn active" onclick="tab('m', this)">CLIMA</button>
    <button class="n-btn" onclick="tab('g', this)">FUEL</button>
    <button class="n-btn" onclick="tab('l', this)">LUZ</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h1>ALMERÍA</h1>
        <div class="card" style="flex-direction:column; padding:40px;">
            <div id="t" style="font-size:5rem;">--°</div>
            <p style="color:#444; margin:0;">ONLINE</p>
        </div>
    </div>

    <div id="g" class="panel">
        <h1>GASOLINA 95</h1>
        <div id="g-list">Sincronizando...</div>
    </div>

    <div id="l" class="panel">
        <h1>LUZ HOY</h1>
        <div id="l-list">Cargando precio...</div>
    </div>
</main>

<script>
    // Este es el "Túnel" que saltará el bloqueo de Vercel
    const PROXY = "https://api.allorigins.win/raw?url=";

    function tab(id, b) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => { x.classList.remove('active'); x.style.display = 'none'; });
        const target = document.getElementById(id);
        target.classList.add('active'); 
        target.style.display = 'block';
        b.classList.add('active');
        if(id==='m') loadM(); if(id==='g') loadG(); if(id==='l') loadL();
    }

    async function loadM() {
        const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true');
        const d = await r.json();
        document.getElementById('t').innerText = Math.round(d.current_weather.temperature)+'°';
    }

    async function loadG() {
        const box = document.getElementById('g-list');
        try {
            const r = await fetch(PROXY + encodeURIComponent('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04'));
            const data = await r.json();
            
            // Filtramos Almería capital y ordenamos por el más barato
            const lista = data.ListaEESSPrecio
                .filter(e => e.Municipio.includes("ALMERÍA"))
                .sort((a,b) => a['Precio Gasolina 95 E5'].replace(',','.') - b['Precio Gasolina 95 E5'].replace(',','.'))
                .slice(0, 6);

            box.innerHTML = lista.map(e => `
                <div class="card">
                    <div class="name">${e.Rótulo}</div>
                    <div class="price">${e['Precio Gasolina 95 E5']}€</div>
                </div>
            `).join('');
        } catch(e) { box.innerHTML = "Error de conexión temporal."; }
    }

    async function loadL() {
        const box = document.getElementById('l-list');
        try {
            const r = await fetch(PROXY + encodeURIComponent('https://api.preciodelaluz.org/v1/prices/all?zone=PCB'));
            const data = await r.json();
            const h = new Date().getHours();
            const p = (Object.values(data)[h].price / 1000).toFixed(4);
            
            box.innerHTML = `
                <div class="card" style="flex-direction:column; padding:30px;">
                    <div class="price" style="font-size:2.5rem;">${p}</div>
                    <div style="font-size:0.7rem; color:#444; margin-top:10px;">€/kWh ACTUAL</div>
                </div>
            `;
        } catch(e) { box.innerHTML = "Luz no disponible."; }
    }

    window.onload = loadM;
</script>
</body>
</html>
