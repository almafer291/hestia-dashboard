<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hestia v36 Estable</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff;display:flex;height:100vh}
nav{width:70px;background:#080808;display:flex;flex-direction:column;align-items:center;padding:30px 0}
button{background:none;border:none;color:#555;margin:20px 0;cursor:pointer}
button.active{color:#a67c52}
main{flex:1;padding:20px;overflow:auto}
.panel{display:none}.panel.active{display:block}
.card{background:#111;padding:20px;border-radius:15px;margin-bottom:20px}
.big{font-size:3rem}
table{width:100%} td{padding:8px;border-bottom:1px solid #222}
.price{color:#a67c52}
</style>
</head>

<body>

<nav>
<button class="active" onclick="tab('m',this)">CLIMA</button>
<button onclick="tab('l',this)">LUZ</button>
<button onclick="tab('g',this)">GAS</button>
</nav>

<main>

<div id="m" class="panel active">
<div class="card">
<div class="big" id="temp">--</div>
<canvas id="ct"></canvas>
</div>
</div>

<div id="l" class="panel">
<div class="card">
<div>MÍN <b id="min"></b> | AHORA <b id="now"></b> | MÁX <b id="max"></b></div>
<canvas id="cl"></canvas>
</div>
</div>

<div id="g" class="panel">
<div class="card">
<table id="gas"><tr><td>Cargando...</td></tr></table>
</div>
</div>

</main>

<script>

const proxy = "https://api.allorigins.win/raw?url=";
let charts={};
let cache={};

function tab(id,b){
document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
document.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
document.getElementById(id).classList.add('active');
b.classList.add('active');

if(id==='m') loadM();
if(id==='l') loadL();
if(id==='g') loadG();
}

/* ===== CLIMA ===== */
async function loadM(){
try{
if(cache.m) return renderM(cache.m);

const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.45&hourly=temperature_2m&current_weather=true");
const d = await r.json();

cache.m=d;
renderM(d);

}catch(e){
temp.innerText="Error";
}
}

function renderM(d){
temp.innerText=Math.round(d.current_weather.temperature)+"°";

let t=d.hourly.temperature_2m.slice(0,12);

if(charts.t) charts.t.destroy();
charts.t=new Chart(ct,{
type:'line',
data:{labels:t.map((_,i)=>i),datasets:[{data:t}]},
options:{plugins:{legend:{display:false}}}
});
}

/* ===== LUZ ===== */
async function loadL(){
try{

if(cache.l) return renderL(cache.l);

const r = await fetch(proxy + encodeURIComponent("https://api.preciodelaluz.org/v1/prices/all?zone=PCB"));
const d = await r.json();

const prices=Object.values(d).map(x=>x.price/1000);

cache.l=prices;
renderL(prices);

}catch(e){
now.innerText="Error";
}
}

function renderL(p){
let h=new Date().getHours();

now.innerText=p[h].toFixed(4)+"€";
min.innerText=Math.min(...p).toFixed(4);
max.innerText=Math.max(...p).toFixed(4);

if(charts.l) charts.l.destroy();
charts.l=new Chart(cl,{
type:'bar',
data:{labels:p.map((_,i)=>i),datasets:[{data:p}]},
options:{plugins:{legend:{display:false}}}
});
}

/* ===== GASOLINERAS ===== */
async function loadG(){

gas.innerHTML="<tr><td>Cargando datos...</td></tr>";

try{

const url="https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04";

const r = await fetch(proxy + encodeURIComponent(url));
const d = await r.json();

/* PROCESADO SEGURO */
let list = d.ListaEESSPrecio
.filter(e => (e.Municipio||"").toUpperCase().includes("ALMER"))
.map(e => {

const g95 = parseFloat((e["Precio Gasolina 95 E5"]||"0").replace(",","."));
const dsl = parseFloat((e["Precio Gasoleo A"]||"0").replace(",","."));

return {
name: e["Rótulo"] || "N/A",
dir: e["Dirección"] || "",
g95,
dsl
};

})
.filter(e => e.g95 > 0)
.sort((a,b)=>a.g95-b.g95)
.slice(0,10);

/* RENDER */
gas.innerHTML = list.map(e=>`
<tr>
<td>
<b>${e.name}</b><br>
<small>${e.dir}</small>
</td>
<td class="price">
95: ${e.g95.toFixed(3)}€<br>
DSL: ${e.dsl.toFixed(3)}€
</td>
</tr>
`).join("");

}catch(err){

gas.innerHTML=`
<tr>
<td>
⚠ Error cargando datos<br>
<small>Reintentando...</small>
</td>
</tr>`;

setTimeout(loadG,3000);
}
}

/* AUTO REFRESH */
setInterval(loadL,60000);
setInterval(loadM,300000);
setInterval(loadG,300000);

loadM();

</script>

</body>
</html>
