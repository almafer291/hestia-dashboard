<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA | Atelier Nero v900</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&family=Playfair+Display:ital,wght@1,500;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #070707;
            --accent: #D4AF37; 
            --border: #121212;
            --text: #FFFFFF;
            --text-dim: #444444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* SIDEBAR ATELIER */
        aside {
            width: 80px; background: #000; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 40px;
        }
        .brand { text-align: center; margin-bottom: 20px; }
        .llama { color: var(--accent); font-size: 1.5rem; margin-bottom: 5px; display: block; }
        .hestia-txt { 
            font-family: 'Playfair Display', serif; font-style: italic; 
            font-size: 0.7rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
        }

        nav { display: flex; flex-direction: column; gap: 30px; }
        .nav-item { 
            color: var(--text-dim); font-size: 1.6rem; cursor: pointer; transition: 0.3s; 
            display: flex; flex-direction: column; align-items: center;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item:hover { color: #fff; }

        /* CONTENIDO */
        main { flex: 1; overflow-y: auto; padding: 40px; }
        .panel { display: none; animation: fadeIn 0.4s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 500; font-size: 2.5rem; margin-bottom: 30px; color: var(--accent); }

        /* GRID SISTEMA */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 25px; }
        
        .label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 10px; display: block; }
        .value { font-size: 2.5rem; font-weight: 200; color: #fff; }
        .unit { font-size: 0.9rem; color: var(--text-dim); margin-left: 4px; }

        /* FUEL MAX DATA */
        .fuel-card { border-left: 2px solid var(--accent); }
        .fuel-prices { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .f-box { display: flex; flex-direction: column; }
        .f-val { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
        .f-type { font-size: 0.5rem; color: var(--text-dim); text-transform: uppercase; }

        /* ENERGÍA LINE */
        .e-chart { display: flex; align-items: flex-end; gap: 3px; height: 120px; margin-top: 20px; }
        .e-bar { flex: 1; background: #111; border-radius: 1px; }
        .e-bar.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            aside { width: 100%; height: 70px; flex-direction: row; justify-content: space-between; padding: 0 25px; position: fixed; bottom: 0; z-index: 100; border-right: none; border-top: 1px solid var(--border); }
            nav { flex-direction: row; gap: 40px; }
            main { padding: 20px 20px 100px 20px; }
        }
    </style>
</head>
<body>

<aside>
    <div class="brand">
        <i class="ph-fill ph-fire llama"></i>
        <span class="hestia-txt">Hestia</span>
    </div>
    <nav>
        <i class="ph-bold ph-cloud-sun nav-item active" onclick="tab('clima', this)"></i>
        <i class="ph-bold ph-lightning nav-item" onclick="tab('energia', this)"></i>
        <i class="ph-bold ph-gas-pump nav-item" onclick="tab('fuel', this)"></i>
        <i class="ph-bold ph-cpu nav-item" onclick="tab('reles', this)"></i>
    </nav>
</aside>

<main>
    <div id="clima" class="panel active">
        <h2>Atmosphere</h2>
        <div class="grid">
            <div class="card" style="grid-column: span 2;">
                <span class="label">Temperatura Almería</span>
                <div class="value" id="w-temp">--<span class="unit">°C</span></div>
                <p id="w-desc" style="color:var(--accent); font-size: 0.8rem; margin-top: 10px;">Cargando condiciones...</p>
            </div>
            <div class="card"><span class="label">Humedad</span><div class="value" id="w-hum">--<span class="unit">%</span></div></div>
            <div class="card"><span class="label">UV Index</span><div class="value" id="w-uv">--</div></div>
            <div class="card"><span class="label">Viento</span><div class="value" id="w-wind">--<span class="unit">km/h</span></div></div>
            <div class="card"><span class="label">Presión</span><div class="value" style="font-size: 1.8rem;" id="w-pres">--<span class="unit">hPa</span></div></div>
        </div>
    </div>

    <div id="energia" class="panel">
        <h2>Energy</h2>
        <div class="grid">
            <div class="card" style="grid-column: span 2;">
                <span class="label">Precio PVPC Actual</span>
                <div class="value" id="e-now" style="color: var(--accent);">--<span class="unit">€/kWh</span></div>
                <div class="e-chart" id="e-chart"></div>
            </div>
            <div class="card"><span class="label">Mínimo Hoy</span><div class="value" style="font-size: 1.8rem; color:#4CAF50;" id="e-min">--</div></div>
            <div class="card"><span class="label">Máximo Hoy</span><div class="value" style="font-size: 1.8rem; color:#FF5252;" id="e-max">--</div></div>
        </div>
    </div>

    <div id="fuel" class="panel">
        <h2>Market</h2>
        <div class="grid" id="f-container"></div>
    </div>

    <div id="reles" class="panel">
        <h2>Domotics</h2>
        <div class="grid">
            <div class="card" style="cursor:pointer;" onclick="this.style.borderColor='var(--accent)'">
                <span class="label">BT_Relay_01</span>
                <div class="value" style="font-size: 1.5rem;">Carga Vehículo</div>
                <p style="color: var(--text-dim); font-size: 0.7rem; margin-top: 10px;">TAP TO TOGGLE</p>
            </div>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAhKc7R97_ph2VQOq-uLMXFv-Wnyy0srXw",
        projectId: "hestia-31da3",
        appId: "1:577704397868:web:e83026e730640a0bc1d589"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // FUEL MAX DATA
    onSnapshot(doc(db, "market", "fuel"), (snap) => {
        const data = snap.data();
        if (data && data.stations) {
            const sorted = data.stations
                .filter(s => s['Precio Gasolina 95 E5'])
                .sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.')))
                .slice(0, 12);
            
            document.getElementById('f-container').innerHTML = sorted.map(s => `
                <div class="card fuel-card">
                    <span class="label">${s['Rótulo']}</span>
                    <p style="font-size: 0.65rem; color: #555; height: 30px; overflow: hidden;">${s['Dirección']}</p>
                    <div class="fuel-prices">
                        <div class="f-box"><span class="f-type">Gas 95</span><span class="f-val">${s['Precio Gasolina 95 E5']}€</span></div>
                        <div class="f-box" style="text-align:right"><span class="f-type">Diésel A</span><span class="f-val" style="color:#fff">${s['Precio Gasoleo A'] || '--'}€</span></div>
                    </div>
                </div>
            `).join('');
        }
    });

    async function getW() {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m,uv_index,surface_pressure&timezone=auto").then(r => r.json());
        const h = new Date().getHours();
        document.getElementById('w-temp').firstChild.textContent = Math.round(res.current_weather.temperature);
        document.getElementById('w-hum').firstChild.textContent = res.hourly.relativehumidity_2m[h];
        document.getElementById('w-uv').firstChild.textContent = res.hourly.uv_index[h];
        document.getElementById('w-wind').firstChild.textContent = res.current_weather.windspeed;
        document.getElementById('w-pres').firstChild.textContent = Math.round(res.hourly.surface_pressure[h]);
        
        const codes = { 0: "DESPEJADO", 1: "PARCIALMENTE NUBOSO", 3: "CUBIERTO", 61: "LLUVIA DÉBIL" };
        document.getElementById('w-desc').innerText = codes[res.current_weather.weathercode] || "DESPEJADO";
    }

    async function getE() {
        const hoy = new Date().toISOString().split('T')[0];
        const res = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${hoy}T00:00&end_date=${hoy}T23:59&time_trunc=hour`).then(r => r.json());
        const prices = res.included[0].attributes.values.map(v => v.value / 1000);
        const h = new Date().getHours();
        
        document.getElementById('e-now').firstChild.textContent = prices[h].toFixed(4);
        document.getElementById('e-min').innerText = Math.min(...prices).toFixed(4) + " €";
        document.getElementById('e-max').innerText = Math.max(...prices).toFixed(4) + " €";

        const max = Math.max(...prices);
        document.getElementById('e-chart').innerHTML = prices.map((p, i) => `
            <div class="e-bar ${i === h ? 'active' : ''}" style="height:${(p/max)*100}%"></div>
        `).join('');
    }

    window.tab = (id, btn) => {
        document.querySelectorAll('.panel, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    getW(); getE();
</script>
</body>
</html>
