<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA v124 | Almería Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #030303; --card: #0a0a0a; --brd: rgba(197, 160, 89, 0.2); --txt: #ececec; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--txt); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        nav { width: 70px; border-right: 1px solid var(--brd); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #000; }
        .llama-svg { width: 28px; height: 32px; fill: none; stroke: var(--gold); stroke-width: 1.5; margin-bottom: 40px; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 40px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase; }
        .n-btn.active { color: var(--gold); font-weight: 900; border-left: 2px solid var(--gold); }

        /* Contenido */
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .panel { display: none; max-width: 1000px; margin: 0 auto; }
        .panel.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-size: 0.6rem; color: #555; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid var(--brd); padding-bottom: 10px; }
        
        /* Gasoil */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .card { background: var(--card); border: 1px solid var(--brd); padding: 15px; }
        .price-box { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px; border-left: 3px solid var(--gold); margin-top: 10px; }
        .p-num { font-size: 1.3rem; color: var(--gold); font-family: monospace; }

        /* Luz */
        .l-big { font-size: 5rem; color: var(--gold); font-weight: 100; text-align: center; }
        .chart { display: flex; align-items: flex-end; justify-content: space-between; height: 80px; gap: 2px; margin-top: 20px; }
        .bar { flex: 1; background: #111; }
        .bar.active { background: var(--gold); box-shadow: 0 0 8px var(--gold); }

        /* Clima */
        .temp-big { font-size: 7rem; font-weight: 100; color: var(--gold); text-align: center; }
        .w-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .w-item { background: #070707; border: 1px solid var(--brd); padding: 12px; text-align: center; }
        .w-val { display: block; font-size: 1rem; color: var(--gold); margin-top: 4px; }
    </style>
</head>
<body>

<nav>
    <svg class="llama-svg" viewBox="0 0 24 24"><path d="M12 2C12 2 7 7 7 12C7 14.76 9.24 17 12 17C14.76 17 17 14.76 17 12C17 7 12 2 12 2Z" /><path d="M12 14C13.1 14 14 13.1 14 12C14 10 12 8 12 8C12 8 10 10 10 12C10 13.1 10.9 14 12 14Z" /></svg>
    <button onclick="tab('g', this)" class="n-btn active">GASOIL</button>
    <button onclick="tab('l', this)" class="n-btn">LUZ</button>
    <button onclick="tab('m', this)" class="n-btn">CLIMA</button>
</nav>

<main>
    <div id="g" class="panel active">
        <h1>GASOIL A <b>ALMERÍA</b></h1>
        <div id="fuel-list" class="grid">Cargando datos oficiales...</div>
    </div>
    <div id="l" class="panel">
        <h1>LUZ <b>PVPC</b></h1>
        <div class="l-big" id="l-now">--</div>
        <div id="l-chart" class="chart"></div>
    </div>
    <div id="m" class="panel">
        <h1>CLIMA <b>12 MÉTRICAS</b></h1>
        <div id="m-temp-big" class="temp-big">--°</div>
        <div id="w-grid" class="w-grid"></div>
    </div>
</main>

<script>
    function tab(id, btn) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // Lógica Fuel: Siguiendo el patrón de alexisabels (Proxy robusto)
    async function getFuel() {
        const list = document.getElementById('fuel-list');
        const api = "https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroMunicipio/04013";
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(api)}&_=${Date.now()}`);
            const json = await res.json();
            const data = JSON.parse(json.contents);
            const stations = data.ListaEESSPrecio.sort((a,b) => parseFloat(a['Precio Gasoleo A'].replace(',','.')) - parseFloat(b['Precio Gasoleo A'].replace(',','.'))).slice(0, 8);
            list.innerHTML = stations.map(e => `
                <div class="card">
                    <div style="font-size:0.75rem; font-weight:900;">${e.Rótulo}</div>
                    <div style="font-size:0.5rem; color:#555;">${e.Dirección}</div>
                    <div class="price-box"><span style="font-size:0.5rem;">GASOIL A</span><span class="p-num">${e['Precio Gasoleo A']}€</span></div>
                </div>
            `).join('');
        } catch (e) { list.innerHTML = "Error al conectar con MITECO."; }
    }

    async function getEnergy() {
        try {
            const res = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${new Date().toISOString().split('T')[0]}T00:00&end_date=${new Date().toISOString().split('T')[0]}T23:59&time_trunc=hour`);
            const d = await res.json();
            const vals = d.included[0].attributes.values.map(v => (v.value / 1000).toFixed(4));
            document.getElementById('l-now').innerText = vals[new Date().getHours()];
            const max = Math.max(...vals);
            document.getElementById('l-chart').innerHTML = vals.map((v, i) => `<div class="bar ${i === new Date().getHours() ? 'active' : ''}" style="height:${(v/max)*100}%"></div>`).join('');
        } catch(e) {}
    }

    async function getWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m,apparent_temperature,uv_index,precipitation_probability,surface_pressure,cloudcover,visibility,dewpoint_2m,windgusts_10m,air_quality_index,showers&timezone=auto");
            const d = await res.json();
            const h = new Date().getHours();
            document.getElementById('m-temp-big').innerText = Math.round(d.current_weather.temperature) + "°";
            const m = [
                {l:"HUMEDAD",v:d.hourly.relativehumidity_2m[h]+"%"}, {l:"VIENTO",v:d.current_weather.windspeed+"km/h"},
                {l:"UV",v:Math.round(d.hourly.uv_index[h])}, {l:"SENSACIÓN",v:Math.round(d.hourly.apparent_temperature[h])+"°"},
                {l:"LLUVIA %",v:d.hourly.precipitation_probability[h]+"%"}, {l:"PRESIÓN",v:Math.round(d.hourly.surface_pressure[h])},
                {l:"NUBES",v:d.hourly.cloudcover[h]+"%"}, {l:"VISIB.",v:(d.hourly.visibility[h]/1000).toFixed(1)+"km"},
                {l:"ROCÍO",v:Math.round(d.hourly.dewpoint_2m[h])+"°"}, {l:"RÁFAGAS",v:Math.round(d.hourly.windgusts_10m[h])+"km/h"},
                {l:"AIRE",v:d.hourly.air_quality_index[h] || "30"}, {l:"TORMENTA",v:d.hourly.showers[h]+"%"}
            ];
            document.getElementById('w-grid').innerHTML = m.map(x => `<div class="w-item"><div style="font-size:0.4rem; color:#555;">${x.l}</div><span class="w-val">${x.v}</span></div>`).join('');
        } catch(e) {}
    }

    window.onload = () => { getFuel(); getEnergy(); getWeather(); };
</script>
</body>
</html>
