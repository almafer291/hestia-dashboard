<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v70 | Almería</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166,124,82,0.2); }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 65px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #050505; flex-shrink: 0; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 40px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.7rem; letter-spacing: 2px; }
        .n-btn.active { color: var(--bronce); font-weight: bold; }
        main { flex: 1; padding: 20px; overflow-y: auto; background: #000; display: flex; flex-direction: column; }
        .panel { display: none; width: 100%; height: 100%; }
        .panel.active { display: block; }
        .card { background: #0a0a0a; border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--bronce); text-align: center;}
        h1 { font-size: 0.9rem; color: var(--bronce); letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
        
        /* Contenedores para que los widgets se adapten al modo oscuro */
        .widget-box { width: 100%; border-radius: 15px; overflow: hidden; background: #fff; filter: invert(0.9) hue-rotate(180deg); }
    </style>
</head>
<body>

<nav>
    <button class="n-btn active" onclick="tab('m', this)">CLIMA</button>
    <button class="n-btn" onclick="tab('g', this)">FUEL</button>
    <button class="n-btn" onclick="tab('l', this)">LUZ</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h1>Almería Live</h1>
        <div class="card"><div style="font-size:4rem;" id="t">--°</div><p>SISTEMA ONLINE</p></div>
    </div>

    <div id="g" class="panel">
        <h1>Gasolineras Almería</h1>
        <div class="card">
            <p style="font-size: 0.8rem; color: #888; margin-bottom: 15px;">Precios Gasolina 95 Hoy</p>
            <iframe src="https://www.dieselogasolina.com/widgets/precios-municipio.php?id=184" width="100%" height="300" frameborder="0" style="border-radius:10px;"></iframe>
        </div>
    </div>

    <div id="l" class="panel">
        <h1>Precio Luz Hoy</h1>
        <div class="card">
            <iframe src="https://preciodelaluz.org/widget/today.html" width="100%" height="250" frameborder="0" style="border-radius:10px;"></iframe>
        </div>
    </div>
</main>

<script>
    function tab(id, b) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        b.classList.add('active');
        if(id==='m') loadM();
    }

    async function loadM() {
        const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true');
        const d = await r.json();
        document.getElementById('t').innerText = Math.round(d.current_weather.temperature)+'°';
    }

    window.onload = loadM;
</script>
</body>
</html>
