<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HestiaLake | Organic Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bronce: #b87333;
            --bronce-light: #d9a06f;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(217, 160, 111, 0.2);
            --bg: #080808;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at bottom right, #2a1b10 0%, #080808 60%);
            color: #e0e0e0; margin: 0; display: flex; min-height: 100vh;
        }

        /* --- MENÚ LATERAL ORGÁNICO --- */
        nav {
            width: 260px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            position: fixed; height: 100vh;
        }

        .logo-area { text-align: center; margin-bottom: 50px; }
        .logo-svg { width: 70px; filter: drop-shadow(0 0 15px var(--bronce)); }
        .brand { font-family: 'Cinzel', serif; font-size: 1.5rem; letter-spacing: 4px; color: var(--bronce-light); margin-top: 10px; }

        .nav-btn {
            background: none; border: none; color: #888;
            padding: 15px; text-align: left; font-family: 'Cinzel', serif;
            cursor: pointer; transition: 0.4s; border-radius: 15px;
            margin-bottom: 5px; font-size: 0.9rem;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--glass); color: var(--bronce-light); padding-left: 25px; }

        /* --- CONTENIDO PRINCIPAL --- */
        main { flex: 1; margin-left: 300px; padding: 40px; }

        .panel { display: none; animation: fadeIn 0.8s ease forwards; }
        .panel.active { display: block; }

        .card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 30px; margin-bottom: 25px;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 { font-family: 'Cinzel'; color: var(--bronce-light); font-weight: 400; margin-top: 0; }

        /* --- CONTROLES RELÉ --- */
        .relay-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .relay-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 20px; text-align: center;
        }
        .switch {
            position: relative; display: inline-block; width: 50px; height: 26px; margin-top: 10px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--bronce); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* --- TABLAS GASOLINERA --- */
        .gas-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .gas-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .p-gas { color: #fff; font-weight: bold; }
        .p-die { color: var(--bronce-light); font-weight: bold; }

        /* --- METEO FORECAST --- */
        .forecast { display: flex; justify-content: space-between; margin-top: 20px; }
        .f-day { text-align: center; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; width: 30%; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <div class="logo-area">
        <svg class="logo-svg" viewBox="0 0 100 100" fill="none">
            <path d="M50 10C50 10 80 40 80 65C80 81 67 94 50 94C33 94 20 81 20 65C20 40 50 10 50 10Z" fill="url(#L)" />
            <path d="M50 45C50 45 60 55 60 70C60 75 56 79 50 79C44 79 40 75 40 70C40 55 50 45 50 45Z" fill="white" opacity="0.4"/>
            <defs><linearGradient id="L" x1="50" y1="10" x2="50" y2="94"><stop stop-color="#d9a06f"/><stop offset="1" stop-color="#b87333"/></linearGradient></defs>
        </svg>
        <div class="brand">HESTIALAKE</div>
    </div>
    <button class="nav-btn active" onclick="tab('meteo', this)">Estación Meteo</button>
    <button class="nav-btn" onclick="tab('luz', this)">Precio Energía</button>
    <button class="nav-btn" onclick="tab('gas', this)">Gasolineras</button>
    <button class="nav-btn" onclick="tab('reles', this)">Control Relés</button>
</nav>

<main>
    <div id="meteo" class="panel active">
        <div class="card">
            <h2>Tiempo en Almería</h2>
            <div style="display: flex; align-items: center; gap: 40px;">
                <div style="font-size: 4rem; font-weight: 200;" id="curr-temp">--°C</div>
                <div>
                    <div id="curr-desc" style="text-transform: uppercase; letter-spacing: 2px;">Sincronizando...</div>
                    <small>Interior Casa: 23.1°C | Humedad: 48%</small>
                </div>
            </div>
            <div class="forecast" id="forecast-area">
                </div>
        </div>
    </div>

    <div id="luz" class="panel">
        <div class="card">
            <h2>Precio de la Luz (Hoy)</h2>
            <canvas id="luzChart" height="100"></canvas>
            <div style="text-align: center; margin-top: 20px;">
                <small>Precio Actual:</small>
                <div id="luz-actual" style="font-size: 2.5rem; color: var(--bronce-light);">-- €/kWh</div>
            </div>
        </div>
    </div>

    <div id="gas" class="panel">
        <div class="card">
            <h2>Combustible en Almería Capital</h2>
            <table class="gas-table">
                <thead>
                    <tr style="color: var(--bronce-light); font-size: 0.7rem; letter-spacing: 1px;">
                        <th align="left">ESTACIÓN</th>
                        <th align="right">G95</th>
                        <th align="right">DIESEL</th>
                    </tr>
                </thead>
                <tbody id="gas-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="reles" class="panel">
        <div class="card">
            <h2>Control Maestro de Relés</h2>
            <div class="relay-grid">
                <div class="relay-card">
                    <small>RELÉ 1</small><br><b>Salón</b><br>
                    <label class="switch"><input type="checkbox" onchange="toggleRelay(1, this.checked)"><span class="slider"></span></label>
                </div>
                <div class="relay-card">
                    <small>RELÉ 2</small><br><b>Caldera</b><br>
                    <label class="switch"><input type="checkbox" onchange="toggleRelay(2, this.checked)"><span class="slider"></span></label>
                </div>
                <div class="relay-card">
                    <small>RELÉ 3</small><br><b>Riego</b><br>
                    <label class="switch"><input type="checkbox" onchange="toggleRelay(3, this.checked)"><span class="slider"></span></label>
                </div>
                <div class="relay-card">
                    <small>RELÉ 4</small><br><b>Luces</b><br>
                    <label class="switch"><input type="checkbox" onchange="toggleRelay(4, this.checked)"><span class="slider"></span></label>
                </div>
                <div class="relay-card">
                    <small>RELÉ 5</small><br><b>Puerta</b><br>
                    <label class="switch"><input type="checkbox" onchange="toggleRelay(5, this.checked)"><span class="slider"></span></label>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    let chart;

    function tab(id, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'luz') loadLuz();
        if(id === 'gas') loadGas();
        if(id === 'meteo') loadMeteo();
    }

    // --- ENERGÍA CON GRÁFICA ---
    async function loadLuz() {
        try {
            const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.preciodelaluz.org/v1/prices/all?zone=PCB'));
            const d = JSON.parse((await res.json()).contents);
            const labels = Object.keys(d).map(h => h.split('-')[0] + 'h');
            const values = Object.values(d).map(o => o.price / 1000);
            
            const hour = new Date().getHours();
            document.getElementById('luz-actual').innerText = values[hour].toFixed(4) + ' €/kWh';

            if(chart) chart.destroy();
            const ctx = document.getElementById('luzChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Precio €/kWh',
                        data: values,
                        borderColor: '#b87333',
                        backgroundColor: 'rgba(184, 115, 51, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        } catch(e) { console.error("Error luz"); }
    }

    // --- GASOLINERAS (GASOLINA + DIESEL) ---
    async function loadGas() {
        const body = document.getElementById('gas-body');
        try {
            const res = await fetch('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04');
            const data = await res.json();
            const capital = data.ListaEESSPrecio.filter(e => e.Municipio.toUpperCase() === "ALMERÍA").slice(0, 12);

            body.innerHTML = capital.map(e => `
                <tr>
                    <td><b>${e.Rótulo}</b><br><small>${e.Dirección}</small></td>
                    <td align="right" class="p-gas">${e['Precio Gasolina 95 E5'] || '--'}€</td>
                    <td align="right" class="p-die">${e['Precio Gasoleo A'] || '--'}€</td>
                </tr>
            `).join('');
        } catch(e) { body.innerHTML = "Error cargando datos oficiales."; }
    }

    // --- METEO + PREVISIÓN ---
    async function loadMeteo() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.45&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=Europe/Madrid');
            const d = await res.json();
            document.getElementById('curr-temp').innerText = d.current_weather.temperature + "°C";
            document.getElementById('curr-desc').innerText = "Viento: " + d.current_weather.windspeed + " km/h";

            let html = '';
            for(let i=1; i<4; i++) {
                html += `
                <div class="f-day">
                    <small>Día ${i}</small>
                    <div style="color:var(--bronce-light); font-weight:600">${d.daily.temperature_2m_max[i]}°</div>
                    <div style="font-size:0.7rem">${d.daily.temperature_2m_min[i]}°</div>
                </div>`;
            }
            document.getElementById('forecast-area').innerHTML = html;
        } catch(e) {}
    }

    function toggleRelay(num, state) {
        console.log(`HestiaLake: Relé ${num} cambiado a ${state ? 'ENCENDIDO' : 'APAGADO'}`);
        // Aquí iría el envío por MQTT o API a tu ESP32/Raspberry
    }

    loadMeteo(); // Carga inicial
</script>
</body>
</html>
