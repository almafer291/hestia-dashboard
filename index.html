<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATELIER NERO | v1200 Ultra-Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #080808;
            --accent: #D4AF37; 
            --border: #151515;
            --text: #FFFFFF;
            --text-dim: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR / NAV RESPONSIVE */
        aside { width: 240px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 20px; transition: 0.3s; }
        .llama-box { color: var(--accent); font-size: 1.8rem; margin-bottom: 50px; }
        nav { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-item { 
            display: flex; align-items: center; gap: 15px; color: var(--text-dim); padding: 12px 15px; 
            border-radius: 4px; cursor: pointer; transition: 0.2s; font-size: 0.7rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
        }
        .nav-item.active { color: var(--accent); background: rgba(212, 175, 55, 0.05); border-right: 2px solid var(--accent); }
        .v-tag { font-size: 0.5rem; color: #1a1a1a; letter-spacing: 5px; text-transform: uppercase; margin-top: auto; }

        /* MAIN AREA */
        main { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .panel { display: none; max-width: 1200px; margin: 0 auto; }
        .panel.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .section-label { font-size: 0.6rem; color: var(--accent); letter-spacing: 6px; text-transform: uppercase; font-weight: 900; margin-bottom: 30px; }

        /* GRID SYSTEM RESPONSIVE */
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        .tile { background: var(--surface); padding: 25px; display: flex; flex-direction: column; position: relative; }
        .t-lab { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 12px; }
        .t-val { font-size: 3rem; font-weight: 100; color: #fff; line-height: 1; letter-spacing: -2px; }
        .t-unit { font-size: 0.8rem; color: var(--text-dim); font-weight: 400; margin-left: 4px; }

        /* BRÚJULA */
        .compass-box { width: 80px; height: 80px; border: 1px solid #111; border-radius: 50%; position: relative; margin: 10px auto; }
        .needle { position: absolute; top: 50%; left: 50%; width: 2px; height: 35px; background: linear-gradient(to bottom, var(--accent) 50%, transparent 50%); transform-origin: top center; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); margin-left: -1px; }

        /* ENERGÍA CHART */
        .chart-container { grid-column: span 12; padding: 30px; background: #030303; }
        .bars { display: flex; align-items: flex-end; gap: 3px; height: 140px; }
        .bar { flex: 1; background: #111; border-radius: 1px; position: relative; cursor: pointer; transition: 0.2s; }
        .bar:hover, .bar:active { background: #333; }
        .bar.active { background: var(--accent); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        .bar:hover::before { content: attr(data-info); position: absolute; top: -40px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; font-size: 0.6rem; font-weight: 900; padding: 4px 8px; border-radius: 2px; white-space: nowrap; z-index: 10; }

        /* FUEL MOBILE */
        .fuel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .f-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; transition: 0.3s; }
        .f-prices { display: flex; justify-content: space-between; margin-top: 20px; border-top: 1px solid #111; padding-top: 15px; }
        .f-p { font-size: 1.5rem; font-weight: 200; color: var(--accent); }

        /* MOBILE OVERRIDES */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            aside { width: 100%; height: 70px; flex-direction: row; padding: 0 20px; border-right: none; border-top: 1px solid var(--border); position: fixed; bottom: 0; order: 2; justify-content: space-between; align-items: center; }
            .llama-box { margin-bottom: 0; font-size: 1.4rem; }
            nav { flex-direction: row; justify-content: flex-end; gap: 25px; }
            .nav-item { padding: 10px; gap: 0; }
            .nav-item span, .v-tag { display: none; }
            main { padding: 20px 20px 100px 20px; order: 1; }
            .grid { grid-template-columns: 1fr; gap: 2px; }
            .tile { grid-column: span 1 !important; padding: 20px; }
            .t-val { font-size: 2.5rem; }
            .chart-container { padding: 20px 10px; }
        }
    </style>
</head>
<body>

<aside>
    <div class="llama-box"><i class="ph-fill ph-fire"></i></div>
    <nav>
        <div class="nav-item active" onclick="tab('clima', this)"><i class="ph-bold ph-wind"></i><span>Clima</span></div>
        <div class="nav-item" onclick="tab('energia', this)"><i class="ph-bold ph-lightning-vertical"></i><span>Energía</span></div>
        <div class="nav-item" onclick="tab('fuel', this)"><i class="ph-bold ph-gas-pump"></i><span>Mercado</span></div>
        <div class="nav-item" onclick="tab('reles', this)"><i class="ph-bold ph-hard-drives"></i><span>Nodos</span></div>
    </nav>
    <div class="v-tag">Atelier Nero v1200</div>
</aside>

<main>
    <div id="clima" class="panel active">
        <div class="section-label">Atmospheric Control</div>
        <div class="grid">
            <div class="tile" style="grid-column: span 8;"><span class="t-lab">Exterior Almería</span><div class="t-val" id="w-temp">--<span class="t-unit">°C</span></div><div id="w-desc" style="color:var(--accent); font-size:0.7rem; font-weight:800; margin-top:10px; letter-spacing:1px;">--</div></div>
            <div class="tile" style="grid-column: span 4; align-items:center;"><span class="t-lab">Viento</span><div class="compass-box"><div class="needle" id="needle"></div></div><div id="w-dir-txt" style="font-size:0.6rem; font-weight:800; color:var(--text-dim);">--</div></div>
            <div class="tile" style="grid-column: span 3;"><span class="t-lab">Humedad</span><div class="t-val" id="w-hum" style="font-size:1.8rem;">--<span class="t-unit">%</span></div></div>
            <div class="tile" style="grid-column: span 3;"><span class="t-lab">Sensación</span><div class="t-val" id="w-app" style="font-size:1.8rem;">--<span class="t-unit">°</span></div></div>
            <div class="tile" style="grid-column: span 3;"><span class="t-lab">UV</span><div class="t-val" id="w-uv" style="font-size:1.8rem;">--</div></div>
            <div class="tile" style="grid-column: span 3;"><span class="t-lab">Lluvia</span><div class="t-val" id="w-rain" style="font-size:1.8rem;">--<span class="t-unit">%</span></div></div>
        </div>
    </div>

    <div id="energia" class="panel">
        <div class="section-label">Grid Telemetry</div>
        <div class="grid">
            <div class="chart-container"><span class="t-lab">Precio Diario / Horas</span><div class="bars" id="e-chart"></div></div>
            <div class="tile" style="grid-column: span 12;"><span class="t-lab">Precio Actual</span><div class="t-val" id="e-now" style="color:var(--accent);">--</div><div id="e-status" style="font-size:0.6rem; font-weight:900; margin-top:10px; letter-spacing:2px;">--</div></div>
            <div class="tile" style="grid-column: span 6; border-right: 1px solid var(--border);"><span class="t-lab">Mínimo Hoy</span><div class="t-val" id="e-min" style="font-size:1.5rem; color:#4CAF50;">--</div><div id="e-min-h" style="font-size:0.5rem; color:var(--text-dim); margin-top:5px;">--</div></div>
            <div class="tile" style="grid-column: span 6;"><span class="t-lab">Máximo Hoy</span><div class="t-val" id="e-max" style="font-size:1.5rem; color:#FF5252;">--</div><div id="e-max-h" style="font-size:0.5rem; color:var(--text-dim); margin-top:5px;">--</div></div>
        </div>
    </div>

    <div id="fuel" class="panel"><div class="section-label">Fuel Market</div><div class="fuel-grid" id="f-container"></div></div>
    <div id="reles" class="panel"><div class="section-label">Nodes Control</div><div class="grid"><div class="tile" style="grid-column:span 4; border:1px solid var(--accent);"><span class="t-lab">BT_Node_01</span><div style="font-size:1.2rem; font-weight:300;">Módulo Relés</div><div style="margin-top:10px; font-size:0.6rem; color:var(--accent); font-weight:900;">ONLINE</div></div></div></div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhKc7R97_ph2VQOq-uLMXFv-Wnyy0srXw", projectId: "hestia-31da3", appId: "1:577704397868:web:e83026e730640a0bc1d589" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(doc(db, "market", "fuel"), (snap) => {
        const data = snap.data();
        if (data && data.stations) {
            const sorted = data.stations.filter(s => s['Precio Gasolina 95 E5']).sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.'))).slice(0, 10);
            document.getElementById('f-container').innerHTML = sorted.map(s => `<div class="f-card"><span class="t-lab">${s['Rótulo']}</span><p style="font-size:0.55rem; color:#444; margin-bottom:15px;">${s['Dirección']}</p><div class="f-prices"><div><span class="t-lab">G95</span><br><b class="f-p">${s['Precio Gasolina 95 E5']}€</b></div><div style="text-align:right"><span class="t-lab">D-A</span><br><b class="f-p" style="color:#fff">${s['Precio Gasoleo A'] || '--'}€</b></div></div></div>`).join('');
        }
    });

    async function getW() {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m,uv_index,apparent_temperature,precipitation_probability&timezone=auto").then(r => r.json());
        const h = new Date().getHours();
        document.getElementById('w-temp').firstChild.textContent = Math.round(res.current_weather.temperature);
        document.getElementById('w-hum').firstChild.textContent = res.hourly.relativehumidity_2m[h];
        document.getElementById('w-uv').innerText = res.hourly.uv_index[h];
        document.getElementById('w-app').firstChild.textContent = Math.round(res.hourly.apparent_temperature[h]);
        document.getElementById('w-rain').firstChild.textContent = res.hourly.precipitation_probability[h];
        document.getElementById('needle').style.transform = `rotate(${res.current_weather.winddirection}deg)`;
        document.getElementById('w-dir-txt').innerText = res.current_weather.winddirection + "°";
        const codes = { 0: "SKY CLEAR", 1: "MAINLY CLEAR", 3: "OVERCAST", 61: "LIGHT RAIN" };
        document.getElementById('w-desc').innerText = codes[res.current_weather.weathercode] || "STABLE";
    }

    async function getE() {
        const hoy = new Date().toISOString().split('T')[0];
        const res = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${hoy}T00:00&end_date=${hoy}T23:59&time_trunc=hour`).then(r => r.json());
        const prices = res.included[0].attributes.values.map(v => v.value / 1000);
        const h = new Date().getHours();
        const current = prices[h];
        const minVal = Math.min(...prices), maxVal = Math.max(...prices);
        const minH = prices.indexOf(minVal), maxH = prices.indexOf(maxVal);

        document.getElementById('e-now').innerText = current.toFixed(4) + " €";
        document.getElementById('e-min').innerText = minVal.toFixed(4) + " €";
        document.getElementById('e-min-h').innerText = `Ocurrió a las ${minH}:00h`;
        document.getElementById('e-max').innerText = maxVal.toFixed(4) + " €";
        document.getElementById('e-max-h').innerText = `Ocurrió a las ${maxH}:00h`;
        document.getElementById('e-status').innerText = current < (prices.reduce((a,b)=>a+b)/24) ? "PERIODO VALLE" : "PERIODO PUNTA";
        document.getElementById('e-status').style.color = current < (prices.reduce((a,b)=>a+b)/24) ? "#4CAF50" : "#FF5252";

        const max = Math.max(...prices);
        document.getElementById('e-chart').innerHTML = prices.map((p, i) => `<div class="bar ${i === h ? 'active' : ''}" style="height:${(p/max)*100}%" data-info="${i}:00h | ${p.toFixed(4)}€"></div>`).join('');
    }

    window.tab = (id, btn) => {
        document.querySelectorAll('.panel, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    getW(); getE();
    setInterval(() => { getW(); getE(); }, 300000);
</script>
</body>
</html>
