<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA v500 | Ardusens Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --border: #222222;
            --accent: #ff4d00; /* Naranja Ardusens */
            --blue: #00a2ff;
            --green: #2ecc71;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden;
        }

        /* SIDEBAR TÁCTIL */
        nav { 
            width: 90px; background: #050505; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 35px;
        }
        .logo { 
            width: 50px; height: 50px; background: var(--accent); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255, 77, 0, 0.4); margin-bottom: 10px;
        }
        .logo i { color: white; font-size: 2rem; }

        .nav-link { color: #444; font-size: 1.8rem; cursor: pointer; transition: 0.2s; }
        .nav-link.active { color: var(--accent); }

        /* CONTENIDO DASHBOARD */
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .panel { display: none; }
        .panel.active { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }

        /* TARJETAS ESTILO ARDUSENS */
        .card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 16px; padding: 25px; display: flex; flex-direction: column; justify-content: center;
        }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; color: #888; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; font-weight: 700; }
        .card-header i { font-size: 1.2rem; color: var(--blue); }
        
        .val { font-size: 3.5rem; font-weight: 900; line-height: 1; letter-spacing: -2px; }
        .unit { font-size: 1rem; color: #555; margin-left: 5px; font-weight: 400; letter-spacing: 0; }

        /* BRÚJULA TÉCNICA */
        .compass-container { position: relative; width: 140px; height: 140px; margin: 0 auto; border: 2px solid #222; border-radius: 50%; }
        .needle { 
            position: absolute; top: 10%; left: 49%; width: 3px; height: 40%; 
            background: var(--blue); border-radius: 10px; transform-origin: 50% 100%; transition: 1s;
        }

        /* GRÁFICA ENERGÍA */
        .chart-box { display: flex; align-items: flex-end; gap: 4px; height: 100px; margin-top: 20px; }
        .bar { flex: 1; background: #222; border-radius: 2px; position: relative; }
        .bar.active { background: var(--accent); }

        /* TABLA GASOLINERAS ARDUSENS */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #444; font-size: 0.7rem; text-transform: uppercase; border-bottom: 1px solid #222; }
        td { padding: 18px 15px; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; }
        .p-main { color: var(--green); font-weight: 900; font-size: 1.2rem; }
    </style>
</head>
<body>

<nav>
    <div class="logo"><i class="ph-fill ph-fire"></i></div>
    <i class="ph-bold ph-house-line nav-link active" onclick="tab('home', this)"></i>
    <i class="ph-bold ph-lightning nav-link" onclick="tab('energy', this)"></i>
    <i class="ph-bold ph-gas-pump nav-link" onclick="tab('gas', this)"></i>
</nav>

<main>
    <div id="home" class="panel active">
        <div class="card" style="grid-column: span 4; border-left: 5px solid var(--blue);">
            <div class="card-header"><i class="ph-bold ph-thermometer"></i> Temperatura</div>
            <div class="val" id="t-temp">--<span class="unit">°C</span></div>
        </div>
        <div class="card" style="grid-column: span 4;">
            <div class="card-header"><i class="ph-bold ph-drop"></i> Humedad</div>
            <div class="val" id="t-hum">--<span class="unit">%</span></div>
        </div>
        <div class="card" style="grid-column: span 4;">
            <div class="card-header"><i class="ph-bold ph-sun"></i> UV Index</div>
            <div class="val" id="t-uv">--</div>
        </div>
        
        <div class="card" style="grid-column: span 6; text-align: center;">
            <div class="card-header"><i class="ph-bold ph-compass"></i> Dirección Viento</div>
            <div class="compass-container">
                <div class="needle" id="t-needle"></div>
            </div>
            <div style="margin-top: 15px; font-weight: 800; font-size: 1.2rem;" id="t-wind-txt">-- km/h</div>
        </div>

        <div class="card" style="grid-column: span 3;">
            <div class="card-header"><i class="ph-bold ph-gauge"></i> Presión</div>
            <div class="val" style="font-size: 2.2rem;" id="t-pres">--<span class="unit">hPa</span></div>
        </div>
        <div class="card" style="grid-column: span 3;">
            <div class="card-header"><i class="ph-bold ph-cloud-rain"></i> Lluvia</div>
            <div class="val" style="font-size: 2.2rem;" id="t-rain">--<span class="unit">%</span></div>
        </div>
    </div>

    <div id="energy" class="panel">
        <div class="card" style="grid-column: span 12; border-left: 5px solid var(--accent);">
            <div class="card-header"><i class="ph-bold ph-lightning" style="color: var(--accent);"></i> Precio PVPC Actual</div>
            <div class="val" id="e-now">--<span class="unit">€/kWh</span></div>
            <div class="chart-box" id="e-chart"></div>
        </div>
        <div class="card" style="grid-column: span 6;">
            <div class="card-header">Mínimo Hoy</div>
            <div class="val" style="font-size: 2rem; color: var(--green);" id="e-min">--</div>
        </div>
        <div class="card" style="grid-column: span 6;">
            <div class="card-header">Máximo Hoy</div>
            <div class="val" style="font-size: 2rem; color: #ff3e3e;" id="e-max">--</div>
        </div>
    </div>

    <div id="gas" class="panel">
        <div class="card" style="grid-column: span 12; padding: 0;">
            <div class="card-header" style="padding: 25px 25px 10px 25px;">Gasolineras Almería</div>
            <table>
                <thead>
                    <tr>
                        <th>Estación</th>
                        <th style="text-align: right;">G95</th>
                        <th style="text-align: right;">GasA</th>
                    </tr>
                </thead>
                <tbody id="g-body"></tbody>
            </table>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAhKc7R97_ph2VQOq-uLMXFv-Wnyy0srXw",
        projectId: "hestia-31da3",
        appId: "1:577704397868:web:e83026e730640a0bc1d589"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // GASOLINERAS (FIREBASE)
    onSnapshot(doc(db, "market", "fuel"), (snap) => {
        const data = snap.data();
        if (data && data.stations) {
            const sorted = data.stations
                .filter(s => s['Precio Gasolina 95 E5'])
                .sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.')))
                .slice(0, 10);
            
            document.getElementById('g-body').innerHTML = sorted.map(s => `
                <tr>
                    <td><b>${s['Rótulo']}</b><br><small style="color:#555">${s['Dirección'].toLowerCase()}</small></td>
                    <td style="text-align: right;" class="p-main">${s['Precio Gasolina 95 E5']}</td>
                    <td style="text-align: right; color:#888;">${s['Precio Gasoleo A'] || '--'}</td>
                </tr>
            `).join('');
        }
    });

    // CLIMA
    async function getW() {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m,uv_index,surface_pressure,precipitation_probability&timezone=auto").then(r => r.json());
        const h = new Date().getHours();
        document.getElementById('t-temp').firstChild.textContent = Math.round(res.current_weather.temperature);
        document.getElementById('t-hum').firstChild.textContent = res.hourly.relativehumidity_2m[h];
        document.getElementById('t-uv').innerText = res.hourly.uv_index[h];
        document.getElementById('t-pres').firstChild.textContent = Math.round(res.hourly.surface_pressure[h]);
        document.getElementById('t-rain').firstChild.textContent = res.hourly.precipitation_probability[h];
        document.getElementById('t-wind-txt').innerText = res.current_weather.windspeed + " km/h";
        document.getElementById('t-needle').style.transform = `rotate(${res.current_weather.winddirection}deg)`;
    }

    // ENERGÍA
    async function getE() {
        const hoy = new Date().toISOString().split('T')[0];
        const res = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${hoy}T00:00&end_date=${hoy}T23:59&time_trunc=hour`).then(r => r.json());
        const prices = res.included[0].attributes.values.map(v => v.value / 1000);
        const nowH = new Date().getHours();
        
        document.getElementById('e-now').firstChild.textContent = prices[nowH].toFixed(4);
        document.getElementById('e-min').innerText = Math.min(...prices).toFixed(4) + " €";
        document.getElementById('e-max').innerText = Math.max(...prices).toFixed(4) + " €";

        const max = Math.max(...prices);
        document.getElementById('e-chart').innerHTML = prices.map((p, i) => `
            <div class="bar ${i === nowH ? 'active' : ''}" style="height:${(p/max)*100}%"></div>
        `).join('');
    }

    window.tab = (id, btn) => {
        document.querySelectorAll('.panel, .nav-link').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    getW(); getE();
</script>
</body>
</html>
