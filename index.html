<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA v200 | Architect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #121212;
            --border: #2c2c2e;
            --accent: #ffffff;
            --dim: #636366;
            --red: #ff453a;
            --green: #32d74b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { 
            background: var(--bg); color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex; height: 100vh; overflow: hidden;
        }

        /* NAVEGACIÓN TÉCNICA */
        nav { 
            width: 70px; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 30px 0; gap: 40px;
        }
        .dot-logo { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); }
        .nav-link { color: var(--dim); font-size: 1.4rem; cursor: pointer; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { color: var(--accent); }

        /* CONTENIDO */
        main { flex: 1; padding: 40px 60px; overflow-y: auto; }
        .panel { display: none; }
        .panel.active { display: block; animation: flow 0.4s ease-out; }
        @keyframes flow { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-weight: 100; font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; color: var(--dim); margin-bottom: 30px; }

        /* GRID SISTEMÁTICO */
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .cell { background: var(--bg); padding: 30px; display: flex; flex-direction: column; }
        
        /* ENERGÍA DASHBOARD */
        .big-data { font-size: 4rem; font-weight: 700; letter-spacing: -2px; line-height: 1; }
        .unit { font-size: 1rem; color: var(--dim); font-weight: 400; letter-spacing: 0; margin-left: 10px; }
        
        .e-chart { display: flex; align-items: flex-end; height: 120px; gap: 3px; margin-top: 40px; }
        .e-bar { flex: 1; background: #222; position: relative; cursor: crosshair; }
        .e-bar:hover { background: var(--accent); }
        .e-bar.now { background: var(--dim); }
        .e-bar:hover::after {
            content: attr(data-val); position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            font-size: 10px; background: #fff; color: #000; padding: 2px 5px; font-weight: 700;
        }

        /* TABLA DE GASOLINERAS PRO */
        .fuel-scroll { max-height: 70vh; overflow-y: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 15px 20px; color: var(--dim); font-weight: 400; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 1px; font-size: 0.6rem; }
        td { padding: 20px; border-bottom: 1px solid var(--border); }
        tr:hover td { background: #0a0a0a; }
        .p-low { color: var(--green); font-weight: 700; }
        .p-high { color: var(--dim); }

        /* CLIMA */
        .w-main { font-size: 5rem; font-weight: 100; }
        .compass { width: 50px; height: 50px; border: 1px solid var(--border); border-radius: 50%; position: relative; }
        .needle { position: absolute; top: 5px; left: 50%; width: 1px; height: 20px; background: var(--accent); transform-origin: bottom; transition: 1s; }
    </style>
</head>
<body>

<nav>
    <div class="dot-logo"></div>
    <i class="ph ph-layout nav-link active" onclick="tab('m', this)"></i>
    <i class="ph ph-activity nav-link" onclick="tab('l', this)"></i>
    <i class="ph ph-list nav-link" onclick="tab('f', this)"></i>
</nav>

<main>
    <div id="m" class="panel active">
        <h2>Atmosphere / Almería</h2>
        <div class="grid">
            <div class="cell" style="grid-column: span 8;">
                <div class="w-main" id="m-temp">--°</div>
                <div id="m-desc" style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; color: var(--dim);">Sincronizando...</div>
            </div>
            <div class="cell" style="grid-column: span 4; align-items: center; justify-content: center;">
                <div class="compass"><div class="needle" id="m-needle"></div></div>
                <div style="margin-top: 15px; font-size: 0.8rem;" id="m-win">-- km/h</div>
            </div>
            <div class="cell" style="grid-column: span 4;"><span class="stat-lbl">Humedad</span><div class="stat-val" id="m-hum">--%</div></div>
            <div class="cell" style="grid-column: span 4;"><span class="stat-lbl">Presión</span><div class="stat-val" id="m-pres">-- hPa</div></div>
            <div class="cell" style="grid-column: span 4;"><span class="stat-lbl">UV</span><div class="stat-val" id="m-uv">--</div></div>
        </div>
    </div>

    <div id="l" class="panel">
        <h2>Smart Energy / PVPC</h2>
        <div class="grid">
            <div class="cell" style="grid-column: span 12;">
                <span style="color: var(--dim); font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;">Precio Actual</span>
                <div class="big-data" id="l-now">--<span class="unit">€/kWh</span></div>
                <div class="e-chart" id="l-chart"></div>
            </div>
            <div class="cell" style="grid-column: span 6;">
                <span style="color: var(--dim); font-size: 0.6rem; letter-spacing: 2px;">MÍNIMO HOY</span>
                <div style="font-size: 1.5rem; color: var(--green);" id="l-min">--</div>
            </div>
            <div class="cell" style="grid-column: span 6;">
                <span style="color: var(--dim); font-size: 0.6rem; letter-spacing: 2px;">MÁXIMO HOY</span>
                <div style="font-size: 1.5rem; color: var(--red);" id="l-max">--</div>
            </div>
        </div>
    </div>

    <div id="f" class="panel">
        <h2>Fuel Market / Almería Capital</h2>
        <div class="fuel-scroll">
            <table>
                <thead>
                    <tr>
                        <th>Estación</th>
                        <th>Dirección</th>
                        <th>Gasolina 95</th>
                        <th>Diésel A</th>
                    </tr>
                </thead>
                <tbody id="fuel-body">
                    </tbody>
            </table>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAhKc7R97_ph2VQOq-uLMXFv-Wnyy0srXw",
        projectId: "hestia-31da3",
        appId: "1:577704397868:web:e83026e730640a0bc1d589"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ESCUCHA DE GASOLINERAS (TODAS ORDENADAS)
    onSnapshot(doc(db, "market", "fuel"), (snap) => {
        const data = snap.data();
        if (data && data.stations) {
            const stations = data.stations
                .filter(s => s['Precio Gasolina 95 E5'])
                .sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.')));
            
            document.getElementById('fuel-body').innerHTML = stations.map(s => `
                <tr>
                    <td style="font-weight:700">${s['Rótulo']}</td>
                    <td style="color:var(--dim); font-size: 0.7rem;">${s['Dirección']}</td>
                    <td class="p-low">${s['Precio Gasolina 95 E5']}€</td>
                    <td class="p-high">${s['Precio Gasoleo A'] || '--'}€</td>
                </tr>
            `).join('');
        }
    });

    // LÓGICA DE CLIMA
    async function loadW() {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m,surface_pressure,uv_index,winddirection_10m&timezone=auto").then(r => r.json());
        const h = new Date().getHours();
        document.getElementById('m-temp').innerText = Math.round(res.current_weather.temperature) + "°";
        document.getElementById('m-hum').innerText = res.hourly.relativehumidity_2m[h] + "%";
        document.getElementById('m-pres').innerText = Math.round(res.hourly.surface_pressure[h]);
        document.getElementById('m-uv').innerText = res.hourly.uv_index[h];
        document.getElementById('m-win').innerText = res.current_weather.windspeed + " km/h";
        document.getElementById('m-needle').style.transform = `rotate(${res.current_weather.winddirection}deg)`;
        document.getElementById('m-desc').innerText = "Condiciones Actuales";
    }

    // LÓGICA DE ENERGÍA
    async function loadE() {
        const hoy = new Date().toISOString().split('T')[0];
        const res = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${hoy}T00:00&end_date=${hoy}T23:59&time_trunc=hour`).then(r => r.json());
        const prices = res.included[0].attributes.values.map(v => v.value / 1000);
        const nowH = new Date().getHours();
        
        document.getElementById('l-now').firstChild.textContent = prices[nowH].toFixed(4);
        document.getElementById('l-min').innerText = Math.min(...prices).toFixed(4) + " €";
        document.getElementById('l-max').innerText = Math.max(...prices).toFixed(4) + " €";

        const max = Math.max(...prices);
        document.getElementById('l-chart').innerHTML = prices.map((p, i) => `
            <div class="e-bar ${i === nowH ? 'now' : ''}" style="height:${(p/max)*100}%" data-val="${i}h: ${p.toFixed(4)}"></div>
        `).join('');
    }

    window.tab = (id, btn) => {
        document.querySelectorAll('.panel, .nav-link').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    loadW(); loadE();
</script>
</body>
</html>
