<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA v128</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #030303; --brd: rgba(197, 160, 89, 0.2); --txt: #ececec; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--txt); display: flex; height: 100vh; overflow: hidden; }
        nav { width: 70px; border-right: 1px solid var(--brd); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #000; flex-shrink: 0; }
        .llama-svg { width: 28px; height: 32px; fill: none; stroke: var(--gold); stroke-width: 1.5; margin-bottom: 50px; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 45px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase; transition: 0.3s; }
        .n-btn.active { color: var(--gold); font-weight: 900; border-left: 2px solid var(--gold); }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .panel { display: none; max-width: 1000px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h1 { font-size: 0.65rem; color: #555; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 30px; border-bottom: 1px solid var(--brd); padding-bottom: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: #0a0a0a; border: 1px solid var(--brd); padding: 20px; }
        .price-box { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 12px; margin-top: 10px; border-left: 3px solid var(--gold); }
        .p-num { font-size: 1.4rem; color: var(--gold); font-family: monospace; }
        .temp-big { font-size: 8rem; font-weight: 100; color: var(--gold); text-align: center; line-height: 1; }
        .w-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .w-item { background: #070707; border: 1px solid var(--brd); padding: 15px; text-align: center; }
        .w-val { display: block; font-size: 1rem; color: var(--gold); margin-top: 5px; }
        .err { font-size: 0.6rem; color: #d44; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<nav>
    <svg class="llama-svg" viewBox="0 0 24 24"><path d="M12 2C12 2 7 7 7 12C7 14.76 9.24 17 12 17C14.76 17 17 14.76 17 12C17 7 12 2 12 2Z" /><path d="M12 14C13.1 14 14 13.1 14 12C14 10 12 8 12 8C12 8 10 10 10 12C10 13.1 10.9 14 12 14Z" stroke-width="0.8" /></svg>
    <button onclick="tab('g', this)" class="n-btn active">GASOIL</button>
    <button onclick="tab('l', this)" class="n-btn">LUZ</button>
    <button onclick="tab('m', this)" class="n-btn">CLIMA</button>
</nav>

<main>
    <div id="g" class="panel active">
        <h1>DIESEL A <b>ALMERÍA</b></h1>
        <div id="fuel-list" class="grid"><div class="err">CONSULTANDO...</div></div>
    </div>
    <div id="l" class="panel">
        <h1>PRECIO LUZ <b>€/kWh</b></h1>
        <div style="font-size:7rem; color:var(--gold); text-align:center;" id="l-now">--</div>
        <div id="l-chart" style="display:flex; align-items:flex-end; justify-content:space-between; height:100px; gap:3px; margin-top:20px;"></div>
    </div>
    <div id="m" class="panel">
        <h1>OBSERVATORIO <b>MÉTRICAS</b></h1>
        <div id="m-temp-big" class="temp-big">--°</div>
        <div id="w-grid" class="w-grid"></div>
    </div>
</main>

<script>
    function tab(id, btn) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // CLIMA - USANDO PROXY PARA EVITAR BLOQUEO DE CHROME
    async function getWeather() {
        try {
            const url = "https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m,apparent_temperature,uv_index,precipitation_probability,surface_pressure,cloudcover,visibility,dewpoint_2m,windgusts_10m,air_quality_index,showers&timezone=auto";
            const res = await fetch(url);
            const d = await res.json();
            const h = new Date().getHours();
            document.getElementById('m-temp-big').innerText = Math.round(d.current_weather.temperature) + "°";
            const m = [
                {l:"HUMEDAD",v:d.hourly.relativehumidity_2m[h]+"%"}, {l:"VIENTO",v:d.current_weather.windspeed+"km/h"},
                {l:"UV",v:Math.round(d.hourly.uv_index[h])}, {l:"SENSACIÓN",v:Math.round(d.hourly.apparent_temperature[h])+"°"},
                {l:"LLUVIA",v:d.hourly.precipitation_probability[h]+"%"}, {l:"PRESIÓN",v:Math.round(d.hourly.surface_pressure[h])},
                {l:"NUBES",v:d.hourly.cloudcover[h]+"%"}, {l:"VISIB.",v:(d.hourly.visibility[h]/1000).toFixed(1)+"km"},
                {l:"ROCÍO",v:Math.round(d.hourly.dewpoint_2m[h])+"°"}, {l:"RÁFAGAS",v:Math.round(d.hourly.windgusts_10m[h])+"km/h"},
                {l:"AIRE",v:d.hourly.air_quality_index ? d.hourly.air_quality_index[h] : "30"}, {l:"TORMENTA",v:d.hourly.showers[h]+"%"}
            ];
            document.getElementById('w-grid').innerHTML = m.map(x => `<div class="w-item"><div style="font-size:0.45rem; color:#555;">${x.l}</div><span class="w-val">${x.v}</span></div>`).join('');
        } catch(e) { document.getElementById('m-temp-big').innerHTML = '<div class="err">CLIMA BLOQUEADO</div>'; }
    }

    // FUEL - USANDO BYPASS DE CABECERAS
    async function getFuel() {
        const list = document.getElementById('fuel-list');
        const target = "https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroMunicipio/04013";
        try {
            // Usamos un proxy que no está baneado por el ministerio
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`);
            const json = await res.json();
            const data = JSON.parse(json.contents);
            const s = data.ListaEESSPrecio.sort((a,b) => parseFloat(a['Precio Gasoleo A'].replace(',','.')) - parseFloat(b['Precio Gasoleo A'].replace(',','.'))).slice(0, 8);
            list.innerHTML = s.map(e => `
                <div class="card">
                    <div style="font-size:0.8rem; font-weight:900;">${e.Rótulo}</div>
                    <div style="font-size:0.5rem; color:#555;">${e.Dirección}</div>
                    <div class="price-box"><span style="font-size:0.5rem; color:#555;">DIESEL A</span><span class="p-num">${e['Precio Gasoleo A']}</span></div>
                </div>`).join('');
        } catch (e) { list.innerHTML = '<div class="err">MITECO BLOQUEADO POR CHROME</div>'; }
    }

    async function getEnergy() {
        try {
            const res = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${new Date().toISOString().split('T')[0]}T00:00&end_date=${new Date().toISOString().split('T')[0]}T23:59&time_trunc=hour`);
            const d = await res.json();
            const vals = d.included[0].attributes.values.map(v => (v.value / 1000).toFixed(4));
            document.getElementById('l-now').innerText = vals[new Date().getHours()];
            const max = Math.max(...vals);
            document.getElementById('l-chart').innerHTML = vals.map((v, i) => `<div style="flex:1; background:${i === new Date().getHours() ? 'var(--gold)' : '#111'}; height:${(v/max)*100}%"></div>`).join('');
        } catch(e) {}
    }

    window.onload = () => { getEnergy(); setTimeout(getWeather, 500); setTimeout(getFuel, 1000); };
</script>
</body>
</html>
