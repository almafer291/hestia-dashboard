<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HestiaLake | Ultra Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bronce: #b87333;
            --bronce-light: #d9a06f;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(217, 160, 111, 0.2);
            --bg: #070708;
        }

        body {
            font-family: 'Outfit', sans-serif; background: var(--bg);
            color: #e0e0e0; margin: 0; display: flex; min-height: 100vh;
        }

        /* --- NAVEGACIÓN LATERAL --- */
        nav {
            width: 260px; background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; padding: 40px 20px; position: fixed; height: 100vh;
        }

        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-svg { width: 70px; filter: drop-shadow(0 0 15px var(--bronce)); }
        .brand { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--bronce-light); margin-top: 10px; letter-spacing: 4px; }

        .nav-btn {
            background: none; border: none; color: #777; padding: 15px;
            text-align: left; font-family: 'Cinzel', serif; cursor: pointer;
            transition: 0.4s; border-radius: 15px; margin-bottom: 5px;
        }
        .nav-btn.active { background: var(--glass); color: var(--bronce-light); box-shadow: inset 0 0 10px rgba(184,115,51,0.2); }

        /* --- MAIN CONTENT --- */
        main { flex: 1; margin-left: 300px; padding: 40px; max-width: 1200px; }
        .panel { display: none; animation: fadeIn 0.6s ease; }
        .panel.active { display: block; }

        .card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 25px; margin-bottom: 20px; backdrop-filter: blur(10px);
        }

        h2 { font-family: 'Cinzel'; color: var(--bronce-light); font-weight: 400; margin: 0 0 20px 0; }

        /* --- GRID METEO --- */
        .meteo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .meteo-item { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .meteo-val { display: block; font-size: 1.5rem; color: #fff; margin-top: 5px; }

        /* --- ENERGY STATS --- */
        .energy-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .stat-box { text-align: center; flex: 1; }
        .stat-box span { display: block; font-size: 0.7rem; color: var(--bronce-light); letter-spacing: 1px; }
        .stat-box b { font-size: 1.8rem; color: #fff; }

        /* --- GASOLINERAS --- */
        .gas-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .gas-name { font-weight: 600; color: #fff; }
        .gas-prices { text-align: right; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<nav>
    <div class="logo-area">
        <svg class="logo-svg" viewBox="0 0 100 100">
            <path d="M50 10C50 10 80 40 80 65C80 81 67 94 50 94C33 94 20 81 20 65C20 40 50 10 50 10Z" fill="url(#L)" />
            <path d="M50 45 C55 55 58 65 50 75 C42 65 45 55 50 45" fill="white" opacity="0.5"/>
            <defs><linearGradient id="L" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#d9a06f"/><stop offset="100%" style="stop-color:#b87333"/></linearGradient></defs>
        </svg>
        <div class="brand">HESTIALAKE</div>
    </div>
    <button class="nav-btn active" onclick="show('meteo', this)">Estación</button>
    <button class="nav-btn" onclick="show('luz', this)">Energía</button>
    <button class="nav-btn" onclick="show('gas', this)">Gasolineras</button>
    <button class="nav-btn" onclick="show('reles', this)">Relés (5)</button>
</nav>

<main>
    <div id="meteo" class="panel active">
        <div class="card">
            <h2>Tiempo Actual - Almería</h2>
            <div class="meteo-grid">
                <div class="meteo-item"><span>Temperatura</span><b class="meteo-val" id="m-temp">--°C</b></div>
                <div class="meteo-item"><span>Humedad</span><b class="meteo-val" id="m-hum">--%</b></div>
                <div class="meteo-item"><span>Viento</span><b class="meteo-val" id="m-wind">-- km/h</b></div>
                <div class="meteo-item"><span>Presión</span><b class="meteo-val" id="m-pres">-- hPa</b></div>
            </div>
        </div>
        <div class="card">
            <h2>Previsión Semanal</h2>
            <canvas id="meteoChart" height="100"></canvas>
        </div>
    </div>

    <div id="luz" class="panel">
        <div class="card">
            <h2>Mercado Eléctrico (PVPC)</h2>
            <div class="energy-header">
                <div class="stat-box"><span>MÍNIMO</span><b id="luz-min" style="color:#50fa7b">--</b></div>
                <div class="stat-box"><span>ACTUAL</span><b id="luz-now" style="color:var(--bronce-light)">--</b></div>
                <div class="stat-box"><span>MÁXIMO</span><b id="luz-max" style="color:#ff5555">--</b></div>
            </div>
            <canvas id="luzChart" height="120"></canvas>
        </div>
    </div>

    <div id="gas" class="panel">
        <div class="card">
            <h2>Diesel y Gasolina (Almería Capital)</h2>
            <div id="gas-list">Cargando estaciones oficiales...</div>
        </div>
    </div>

    <div id="reles" class="panel">
        <div class="card">
            <h2>Control Manual de 5 Canales</h2>
            <div class="meteo-grid">
                <script>
                    for(let i=1; i<=5; i++) {
                        document.write(`
                            <div class="meteo-item">
                                <b>RELÉ ${i}</b><br><br>
                                <button onclick="this.innerText=this.innerText=='OFF'?'ON':'OFF'; this.style.color=this.innerText=='ON'?'#50fa7b':'#ff5555'" style="background:none; border:1px solid var(--bronce); color:#ff5555; padding:5px 15px; border-radius:10px; cursor:pointer">OFF</button>
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>
    </div>
</main>

<script>
    let lChart, mChart;

    function show(id, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'luz') fetchLuz();
        if(id === 'gas') fetchGas();
        if(id === 'meteo') fetchMeteo();
    }

    // --- ENERGÍA: PRECIOS Y GRÁFICA ---
    async function fetchLuz() {
        try {
            const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.preciodelaluz.org/v1/prices/all?zone=PCB'));
            const res = JSON.parse((await r.json()).contents);
            const prices = Object.values(res).map(p => p.price / 1000);
            const hours = Object.keys(res).map(h => h.split('-')[0] + 'h');

            document.getElementById('luz-min').innerText = Math.min(...prices).toFixed(4);
            document.getElementById('luz-max').innerText = Math.max(...prices).toFixed(4);
            document.getElementById('luz-now').innerText = prices[new Date().getHours()].toFixed(4);

            if(lChart) lChart.destroy();
            lChart = new Chart(document.getElementById('luzChart'), {
                type: 'line',
                data: { labels: hours, datasets: [{ label: '€/kWh', data: prices, borderColor: '#b87333', fill: true, backgroundColor: 'rgba(184,115,51,0.1)', tension: 0.4 }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        } catch(e) { console.log("Error API Luz"); }
    }

    // --- METEO: DATOS Y GRÁFICO DE BARRAS ---
    async function fetchMeteo() {
        try {
            const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.45&current_weather=true&daily=temperature_2m_max,temperature_2m_min&hourly=relativehumidity_2m,pressure_msl&timezone=auto');
            const d = await r.json();
            
            document.getElementById('m-temp').innerText = d.current_weather.temperature + "°C";
            document.getElementById('m-hum').innerText = d.hourly.relativehumidity_2m[0] + "%";
            document.getElementById('m-wind').innerText = d.current_weather.windspeed + " km/h";
            document.getElementById('m-pres').innerText = d.hourly.pressure_msl[0] + " hPa";

            if(mChart) mChart.destroy();
            mChart = new Chart(document.getElementById('meteoChart'), {
                type: 'bar',
                data: {
                    labels: ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'],
                    datasets: [{ label: 'Máx', data: d.daily.temperature_2m_max, backgroundColor: '#b87333' },
                               { label: 'Mín', data: d.daily.temperature_2m_min, backgroundColor: '#4a2c1d' }]
                },
                options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } } } }
            });
        } catch(e) {}
    }

    // --- GASOLINERAS: DIESEL Y G95 ---
    async function fetchGas() {
        const div = document.getElementById('gas-list');
        try {
            const r = await fetch('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04');
            const d = await r.json();
            const capital = d.ListaEESSPrecio.filter(e => e.Municipio.toUpperCase() === "ALMERÍA").slice(0, 10);
            
            div.innerHTML = capital.map(e => `
                <div class="gas-row">
                    <div class="gas-name">${e['Rótulo']}<br><small style="color:#666">${e['Dirección']}</small></div>
                    <div class="gas-prices">
                        <b style="color:white">G95: ${e['Precio Gasolina 95 E5']}€</b><br>
                        <b style="color:var(--bronce-light)">Diesel: ${e['Precio Gasoleo A']}€</b>
                    </div>
                </div>
            `).join('');
        } catch(e) { div.innerText = "Error API Gasolina"; }
    }

    // Inicializar
    fetchMeteo();
</script>
</body>
</html>
