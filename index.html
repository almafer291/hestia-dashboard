<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HestiaLake | Premium Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bronce-dark: #4a2c1d;
            --bronce-mid: #8c5624;
            --bronce-light: #d9a06f;
            --gold: #c5934c;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border: rgba(217, 160, 111, 0.15);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #2a1b10 0%, #050505 70%);
            color: #f0f0f0; margin: 0; padding: 0; min-height: 100vh;
        }

        /* --- LOGO LLAMA PREMIUM --- */
        .header { text-align: center; padding: 50px 20px 30px; }
        .logo-box { width: 90px; height: 90px; margin: 0 auto 15px; filter: drop-shadow(0 0 20px var(--bronce-mid)); }
        .brand {
            font-family: 'Cinzel', serif; font-size: 3rem; margin: 0;
            background: linear-gradient(to bottom, #fff 30%, var(--bronce-light) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 10px; font-weight: 700;
        }

        /* --- MENÚ --- */
        .nav { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; }
        .nav-btn {
            background: var(--card-bg); border: 1px solid var(--border);
            color: var(--bronce-light); padding: 12px 24px; border-radius: 40px;
            cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.75rem;
            letter-spacing: 2px; transition: 0.4s; backdrop-filter: blur(10px);
        }
        .nav-btn.active { 
            background: var(--bronce-mid); color: white; border-color: var(--gold);
            box-shadow: 0 0 25px rgba(140, 86, 36, 0.4);
        }

        /* --- CONTENIDO --- */
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 50px; }
        .panel { display: none; animation: fadeIn 0.8s ease; }
        .panel.active { display: block; }
        
        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 30px; border-radius: 25px; margin-bottom: 20px;
            backdrop-filter: blur(15px);
        }

        .label { font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .data-main { font-size: 3.5rem; font-weight: 300; color: #fff; margin: 10px 0; }
        
        /* Gasolineras List */
        .gas-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .gas-info b { color: var(--bronce-light); text-transform: uppercase; font-size: 0.9rem; }
        .gas-info small { color: #888; display: block; margin-top: 4px; }
        .price-val { font-family: 'Cinzel', serif; font-size: 1.4rem; color: #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-box">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 5C50 5 80 35 80 65C80 81.5 66.5 95 50 95C33.5 95 20 81.5 20 65C20 35 50 5 50 5Z" fill="url(#ll)" opacity="0.2"/>
            <path d="M50 20C50 20 72 45 72 65C72 77.1 62.1 87 50 87C37.9 87 28 77.1 28 65C28 45 50 20 50 20Z" fill="url(#ll)"/>
            <path d="M50 40C50 40 60 55 60 70C60 75.5 55.5 80 50 80C44.5 80 40 75.5 40 70C40 55 50 40 50 40Z" fill="#fff" opacity="0.4"/>
            <defs><linearGradient id="ll" x1="50" y1="5" x2="50" y2="100"><stop stop-color="#d9a06f"/><stop offset="1" stop-color="#4a2c1d"/></linearGradient></defs>
        </svg>
    </div>
    <h1 class="brand">HESTIALAKE</h1>
</div>

<nav class="nav">
    <button class="nav-btn active" onclick="tab('meteo', this)">Meteo</button>
    <button class="nav-btn" onclick="tab('energy', this)">Energía</button>
    <button class="nav-btn" onclick="tab('gas', this)">Gasolina</button>
</nav>

<div class="container">
    <div id="meteo" class="panel active">
        <div class="card">
            <span class="label">Almería Capital (Ext)</span>
            <div id="ext-t" class="data-main">--°C</div>
            <div id="ext-d" style="color: var(--bronce-light)">CARGANDO ESTACIÓN...</div>
        </div>
        <div class="card">
            <span class="label">Interior Hestia</span>
            <div class="data-main">22.5°C</div>
            <div style="color: var(--bronce-light)">HUMEDAD: 45% | CONFORT: ÓPTIMO</div>
        </div>
    </div>

    <div id="energy" class="panel">
        <div class="card">
            <span class="label">Precio Luz PVPC</span>
            <div id="luz-p" class="data-main">-- €</div>
            <div id="luz-status" style="color: var(--bronce-light)">CONSULTANDO RED ELÉCTRICA...</div>
        </div>
        <div class="card">
            <span class="label">Relés en Automático</span>
            <p>R1: Termostato Salón <span style="color:#50fa7b; float:right">● ON</span></p>
            <p>R2: Depuradora <span style="color:#ff5555; float:right">○ OFF</span></p>
        </div>
    </div>

    <div id="gas" class="panel">
        <div class="card">
            <span class="label">Top 10 Almería Municipio</span>
            <div id="gas-list">Sincronizando con Ministerio...</div>
        </div>
    </div>
</div>

<script>
    // Función de cambio de pestaña
    function tab(id, b) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        b.classList.add('active');
        
        if(id === 'gas') fetchGas();
        if(id === 'energy') fetchLuz();
        if(id === 'meteo') fetchMeteo();
    }

    // CORRECCIÓN API LUZ (Uso de API alternativa más estable)
    async function fetchLuz() {
        try {
            const r = await fetch('https://api.preciodelaluz.org/v1/prices/all?zone=PCB');
            const d = await r.json();
            const h = new Date().getHours();
            const key = Object.keys(d)[h];
            const precioVal = d[key].price / 1000;
            document.getElementById('luz-p').innerText = precioVal.toFixed(4) + " €/kWh";
            document.getElementById('luz-status').innerText = "TRAMO: " + d[key].units;
        } catch(e) { 
            document.getElementById('luz-p').innerText = "Error"; 
            document.getElementById('luz-status').innerText = "API saturada, reintente en un momento.";
        }
    }

    // CORRECCIÓN GASOLINERAS (Mapeo de nombres corregido)
    async function fetchGas() {
        const container = document.getElementById('gas-list');
        try {
            const r = await fetch('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04');
            const d = await r.json();
            
            // Filtro estricto por Municipio Almería y orden por precio Gasolina 95
            const listado = d.ListaEESSPrecio
                .filter(e => e['Municipio'].toUpperCase() === "ALMERÍA")
                .sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.')))
                .slice(0, 10);

            container.innerHTML = listado.map(e => `
                <div class="gas-item">
                    <div class="gas-info">
                        <b>${e['Rótulo'] || 'Estación'}</b>
                        <small>${e['Dirección']}</small>
                    </div>
                    <div class="price-val">${e['Precio Gasolina 95 E5']}€</div>
                </div>
            `).join('');
        } catch(e) { container.innerText = "Error al conectar con la base de datos de Almería."; }
    }

    // METEO PRECISA
    async function fetchMeteo() {
        try {
            const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.8381&longitude=-2.4597&current_weather=true');
            const d = await r.json();
            document.getElementById('ext-t').innerText = d.current_weather.temperature + "°C";
            document.getElementById('ext-d').innerText = "VIENTO: " + d.current_weather.windspeed + " KM/H | ALMERÍA CAPITAL";
        } catch(e) {}
    }

    // Carga inicial
    fetchMeteo();
</script>

</body>
</html>
