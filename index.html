<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HestiaLake | Organic Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Federo&family=Tenor+Sans&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bronce: #c5934c;
            --bronce-deep: #8c5624;
            --bg: #030303;
            --glass: rgba(25, 20, 15, 0.6);
            --border: rgba(197, 147, 76, 0.2);
        }

        body {
            font-family: 'Tenor Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 10% 10%, #1a120b 0%, #030303 60%);
            color: #e0d0c0; margin: 0; display: flex; min-height: 100vh;
        }

        /* --- NAVEGACIÓN LATERAL --- */
        nav {
            width: 280px; background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(30px); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 60px 20px;
            position: fixed; height: 100vh; z-index: 1000;
            border-radius: 0 50px 50px 0;
        }

        .brand {
            font-family: 'Federo', sans-serif; font-size: 1.8rem;
            color: #fff; text-align: center; margin-bottom: 50px;
            background: linear-gradient(to bottom, #fff, var(--bronce));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-btn {
            background: none; border: none; color: #a09080;
            padding: 18px 25px; text-align: left; font-family: 'Federo', sans-serif;
            cursor: pointer; transition: 0.4s; border-radius: 30px;
            margin-bottom: 10px; font-size: 1rem;
        }

        .nav-btn.active { background: var(--glass); color: #fff; box-shadow: 0 0 15px rgba(197, 147, 76, 0.2); }

        /* --- CONTENIDO --- */
        main { flex: 1; margin-left: 320px; padding: 60px 40px; max-width: 1200px; }
        .panel { display: none; animation: fadeIn 0.8s ease; }
        .panel.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 40px; padding: 35px; margin-bottom: 30px;
            backdrop-filter: blur(20px);
        }

        h2 { font-family: 'Federo', sans-serif; color: var(--bronce); margin: 0 0 20px 0; font-size: 1.5rem; }

        /* --- ENERGÍA --- */
        .energy-stats { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 25px; }
        .e-stat { flex: 1; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--border); }
        .e-val { display: block; font-size: 1.6rem; color: #fff; margin-top: 5px; }

        /* --- GASOLINERAS --- */
        .gas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .gas-card { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 25px; border: 1px solid var(--border); }

        /* --- RELÉS --- */
        .relay-grid { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .r-btn { background: none; border: 1px solid var(--border); color: #ff5555; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-family: 'Federo'; transition: 0.3s; }
        .r-btn.on { color: #50fa7b; border-color: #50fa7b; box-shadow: 0 0 15px rgba(80,250,123,0.3); }
    </style>
</head>
<body>

<nav>
    <div class="brand">HESTIALAKE</div>
    <button class="nav-btn active" onclick="tab('meteo', this)">Atmosfera</button>
    <button class="nav-btn" onclick="tab('luz', this)">Energía</button>
    <button class="nav-btn" onclick="tab('gas', this)">Combustible</button>
    <button class="nav-btn" onclick="tab('reles', this)">Domótica</button>
</nav>

<main>
    <div id="meteo" class="panel active">
        <div class="card">
            <h2>Almería Capital</h2>
            <div id="m-temp" style="font-size: 5rem; font-weight: 200; color:#fff;">--°C</div>
            <div id="m-info" style="color:var(--bronce); letter-spacing: 2px;">SINCRONIZANDO TIEMPO...</div>
        </div>
    </div>

    <div id="luz" class="panel">
        <div class="card">
            <h2>Luz PVPC España</h2>
            <div class="energy-stats">
                <div class="e-stat"><span>Mínimo</span><b id="e-min" class="e-val" style="color:#50fa7b">--</b></div>
                <div class="e-stat"><span>Actual</span><b id="e-now" class="e-val" style="color:var(--bronce)">--</b></div>
                <div class="e-stat"><span>Máximo</span><b id="e-max" class="e-val" style="color:#ff5555">--</b></div>
            </div>
            <canvas id="luzChart" height="110"></canvas>
        </div>
    </div>

    <div id="gas" class="panel">
        <div class="card">
            <h2>Precios en Almería</h2>
            <div id="gas-list" class="gas-grid">Cargando estaciones oficiales...</div>
        </div>
    </div>

    <div id="reles" class="panel">
        <div class="card">
            <h2>Control Relés (5 Canales)</h2>
            <div class="relay-grid">
                <button class="r-btn" onclick="tgl(1,this)">R1 OFF</button>
                <button class="r-btn" onclick="tgl(2,this)">R2 OFF</button>
                <button class="r-btn" onclick="tgl(3,this)">R3 OFF</button>
                <button class="r-btn" onclick="tgl(4,this)">R4 OFF</button>
                <button class="r-btn" onclick="tgl(5,this)">R5 OFF</button>
            </div>
        </div>
    </div>
</main>

<script>
    let chartObj = null;

    function tab(id, b) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        b.classList.add('active');
        if(id === 'luz') fetchLuz();
        if(id === 'gas') fetchGas();
        if(id === 'meteo') fetchMeteo();
    }

    // --- TIEMPO (Fuente Directa Sin Proxy para Evitar Fallos) ---
    async function fetchMeteo() {
        try {
            const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.8381&longitude=-2.4597&current_weather=true&hourly=relativehumidity_2m');
            const d = await r.json();
            document.getElementById('m-temp').innerText = Math.round(d.current_weather.temperature) + "°C";
            document.getElementById('m-info').innerText = `HUMEDAD: ${d.hourly.relativehumidity_2m[0]}% | VIENTO: ${d.current_weather.windspeed} km/h`;
        } catch(e) {
            document.getElementById('m-info').innerText = "ERROR DE CONEXIÓN METEO";
        }
    }

    // --- ENERGÍA (Uso de Proxy para saltar bloqueo CORS) ---
    async function fetchLuz() {
        try {
            // Proxy AllOrigins para saltar el bloqueo del navegador
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.preciodelaluz.org/v1/prices/all?zone=PCB')}`);
            const json = await res.json();
            const data = JSON.parse(json.contents);
            
            const prices = Object.values(data).map(p => p.price / 1000);
            const hours = Object.keys(data).map(h => h.split('-')[0] + 'h');
            const now = new Date().getHours();

            document.getElementById('e-min').innerText = Math.min(...prices).toFixed(4) + '€';
            document.getElementById('e-max').innerText = Math.max(...prices).toFixed(4) + '€';
            document.getElementById('e-now').innerText = prices[now].toFixed(4) + '€';

            if(chartObj) chartObj.destroy();
            const ctx = document.getElementById('luzChart').getContext('2d');
            chartObj = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: hours,
                    datasets: [{
                        data: prices, borderColor: '#c5934c', 
                        backgroundColor: 'rgba(197, 147, 76, 0.1)', fill: true,
                        tension: 0.4, pointRadius: 0
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: {color: '#666'} } } }
            });
        } catch(e) {
            document.getElementById('e-now').innerText = "ERROR API";
        }
    }

    // --- GASOLINERAS ---
    async function fetchGas() {
        try {
            const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04')}`);
            const json = await r.json();
            const d = JSON.parse(json.contents);
            const capital = d.ListaEESSPrecio.filter(e => e['Municipio'].toUpperCase() === "ALMERÍA").slice(0, 10);
            
            document.getElementById('gas-list').innerHTML = capital.map(e => `
                <div class="gas-card">
                    <div style="font-family:Federo; color:#fff">${e['Rótulo']}</div>
                    <div style="font-size:0.7rem; color:#807060; margin-bottom:10px">${e['Dirección']}</div>
                    <div style="display:flex; justify-content:space-between; font-size:0.9rem">
                        <b>G95: ${e['Precio Gasolina 95 E5']}€</b>
                        <b style="color:var(--bronce)">Dsl: ${e['Precio Gasoleo A']}€</b>
                    </div>
                </div>
            `).join('');
        } catch(e) {
            document.getElementById('gas-list').innerText = "ERROR AL CONECTAR CON MINISTERIO";
        }
    }

    function tgl(n, b) {
        b.classList.toggle('on');
        b.innerText = `R${n} ${b.classList.contains('on') ? 'ON' : 'OFF'}`;
    }

    // Carga inicial obligatoria
    fetchMeteo();
</script>
</body>
</html>
