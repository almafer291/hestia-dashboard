<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HestiaLake v13 | Real-Time Precision</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --bronce: #a67c52;
            --border: rgba(166, 124, 82, 0.25);
            --text: #ffffff;
            --text-muted: #555;
            --success: #50fa7b;
            --danger: #ff5555;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- NAV --- */
        nav { width: 70px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 25px 0; }
        .logo-svg { width: 30px; height: 30px; margin-bottom: 40px; fill: url(#flameGrad); filter: drop-shadow(0 0 5px var(--bronce)); }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 0.6rem; letter-spacing: 1px; cursor: pointer; margin-bottom: 30px; writing-mode: vertical-lr; transform: rotate(180deg); transition: 0.3s; }
        .nav-btn.active { color: var(--bronce); font-weight: 600; }

        /* --- CONTENT --- */
        main { flex: 1; padding: 40px 60px; overflow-y: auto; background: radial-gradient(circle at top right, #0a0a0a, #000); }
        .panel { display: none; animation: fadeIn 0.4s ease-out; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 100; font-size: 2.2rem; margin-bottom: 25px; color: #fff; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 20px; }

        /* --- METEO --- */
        .temp-row { display: flex; align-items: baseline; gap: 15px; margin-bottom: 20px; }
        .big-t { font-size: 6rem; font-weight: 100; }
        .grid-detalles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 20px; }
        .det-box { padding: 15px; border-radius: 15px; background: rgba(166,124,82,0.05); border: 1px solid rgba(166,124,82,0.1); text-align: center; }
        .label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 5px; }

        .f-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .f-item { padding: 15px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }

        /* --- GAS --- */
        .gas-list { width: 100%; border-collapse: collapse; }
        .gas-list td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.85rem; }
        .p-box { font-family: monospace; color: var(--bronce); font-size: 1rem; font-weight: 600; }
        .p-label-gas { font-size: 0.6rem; color: var(--text-muted); margin-left: 5px; }

        /* --- IOT --- */
        .r-btn { width: 60px; height: 60px; border-radius: 50%; border: 1px solid var(--border); background: none; color: var(--danger); cursor: pointer; font-size: 0.7rem; transition: 0.3s; }
        .r-btn.on { border-color: var(--success); color: var(--success); box-shadow: 0 0 15px rgba(80,250,123,0.1); }
    </style>
</head>
<body>

<nav>
    <svg class="logo-svg" viewBox="0 0 24 24">
        <defs><linearGradient id="flameGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#fff"/><stop offset="100%" style="stop-color:#a67c52"/></linearGradient></defs>
        <path d="M12,2C12,2 7,7.5 7,12C7,14.76 9.24,17 12,17C14.76,17 17,14.76 17,12C17,7.5 12,2 12,2M12,15C10.34,15 9,13.66 9,12C9,10 12,6.5 12,6.5C12,6.5 15,10 15,12C15,13.66 13.66,15 12,15Z" />
    </svg>
    <button class="nav-btn active" onclick="tab('clima', this)">ATMÓSFERA</button>
    <button class="nav-btn" onclick="tab('luz', this)">ENERGÍA</button>
    <button class="nav-btn" onclick="tab('gas', this)">GASOLINA</button>
    <button class="nav-btn" onclick="tab('iot', this)">DOMÓTICA</button>
</nav>

<main>
    <div id="clima" class="panel active">
        <h1>Almería Capital</h1>
        <div class="card">
            <div class="temp-row">
                <span class="big-t" id="m-temp">--°</span>
                <div><div id="m-desc" style="color:var(--bronce)">Sincronizando satélite...</div><small id="m-time" style="color:var(--text-muted)"></small></div>
            </div>
            <div class="grid-detalles">
                <div class="det-box"><span class="label">Humedad</span><span id="m-hum">--</span>%</div>
                <div class="det-box"><span class="label">Viento</span><span id="m-wind">--</span> km/h</div>
                <div class="det-box"><span class="label">UV</span><span id="m-uv">--</span></div>
                <div class="det-box"><span class="label">Nubes</span><span id="m-cloud">--</span>%</div>
            </div>
            <div class="f-grid" id="forecast-cont"></div>
        </div>
    </div>

    <div id="luz" class="panel">
        <h1>Precio Luz Real (PVPC)</h1>
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <div><span class="label">Mínimo</span><span id="l-min" style="color:var(--success); font-size:1.2rem">--</span></div>
                <div><span class="label">Actual</span><span id="l-now" style="color:var(--bronce); font-size:1.5rem">--</span></div>
                <div><span class="label">Máximo</span><span id="l-max" style="color:var(--danger); font-size:1.2rem">--</span></div>
            </div>
            <canvas id="luzChart" height="110"></canvas>
        </div>
    </div>

    <div id="gas" class="panel">
        <h1>Top 10 Gasolineras Baratas</h1>
        <div class="card">
            <table class="gas-list" id="gas-table">
                <tr><td style="color:var(--text-muted)">Consultando base de datos del Ministerio...</td></tr>
            </table>
        </div>
    </div>

    <div id="iot" class="panel">
        <h1>Hestia Link</h1>
        <div class="card" style="display:flex; gap:20px; justify-content:center;">
            <button class="r-btn" onclick="tgl(1,this)">R1</button>
            <button class="r-btn" onclick="tgl(2,this)">R2</button>
            <button class="r-btn" onclick="tgl(3,this)">R3</button>
            <button class="r-btn" onclick="tgl(4,this)">R4</button>
        </div>
    </div>
</main>

<script>
    let charts = {};
    const PROXY = "https://api.allorigins.win/get?url=";

    function tab(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'clima') loadMeteo();
        if(id === 'luz') loadLuz();
        if(id === 'gas') loadGas();
    }

    async function loadMeteo() {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.45&current_weather=true&hourly=relativehumidity_2m,uv_index,cloudcover&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe/Madrid');
        const d = await res.json();
        document.getElementById('m-temp').innerText = Math.round(d.current_weather.temperature) + "°";
        document.getElementById('m-hum').innerText = d.hourly.relativehumidity_2m[0];
        document.getElementById('m-wind').innerText = d.current_weather.windspeed;
        document.getElementById('m-uv').innerText = d.hourly.uv_index[0];
        document.getElementById('m-cloud').innerText = d.hourly.cloudcover[0];
        
        let fhtml = '';
        const icons = { 0:"☀️", 1:"🌤️", 3:"☁️", 61:"🌧️" };
        for(let i=1; i<=3; i++) {
            fhtml += `<div class="f-item"><span class="label">Día +${i}</span><div style="font-size:1.5rem">${icons[d.daily.weathercode[i]]||"🌤️"}</div><div style="font-size:0.9rem">${Math.round(d.daily.temperature_2m_max[i])}° / ${Math.round(d.daily.temperature_2m_min[i])}°</div></div>`;
        }
        document.getElementById('forecast-cont').innerHTML = fhtml;
    }

    async function loadLuz() {
        try {
            const url = encodeURIComponent("https://api.preciodelaluz.org/v1/prices/all?zone=PCB");
            const res = await fetch(PROXY + url);
            const raw = await res.json();
            const data = JSON.parse(raw.contents);
            
            const prices = Object.values(data).map(h => h.price / 1000);
            const hours = Object.keys(data).map(h => h.split('-')[0] + 'h');
            const now = new Date().getHours();

            document.getElementById('l-now').innerText = prices[now].toFixed(4) + " €";
            document.getElementById('l-min').innerText = Math.min(...prices).toFixed(4);
            document.getElementById('l-max').innerText = Math.max(...prices).toFixed(4);

            const ctx = document.getElementById('luzChart').getContext('2d');
            if(charts.luz) charts.luz.destroy();
            charts.luz = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: hours,
                    datasets: [{
                        data: prices,
                        backgroundColor: prices.map((p, i) => i === now ? '#a67c52' : 'rgba(166,124,82,0.2)'),
                        borderRadius: 4
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#444', font: { size: 9 } } }, y: { display: false } } }
            });
        } catch(e) { console.error("Error Luz"); }
    }

    async function loadGas() {
        try {
            const url = encodeURIComponent("https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04");
            const res = await fetch(PROXY + url);
            const raw = await res.json();
            const data = JSON.parse(raw.contents);
            
            // Filtrar Almería Capital y ordenar por precio G95
            let list = data.ListaEESSPrecio
                .filter(e => e.Municipio.toUpperCase() === "ALMERÍA")
                .sort((a, b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.')))
                .slice(0, 10);

            document.getElementById('gas-table').innerHTML = list.map(e => `
                <tr>
                    <td><b style="color:#fff">${e['Rótulo']}</b><br><small style="color:var(--text-muted)">${e['Dirección'].substring(0,25)}...</small></td>
                    <td style="text-align:right">
                        <span class="p-box">${e['Precio Gasolina 95 E5']}</span><span class="p-label-gas">G95</span><br>
                        <span class="p-box" style="color:#888">${e['Precio Gasoleo A']}</span><span class="p-label-gas">DSL</span>
                    </td>
                </tr>
            `).join('');
        } catch(e) { document.getElementById('gas-table').innerHTML = "Error al conectar con el Ministerio."; }
    }

    function tgl(n, b) { b.classList.toggle('on'); b.innerText = `R${n} ${b.classList.contains('on')?'ON':'OFF'}`; }
    window.onload = loadMeteo;
</script>
</body>
</html>
