<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v62 | Almería Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166,124,82,0.2); --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 65px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #050505; flex-shrink: 0; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 40px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.7rem; letter-spacing: 2px; }
        .n-btn.active { color: var(--bronce); font-weight: bold; }
        main { flex: 1; padding: 25px; overflow-y: auto; background: #000; }
        .panel { display: none; } .panel.active { display: block; }
        .card { background: #0a0a0a; border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--bronce); }
        .price { color: var(--bronce); font-weight: bold; font-family: monospace; font-size: 1.4rem; }
        h1 { font-size: 1rem; letter-spacing: 2px; color: var(--bronce); }
    </style>
</head>
<body>

<nav>
    <button class="n-btn active" onclick="tab('m', this)">CLIMA</button>
    <button class="n-btn" onclick="tab('g', this)">FUEL</button>
    <button class="n-btn" onclick="tab('l', this)">LUZ</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h1>ALMERÍA LIVE</h1>
        <div class="card"><div style="font-size:4rem;" id="t">--°</div><p>Sistema Online</p></div>
    </div>

    <div id="g" class="panel">
        <h1>GASOLINERAS BARATAS</h1>
        <div id="g-list"><p style="color:#444">Cargando datos...</p></div>
    </div>

    <div id="l" class="panel">
        <h1>PRECIO LUZ (MWh)</h1>
        <div class="card" style="text-align:center;">
            <div id="l-now" class="price">-- €</div>
            <p style="font-size:0.8rem; color:#555">Mercado Mayorista Hoy</p>
        </div>
    </div>
</main>

<script>
    function tab(id, b) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
        if(id==='m') loadM(); if(id==='g') loadG(); if(id==='l') loadL();
    }

    // 1. CLIMA (Directo)
    async function loadM() {
        const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true');
        const d = await r.json();
        document.getElementById('t').innerText = Math.round(d.current_weather.temperature)+'°';
    }

    // 2. LUZ (Nueva fuente: Usamos un proxy que NO es AllOrigins)
    async function loadL() {
        try {
            const r = await fetch('https://api.codetabs.com/v1/proxy?quest=https://api.preciodelaluz.org/v1/prices/all?zone=PCB');
            const data = await r.json();
            const h = new Date().getHours();
            const p = (Object.values(data)[h].price / 1000).toFixed(3);
            document.getElementById('l-now').innerText = p + " €/kWh";
        } catch(e) {
            document.getElementById('l-now').innerText = "Sin conexión";
        }
    }

    // 3. GASOLINA (Fuente alternativa con Proxy estable)
    async function loadG() {
        const box = document.getElementById('g-list');
        try {
            const r = await fetch('https://api.codetabs.com/v1/proxy?quest=https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04');
            const data = await r.json();
            const filtrado = data.ListaEESSPrecio.filter(e => e.Municipio.includes("ALMER")).slice(0,5);
            
            let html = '';
            filtrado.forEach(e => {
                html += `<div class="card"><b>${e.Rótulo}</b><br><span class="price">${e['Precio Gasolina 95 E5']}€</span></div>`;
            });
            box.innerHTML = html;
        } catch(e) {
            box.innerHTML = "<div class='card'>Reintenta en unos segundos...</div>";
        }
    }

    // Carga inicial
    window.onload = loadM;
</script>
</body>
</html>
