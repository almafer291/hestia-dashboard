<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v36 | Full Live</title>
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166,124,82,0.3); --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Navegación Estilo Bronce */
        nav { width: 70px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 40px 0; background: #050505; z-index: 10; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 45px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.75rem; letter-spacing: 2px; transition: 0.3s; }
        .n-btn.active { color: var(--bronce); font-weight: bold; text-shadow: 0 0 10px var(--bronce); }

        /* Contenedores */
        main { flex: 1; position: relative; background: #000; }
        .panel { position: absolute; top:0; left:0; width:100%; height:100%; display: none; padding: 20px; box-sizing: border-box; }
        .panel.active { display: block; }
        
        /* Iframe styling para "limpiar" las webs externas */
        .live-frame { width: 100%; height: 90%; border: 1px solid var(--border); border-radius: 15px; filter: invert(1) hue-rotate(180deg) contrast(0.8); } /* Efecto Dark Mode */
        
        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .big { font-size: 4rem; font-weight: 100; margin: 0; }
        
        /* Botones IOT */
        .r-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 300px; }
        .r-btn { height: 80px; border-radius: 15px; border: 1px solid var(--border); background: none; color: #ff4444; cursor: pointer; font-weight: bold; }
        .r-btn.on { color: #00ff88; border-color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.2); }
    </style>
</head>
<body>

<nav>
    <div style="color:var(--bronce); font-weight:bold; margin-bottom:50px; font-size:1.2rem;">H</div>
    <button class="n-btn active" onclick="tab('m', this)">CLIMA</button>
    <button class="n-btn" onclick="tab('l', this)">ENERGÍA</button>
    <button class="n-btn" onclick="tab('g', this)">FUEL</button>
    <button class="n-btn" onclick="tab('i', this)">SISTEMA</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h2 style="color:var(--bronce)">Almería Live</h2>
        <div class="card">
            <div class="big" id="temp">--°C</div>
            <p id="desc" style="color:#666; text-transform:uppercase; letter-spacing:2px;"></p>
        </div>
    </div>

    <div id="l" class="panel">
        <h2 style="color:var(--bronce)">Precio PVPC Hoy</h2>
        <iframe class="live-frame" src="https://api.preciodelaluz.org/v1/prices/all?zone=PCB"></iframe>
        <p style="font-size: 0.7rem; color: #444; margin-top: 10px;">Datos directos de Red Eléctrica (REE) vía API</p>
    </div>

    <div id="g" class="panel">
        <h2 style="color:var(--bronce)">Gasolineras Almería Capital</h2>
        <iframe class="live-frame" src="https://www.komparing.com/es/gasolineras/almeria-almeria"></iframe>
    </div>

    <div id="i" class="panel">
        <h2 style="color:var(--bronce)">Control de Sistema</h2>
        <div class="card">
            <div class="r-grid">
                <button class="r-btn" onclick="toggle(this)">R1</button>
                <button class="r-btn" onclick="toggle(this)">R2</button>
                <button class="r-btn" onclick="toggle(this)">R3</button>
                <button class="r-btn" onclick="toggle(this)">R4</button>
            </div>
        </div>
    </div>
</main>

<script>
    function tab(id, b) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        b.classList.add('active');
    }

    // El clima lo sacamos de una API que NUNCA bloquea (Open-Meteo)
    async function getClima() {
        try {
            const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.45&current_weather=true');
            const d = await r.json();
            document.getElementById('temp').innerText = Math.round(d.current_weather.temperature) + "°";
            document.getElementById('desc').innerText = "Almería Capital";
        } catch(e) { document.getElementById('temp').innerText = "??°"; }
    }

    function toggle(b) {
        b.classList.toggle('on');
        b.innerText = b.classList.contains('on') ? "ACTIVE" : "OFF";
    }

    window.onload = getClima;
</script>
</body>
</html>
