<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hestia v36 PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root { --bg:#000; --bronce:#a67c52; --border:rgba(166,124,82,.3); --text:#fff;}
body{margin:0;font-family:Segoe UI;background:#000;color:#fff;display:flex;height:100vh;overflow:hidden}
nav{width:70px;background:#080808;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:40px 0}
.n-btn{background:none;border:none;color:#444;cursor:pointer;margin-bottom:40px;writing-mode:vertical-lr;transform:rotate(180deg);font-size:.7rem}
.n-btn.active{color:var(--bronce)}
main{flex:1;padding:30px;overflow:auto}
.panel{display:none}.panel.active{display:block}
.card{background:#0a0a0a;border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:20px}
.big{font-size:4rem}
table{width:100%} td{padding:10px;border-bottom:1px solid #111}
.price{color:var(--bronce);font-family:monospace}
.loading{opacity:.4}
</style>
</head>

<body>

<nav>
<div style="color:var(--bronce);margin-bottom:40px">v36</div>
<button class="n-btn active" onclick="tab('m',this)">CLIMA</button>
<button class="n-btn" onclick="tab('l',this)">LUZ</button>
<button class="n-btn" onclick="tab('g',this)">GASOIL</button>
</nav>

<main>

<div id="m" class="panel active">
<h1>Almería</h1>
<div class="card">
<div class="big" id="temp">--°</div>
<canvas id="chartTemp"></canvas>
</div>
</div>

<div id="l" class="panel">
<h1>Luz hoy</h1>
<div class="card">
<div style="display:flex;justify-content:space-around">
<div>MÍN<br><b id="min"></b></div>
<div>AHORA<br><b id="now" style="font-size:1.5rem;color:var(--bronce)"></b></div>
<div>MÁX<br><b id="max"></b></div>
</div>
<canvas id="chartLuz"></canvas>
</div>
</div>

<div id="g" class="panel">
<h1>Gasolineras baratas</h1>
<div class="card">
<table id="gas"></table>
</div>
</div>

</main>

<script>

let cache={};
let charts={};

function tab(id,b){
document.querySelectorAll('.panel,.n-btn').forEach(x=>x.classList.remove('active'));
document.getElementById(id).classList.add('active'); b.classList.add('active');
if(id==='m') loadM();
if(id==='l') loadL();
if(id==='g') loadG();
}

/* ================= CLIMA ================= */
async function loadM(){
if(cache.m) return renderM(cache.m);

const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.45&hourly=temperature_2m&current_weather=true");
const d=await r.json();
cache.m=d;
renderM(d);
}

function renderM(d){
document.getElementById("temp").innerText=Math.round(d.current_weather.temperature)+"°";

let temps=d.hourly.temperature_2m.slice(0,12);

if(charts.t) charts.t.destroy();
charts.t=new Chart(chartTemp,{
type:'line',
data:{labels:temps.map((_,i)=>i+"h"),datasets:[{data:temps}]},
options:{plugins:{legend:{display:false}}}
});
}

/* ================= LUZ ================= */
async function loadL(){
if(cache.l) return renderL(cache.l);

try{
const r=await fetch("https://api.allorigins.win/raw?url=https://api.preciodelaluz.org/v1/prices/all?zone=PCB");
const data=await r.json();

const prices=Object.values(data).map(x=>x.price/1000);
cache.l=prices;
renderL(prices);

}catch(e){
document.getElementById("now").innerText="Error";
}
}

function renderL(prices){
let h=new Date().getHours();

document.getElementById("now").innerText=prices[h].toFixed(4)+"€";
document.getElementById("min").innerText=Math.min(...prices).toFixed(4);
document.getElementById("max").innerText=Math.max(...prices).toFixed(4);

if(charts.l) charts.l.destroy();
charts.l=new Chart(chartLuz,{
type:'bar',
data:{labels:prices.map((_,i)=>i),datasets:[{data:prices}]},
options:{plugins:{legend:{display:false}}}
});
}

/* ================= GASOLINERAS ================= */
async function loadG(){

try{

const url="https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04";

const r=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url));
const d=await r.json();

/* FILTRAR ALMERÍA CAPITAL */
let list=d.ListaEESSPrecio
.filter(e=>e.Municipio.toUpperCase()==="ALMERIA")

/* LIMPIAR + ORDENAR */
.map(e=>({
name:e["Rótulo"],
dir:e["Dirección"],
g95:parseFloat(e["Precio Gasolina 95 E5"].replace(",",".")),
dsl:parseFloat(e["Precio Gasoleo A"].replace(",","."))
}))
.sort((a,b)=>a.g95-b.g95)
.slice(0,10);

/* RENDER */
gas.innerHTML=list.map(e=>`
<tr>
<td>
<b>${e.name}</b><br>
<small>${e.dir}</small>
</td>
<td class="price">
95: ${e.g95.toFixed(3)}€<br>
DSL: ${e.dsl.toFixed(3)}€
</td>
</tr>
`).join("");

}catch(e){
gas.innerHTML="<tr><td>Error cargando</td></tr>";
}
}

/* AUTO REFRESH */
setInterval(loadL,60000);
setInterval(loadM,300000);
setInterval(loadG,300000);

loadM();

</script>
</body>
</html>
