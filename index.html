<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA v34.900 | AEMET OFFICIAL NODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000; --surf: #050505; --acc: #D4AF37; 
            --bor: #121212; --txt: #FFF; --dim: #555;
            --ok: #2D5A27; --warn: #D4AF37; --bad: #8B2A2A;
            --fire: #FF4500;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        aside { width: 70px; border-right: 1px solid var(--bor); display: flex; flex-direction: column; align-items: center; padding: 25px 0; background: #000; z-index: 100; }
        
        .fire-icon { 
            font-size: 2.2rem; color: var(--fire); margin-bottom: 40px; 
            animation: firePulse 1.5s infinite ease-in-out; 
            filter: drop-shadow(0 0 5px var(--fire));
        }
        @keyframes firePulse { 
            0%, 100% { filter: drop-shadow(0 0 2px var(--fire)); transform: scale(1); } 
            50% { filter: drop-shadow(0 0 18px var(--fire)); transform: scale(1.12); } 
        }

        nav { display: flex; flex-direction: column; gap: 28px; }
        .nav-bt { color: var(--dim); cursor: pointer; font-size: 1.6rem; transition: 0.3s; }
        .nav-bt.active { color: var(--acc); }

        main { flex: 1; overflow-y: auto; padding: 20px; background: #000; }
        .view { display: none; }
        .view.active { display: block; animation: viewIn 0.6s ease; }
        @keyframes viewIn { from { opacity: 0; } to { opacity: 1; } }

        .g { display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px; }
        .c { background: var(--surf); border: 1px solid var(--bor); padding: 18px; }
        .t { font-family: 'JetBrains Mono'; font-size: 0.55rem; color: var(--acc); letter-spacing: 3px; text-transform: uppercase; border-bottom: 1px solid #111; padding-bottom: 8px; margin-bottom: 15px; display: block; }
        .v { font-size: 3.8rem; font-weight: 100; color: #fff; line-height: 1; letter-spacing: -3px; }
        .s { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; margin-top: 5px; display: block; font-weight: 800; }
        .r { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 0.65rem; padding: 6px 0; border-bottom: 1px solid #0d0d0d; color: #888; }
        .r b { color: #fff; font-weight: 400; }

        .zone-header { grid-column: span 12; font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--acc); background: #080808; padding: 10px; border-left: 4px solid var(--acc); margin: 15px 0 5px 0; }
        .beach-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
        .b-item { background: #030303; border: 1px solid #0d0d0d; padding: 12px; position: relative; overflow: hidden; }
        .b-item::after { content: 'AEMET OFFICIAL'; position: absolute; top: 5px; right: 5px; font-size: 0.4rem; color: #333; font-family: 'JetBrains Mono'; }
        .status-tag { display: inline-block; padding: 2px 6px; border-radius: 2px; font-size: 0.55rem; font-weight: 900; margin-top: 8px; }
    </style>
</head>
<body>

<aside>
    <i class="ph-fill ph-fire fire-icon"></i>
    <nav>
        <div class="nav-bt active" onclick="sh('meteo', this)"><i class="ph-duotone ph-broadcast"></i></div>
        <div class="nav-bt" onclick="sh('sea', this)"><i class="ph-duotone ph-waves"></i></div>
    </nav>
</aside>

<main>
    <div id="meteo" class="view active">
        <div class="g">
            <div class="c" style="grid-column: span 12;">
                <span class="t">Global Atmospheric Node | Almería</span>
                <div style="display:flex; justify-content: space-between; align-items: flex-end;">
                    <div><div class="v" id="wt">--°</div><span class="s">Temperatura Real</span></div>
                    <div style="text-align:right"><div class="v" id="wh" style="font-size:2.4rem">--%</div><span class="s">Humedad</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="sea" class="view">
        <div class="g">
            <div class="c" style="grid-column: span 12;">
                <span class="t">AEMET Marine Intelligence | Predicción de Playas</span>
                <p id="aemet-status" style="font-family:'JetBrains Mono'; font-size:0.6rem; color:var(--dim)">Sincronizando con AEMET OpenData...</p>
            </div>
            <div id="beaches-master" style="grid-column: span 12;"></div>
        </div>
    </div>
</main>

<script>
    const AEMET_KEY = '233740e194c45ee901ca539f6773ed0d';
    
    // Diccionario de Playas Clave de Almería (Códigos oficiales AEMET)
    const PLAYAS_ALMERIA = [
        {id: '0401303', nom: 'San Miguel (Zapillo)', muni: 'Almería'},
        {id: '0401301', nom: 'Costacabana', muni: 'Almería'},
        {id: '0406603', nom: 'Aguadulce', muni: 'Roquetas de Mar'},
        {id: '0407904', nom: 'Almerimar', muni: 'El Ejido'},
        {id: '0406401', nom: 'San José', muni: 'Níjar'},
        {id: '0403201', nom: 'Los Muertos', muni: 'Carboneras'}
    ];

    window.sh = (id, bt) => {
        document.querySelectorAll('.view, .nav-bt').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); bt.classList.add('active');
        if(id === 'sea') loadAemetBeaches();
    };

    async function getAemetData(url) {
        const res = await fetch(`https://opendata.aemet.es/opendata/api/${url}?api_key=${AEMET_KEY}`);
        const info = await res.json();
        if(info.datos) {
            const finalRes = await fetch(info.datos);
            return await finalRes.json();
        }
        return null;
    }

    async function loadAemetBeaches() {
        const container = document.getElementById('beaches-master');
        const status = document.getElementById('aemet-status');
        
        try {
            let html = '';
            for (const playa of PLAYAS_ALMERIA) {
                // Llamada específica de AEMET para cada playa
                const data = await getAemetData(`prediccion/especifica/playa/${playa.id}`);
                
                if (data && data[0]) {
                    const p = data[0];
                    const hoy = p.prediccion.dia[0];
                    
                    html += `
                        <div class="c" style="margin-bottom:10px;">
                            <span class="t">${playa.muni}</span>
                            <div style="display:flex; justify-content:space-between; align-items:center">
                                <div>
                                    <b style="font-size:1.2rem; color:#FFF">${playa.nom}</b><br>
                                    <span style="font-size:0.6rem; color:var(--acc)">MAR: ${hoy.oleaje || 'Tranquila'}</span>
                                </div>
                                <div style="text-align:right">
                                    <div style="font-size:1.5rem; font-weight:100">${hoy.tAgua.valor}°C</div>
                                    <span class="s">AGUA</span>
                                </div>
                            </div>
                            <div class="r" style="margin-top:10px">Viento: <b>${hoy.viento.direccion} ${hoy.viento.velocidad}kt</b></div>
                            <div class="r">Sensación: <b>${hoy.sensTermica.valor}°C</b></div>
                            <div class="r">Índice UV: <b style="color:var(--warn)">${hoy.uvMax || '--'}</b></div>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
            status.innerText = "DATOS ACTUALIZADOS: " + new Date().toLocaleTimeString();
        } catch (e) {
            console.error(e);
            status.innerText = "ERROR DE CONEXIÓN CON AEMET";
        }
    }

    // Inicialización Meteo General
    async function init() {
        const m = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m&timezone=auto`).then(r=>r.json());
        document.getElementById('wt').innerText = Math.round(m.current_weather.temperature) + "°";
        document.getElementById('wh').innerText = m.hourly.relativehumidity_2m[new Date().getHours()] + "%";
    }

    init();
</script>
</body>
</html>
