<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HestiaLake v12 | Deep Bronze Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --bronce: #a67c52;
            --bronce-dim: rgba(166, 124, 82, 0.1);
            --border: rgba(166, 124, 82, 0.25);
            --text: #ffffff;
            --text-muted: #666666;
            --danger: #ff5555;
            --success: #50fa7b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- NAVEGACIÓN --- */
        nav { width: 80px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; }
        .logo-svg { width: 35px; height: 35px; margin-bottom: 50px; fill: url(#flameGradient); filter: drop-shadow(0 0 8px rgba(166, 124, 82, 0.4)); }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 0.65rem; letter-spacing: 1.5px; cursor: pointer; margin-bottom: 35px; transition: 0.3s; writing-mode: vertical-lr; transform: rotate(180deg); }
        .nav-btn.active { color: var(--bronce); font-weight: 600; }

        /* --- CONTENIDO --- */
        main { flex: 1; padding: 40px 60px; overflow-y: auto; scroll-behavior: smooth; }
        .panel { display: none; animation: fadeIn 0.5s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 100; font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 30px; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 28px; padding: 30px; margin-bottom: 25px; }

        /* --- METEO AVANZADA --- */
        .m-hero { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .temp-big { font-size: 7rem; font-weight: 100; line-height: 0.9; }
        .label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 8px; }
        
        .grid-detalles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .det-box { padding: 20px; border-radius: 20px; background: rgba(255,255,255,0.01); border: 1px solid var(--border); }
        .det-val { font-size: 1.1rem; color: var(--bronce); font-weight: 400; }

        .forecast-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .f-card { background: var(--bronce-dim); border: 1px solid var(--border); border-radius: 24px; padding: 20px; text-align: center; transition: 0.3s; }
        .f-card:hover { background: rgba(166, 124, 82, 0.2); }
        .f-icon { font-size: 2rem; margin: 10px 0; display: block; }
        .f-temp { font-size: 1.2rem; font-weight: 600; }
        .f-extra { font-size: 0.7rem; color: var(--text-muted); margin-top: 5px; }

        /* --- GASOLINERAS PREMIUM --- */
        .gas-table { width: 100%; border-collapse: collapse; }
        .gas-table th { text-align: left; padding: 15px; font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .gas-table td { padding: 18px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.9rem; }
        .gas-brand { font-weight: 600; letter-spacing: 1px; color: #fff; }
        .price-badge { font-family: monospace; font-size: 1rem; color: var(--bronce); padding: 5px 10px; border-radius: 8px; background: rgba(166, 124, 82, 0.1); }
        .price-dsl { color: #aaa; margin-left: 10px; font-size: 0.85rem; }

        /* --- OTROS --- */
        .r-btn { width: 70px; height: 70px; border-radius: 50%; border: 1px solid var(--border); background: none; color: var(--danger); cursor: pointer; font-size: 0.7rem; transition: 0.4s; }
        .r-btn.on { border-color: var(--success); color: var(--success); box-shadow: 0 0 20px rgba(80,250,123,0.1); }
    </style>
</head>
<body>

<nav>
    <svg class="logo-svg" viewBox="0 0 24 24">
        <defs>
            <linearGradient id="flameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                <stop offset="60%" style="stop-color:#a67c52;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
            </linearGradient>
        </defs>
        <path d="M12,2C12,2 7,7.5 7,12C7,14.76 9.24,17 12,17C14.76,17 17,14.76 17,12C17,7.5 12,2 12,2M12,15C10.34,15 9,13.66 9,12C9,10 12,6.5 12,6.5C12,6.5 15,10 15,12C15,13.66 13.66,15 12,15Z" />
    </svg>
    <button class="nav-btn active" onclick="tab('clima', this)">ATMÓSFERA</button>
    <button class="nav-btn" onclick="tab('luz', this)">ENERGÍA</button>
    <button class="nav-btn" onclick="tab('gas', this)">GASOLINA</button>
    <button class="nav-btn" onclick="tab('iot', this)">DOMÓTICA</button>
</nav>

<main>
    <div id="clima" class="panel active">
        <h1>Almería Capital</h1>
        <div class="card">
            <div class="m-hero">
                <div>
                    <span class="label">Estado Actual</span>
                    <span class="temp-big" id="m-temp">--°</span>
                    <div id="m-desc" style="color:var(--bronce); margin-top:10px; font-weight:300;">Sincronizando...</div>
                </div>
                <div style="text-align: right;">
                    <span class="label">Humedad</span><div class="det-val" style="font-size:2rem" id="m-hum">--%</div>
                </div>
            </div>
            <div class="grid-detalles">
                <div class="det-box"><span class="label">Viento</span><span class="det-val" id="m-wind">-- km/h</span></div>
                <div class="det-box"><span class="label">Pto. Rocío</span><span class="det-val" id="m-dew">--°C</span></div>
                <div class="det-box"><span class="label">Visibilidad</span><span class="det-val" id="m-vis">-- km</span></div>
                <div class="det-box"><span class="label">Presión</span><span class="det-val" id="m-pres">-- hPa</span></div>
                <div class="det-box"><span class="label">Nubes</span><span class="det-val" id="m-cloud">--%</span></div>
                <div class="det-box"><span class="label">Índice UV</span><span class="det-val" id="m-uv">--</span></div>
            </div>
            <span class="label" style="margin-bottom:20px;">Previsión Próximos Días</span>
            <div class="forecast-grid" id="forecast-cont"></div>
        </div>
    </div>

    <div id="luz" class="panel">
        <h1>Precio Luz Hoy</h1>
        <div class="card">
            <div style="display:flex; gap:40px; margin-bottom:30px;">
                <div><span class="label">Mínimo</span><span class="det-val" id="l-min" style="color:var(--success)">--</span></div>
                <div><span class="label">Actual</span><span class="det-val" id="l-now" style="font-size:1.8rem">--</span></div>
                <div><span class="label">Máximo</span><span class="det-val" id="l-max" style="color:var(--danger)">--</span></div>
            </div>
            <canvas id="luzBarChart" height="100"></canvas>
        </div>
    </div>

    <div id="gas" class="panel">
        <h1>Estaciones de Servicio</h1>
        <div class="card">
            <table class="gas-table">
                <thead>
                    <tr>
                        <th>Estación</th>
                        <th>Dirección</th>
                        <th>G95 / Diesel A</th>
                    </tr>
                </thead>
                <tbody id="gas-list"></tbody>
            </table>
        </div>
    </div>

    <div id="iot" class="panel">
        <h1>Hestia Link</h1>
        <div class="card" style="display:flex; gap:20px; justify-content:center;">
            <button class="r-btn" onclick="tgl(1,this)">R1</button>
            <button class="r-btn" onclick="tgl(2,this)">R2</button>
            <button class="r-btn" onclick="tgl(3,this)">R3</button>
            <button class="r-btn" onclick="tgl(4,this)">R4</button>
        </div>
    </div>
</main>

<script>
    let currentChart = null;

    function tab(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'clima') loadMeteo();
        if(id === 'luz') loadLuz();
        if(id === 'gas') loadGas();
    }

    async function loadMeteo() {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.45&current_weather=true&hourly=relativehumidity_2m,dewpoint_2m,visibility,pressure_msl,cloudcover,uv_index&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe/Madrid');
        const d = await res.json();
        
        document.getElementById('m-temp').innerText = Math.round(d.current_weather.temperature) + "°";
        document.getElementById('m-hum').innerText = d.hourly.relativehumidity_2m[0] + "%";
        document.getElementById('m-wind').innerText = d.current_weather.windspeed + " km/h";
        document.getElementById('m-dew').innerText = d.hourly.dewpoint_2m[0];
        document.getElementById('m-vis').innerText = (d.hourly.visibility[0] / 1000).toFixed(1);
        document.getElementById('m-pres').innerText = Math.round(d.hourly.pressure_msl[0]);
        document.getElementById('m-cloud').innerText = d.hourly.cloudcover[0];
        document.getElementById('m-uv').innerText = d.hourly.uv_index[0];

        const icons = { 0:"☀️", 1:"🌤️", 2:"⛅", 3:"☁️", 45:"🌫️", 61:"🌧️", 80:"⛈️" };
        const days = ["Mañana", "Pasado", "Sábado"]; // Ejemplo simplificado
        let fhtml = '';
        for(let i=1; i<=3; i++) {
            fhtml += `
                <div class="f-card">
                    <span class="label">D+${i}</span>
                    <span class="f-icon">${icons[d.daily.weathercode[i]] || "🌤️"}</span>
                    <div class="f-temp">${Math.round(d.daily.temperature_2m_max[i])}° / ${Math.round(d.daily.temperature_2m_min[i])}°</div>
                    <div class="f-extra">💧 ${d.daily.precipitation_probability_max[i]}% Lluvia</div>
                </div>`;
        }
        document.getElementById('forecast-cont').innerHTML = fhtml;
    }

    async function loadLuz() {
        const prices = [0.12, 0.11, 0.10, 0.09, 0.08, 0.09, 0.12, 0.15, 0.18, 0.22, 0.20, 0.18, 0.16, 0.14, 0.13, 0.15, 0.18, 0.21, 0.25, 0.23, 0.20, 0.18, 0.16, 0.14];
        const ctx = document.getElementById('luzBarChart').getContext('2d');
        document.getElementById('l-min').innerText = Math.min(...prices).toFixed(3) + "€";
        document.getElementById('l-max').innerText = Math.max(...prices).toFixed(3) + "€";
        document.getElementById('l-now').innerText = prices[new Date().getHours()].toFixed(3) + " €";
        if(currentChart) currentChart.destroy();
        currentChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Array.from({length: 24}, (_, i) => i + 'h'),
                datasets: [{ data: prices, backgroundColor: prices.map(p => p > 0.18 ? 'rgba(255, 85, 85, 0.3)' : 'rgba(166, 124, 82, 0.3)'), borderRadius: 6 }]
            },
            options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { display: false } } }
        });
    }

    function loadGas() {
        const stations = [
            {n: "ALCAMPO", d: "Av. del Mediterráneo", g: "1.719", d: "1.589"},
            {n: "PLENOIL", d: "Ctra. de Níjar", g: "1.729", d: "1.609"},
            {n: "PETROPRIX", d: "Av. Montserrat", g: "1.729", d: "1.609"},
            {n: "BALLENOIL", d: "C. Autovía Almería", g: "1.735", d: "1.615"},
            {n: "PLENOIL II", d: "Pol. Ind. El Puche", g: "1.729", d: "1.609"},
            {n: "REPSOL", d: "Rambla Belén", g: "1.889", d: "1.779"},
            {n: "CEPSA", d: "Ctra. de Ronda", g: "1.895", d: "1.785"},
            {n: "BP", d: "Av. de la Vega", g: "1.919", d: "1.799"}
        ];
        document.getElementById('gas-list').innerHTML = stations.map(s => `
            <tr>
                <td><span class="gas-brand">${s.n}</span></td>
                <td style="color:#666; font-size:0.75rem">${s.d}</td>
                <td><span class="price-badge">${s.g}</span> <span class="price-dsl">${s.d}</span></td>
            </tr>
        `).join('');
    }

    function tgl(n, b) { b.classList.toggle('on'); b.innerText = `R${n} ${b.classList.contains('on')?'ON':'OFF'}`; }
    window.onload = loadMeteo;
</script>
</body>
</html>
