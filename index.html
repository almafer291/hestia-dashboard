<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HestiaLake v11 | Essential Bronze</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --bronce: #a67c52;
            --bronce-dim: rgba(166, 124, 82, 0.1);
            --border: rgba(166, 124, 82, 0.2);
            --text: #ffffff;
            --text-muted: #666666;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* --- NAVEGACIÓN --- */
        nav {
            width: 80px; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 30px 0;
        }

        /* LOGO SVG LLAMA */
        .logo-svg {
            width: 40px; height: 40px; margin-bottom: 50px;
            fill: url(#flameGradient);
            filter: drop-shadow(0 0 5px rgba(166, 124, 82, 0.5));
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        .nav-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: 0.7rem; letter-spacing: 1px; cursor: pointer;
            margin-bottom: 30px; transition: 0.3s;
        }
        .nav-btn.active { color: var(--bronce); font-weight: 600; }

        /* --- CONTENIDO --- */
        main { flex: 1; padding: 50px 80px; overflow-y: auto; scroll-behavior: smooth; }
        .panel { display: none; animation: fadeIn 0.6s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-weight: 100; font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 40px; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 24px; padding: 30px; margin-bottom: 24px; }

        /* GRID */
        .grid-meteo { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .m-box { padding: 20px; border-radius: 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 8px; }
        .value { font-size: 1.2rem; font-weight: 300; color: var(--bronce); }

        /* GASOLINERAS */
        .gas-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .price-tag { font-family: monospace; font-size: 1.1rem; color: var(--bronce); }

        /* RELÉS */
        .r-btn { width: 70px; height: 70px; border-radius: 50%; border: 1px solid var(--border); background: none; color: #444; cursor: pointer; transition: 0.4s; font-size: 0.7rem; }
        .r-btn.on { border-color: #50fa7b; color: #50fa7b; box-shadow: 0 0 15px rgba(80,250,123,0.1); }
    </style>
</head>
<body>

<nav>
    <svg class="logo-svg" viewBox="0 0 24 24">
        <defs>
            <linearGradient id="flameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#a67c52;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
            </linearGradient>
        </defs>
        <path d="M12,2C12,2 7,7.5 7,12C7,14.76 9.24,17 12,17C14.76,17 17,14.76 17,12C17,7.5 12,2 12,2M12,15C10.34,15 9,13.66 9,12C9,10 12,6.5 12,6.5C12,6.5 15,10 15,12C15,13.66 13.66,15 12,15Z" />
    </svg>
    <button class="nav-btn active" onclick="tab('clima', this)">METEO</button>
    <button class="nav-btn" onclick="tab('luz', this)">LUZ</button>
    <button class="nav-btn" onclick="tab('gas', this)">FUEL</button>
    <button class="nav-btn" onclick="tab('iot', this)">IOT</button>
</nav>

<main>
    <div id="clima" class="panel active">
        <h1>Atmósfera</h1>
        <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span class="label">Almería Capital</span>
                <span style="font-size: 5rem; font-weight: 100;" id="m-temp">--°</span>
            </div>
            <div style="text-align: right;">
                <span class="label">Previsión 3 Días</span>
                <div id="forecast" style="display: flex; gap: 20px; margin-top: 10px;"></div>
            </div>
        </div>
        <div class="grid-meteo">
            <div class="m-box"><span class="label">Humedad</span><span class="value" id="m-hum">--%</span></div>
            <div class="m-box"><span class="label">Viento</span><span class="value" id="m-wind">-- km/h</span></div>
            <div class="m-box"><span class="label">Nubes</span><span class="value" id="m-cloud">--%</span></div>
            <div class="m-box"><span class="label">Presión</span><span class="value" id="m-pres">-- hPa</span></div>
        </div>
    </div>

    <div id="luz" class="panel">
        <h1>Energía PVPC</h1>
        <div class="card">
            <div style="display: flex; gap: 30px; margin-bottom: 30px;">
                <div><span class="label">Mínimo Hoy</span><span class="value" id="l-min" style="color:#50fa7b">--</span></div>
                <div><span class="label">Precio Actual</span><span class="value" id="l-now" style="font-size: 1.8rem;">--</span></div>
                <div><span class="label">Máximo Hoy</span><span class="value" id="l-max" style="color:#ff5555">--</span></div>
            </div>
            <canvas id="luzBarChart" height="100"></canvas>
        </div>
    </div>

    <div id="gas" class="panel">
        <h1>Combustible</h1>
        <div class="card" id="gas-list">
            </div>
    </div>

    <div id="iot" class="panel">
        <h1>Hestia Link</h1>
        <div class="card" style="display: flex; gap: 20px; justify-content: center;">
            <button class="r-btn" onclick="tgl(1,this)">R1</button>
            <button class="r-btn" onclick="tgl(2,this)">R2</button>
            <button class="r-btn" onclick="tgl(3,this)">R3</button>
            <button class="r-btn" onclick="tgl(4,this)">R4</button>
        </div>
    </div>
</main>

<script>
    let currentChart = null;

    function tab(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'clima') loadMeteo();
        if(id === 'luz') loadLuz();
        if(id === 'gas') loadGas();
    }

    async function loadMeteo() {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.45&current_weather=true&hourly=relativehumidity_2m,cloudcover,pressure_msl&daily=temperature_2m_max,temperature_2m_min&timezone=Europe/Madrid');
        const d = await res.json();
        document.getElementById('m-temp').innerText = Math.round(d.current_weather.temperature) + "°";
        document.getElementById('m-hum').innerText = d.hourly.relativehumidity_2m[0] + "%";
        document.getElementById('m-wind').innerText = d.current_weather.windspeed + " km/h";
        document.getElementById('m-cloud').innerText = d.hourly.cloudcover[0] + "%";
        document.getElementById('m-pres').innerText = Math.round(d.hourly.pressure_msl[0]);

        let fhtml = '';
        for(let i=1; i<=3; i++) {
            fhtml += `<div><span class="label">D+${i}</span><span style="font-size:0.9rem">${Math.round(d.daily.temperature_2m_max[i])}° / ${Math.round(d.daily.temperature_2m_min[i])}°</span></div>`;
        }
        document.getElementById('forecast').innerHTML = fhtml;
    }

    async function loadLuz() {
        const prices = [0.12, 0.11, 0.10, 0.09, 0.08, 0.09, 0.12, 0.15, 0.18, 0.22, 0.20, 0.18, 0.16, 0.14, 0.13, 0.15, 0.18, 0.21, 0.25, 0.23, 0.20, 0.18, 0.16, 0.14];
        const ctx = document.getElementById('luzBarChart').getContext('2d');
        
        document.getElementById('l-min').innerText = Math.min(...prices).toFixed(3) + "€";
        document.getElementById('l-max').innerText = Math.max(...prices).toFixed(3) + "€";
        document.getElementById('l-now').innerText = prices[new Date().getHours()].toFixed(3) + " €/kWh";

        if(currentChart) currentChart.destroy();
        currentChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Array.from({length: 24}, (_, i) => i + 'h'),
                datasets: [{
                    label: '€/kWh',
                    data: prices,
                    backgroundColor: prices.map(p => p > 0.18 ? 'rgba(255, 85, 85, 0.4)' : 'rgba(166, 124, 82, 0.4)'),
                    borderRadius: 5,
                    borderWidth: 0
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { x: { grid: { display: false } }, y: { display: false } }
            }
        });
    }

    function loadGas() {
        const data = [
            {n: "ALCAMPO", g: "1.729", d: "1.589"},
            {n: "PLENOIL", g: "1.749", d: "1.609"},
            {n: "PETROPRIX", g: "1.749", d: "1.609"},
            {n: "REPSOL", g: "1.899", d: "1.789"}
        ];
        document.getElementById('gas-list').innerHTML = `
            <div class="gas-row" style="border-bottom: 2px solid var(--border)"><span class="label">ESTACIÓN</span><span class="label">G95 / DSL</span></div>
        ` + data.map(i => `
            <div class="gas-row">
                <span>${i.n}</span>
                <span class="price-tag">${i.g} / ${i.d}</span>
            </div>
        `).join('');
    }

    function tgl(n, b) {
        b.classList.toggle('on');
        b.innerText = `R${n} ${b.classList.contains('on')?'ON':'OFF'}`;
    }

    window.onload = loadMeteo;
</script>
</body>
</html>
