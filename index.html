<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v88 | Almería</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166,124,82,0.15); }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Navegación */
        nav { width: 65px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #050505; flex-shrink: 0; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 40px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s; }
        .n-btn.active { color: var(--bronce); font-weight: bold; }
        
        /* Contenido */
        main { flex: 1; padding: 25px; overflow-y: auto; }
        .panel { display: none; }
        .panel.active { display: block; }
        
        h1 { font-size: 0.8rem; color: var(--bronce); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; text-align: center; }
        .card { background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 12px; border-left: 3px solid var(--bronce); display: flex; justify-content: space-between; align-items: center; }
        .name { font-size: 0.75rem; color: #888; text-transform: uppercase; }
        .price { color: var(--bronce); font-weight: bold; font-size: 1.3rem; font-family: monospace; }
        
        .loading { text-align: center; color: #333; font-size: 0.8rem; margin-top: 50px; letter-spacing: 2px; }
    </style>
</head>
<body>

<nav>
    <button id="btn-m" class="n-btn active" onclick="tab('m')">CLIMA</button>
    <button id="btn-g" class="n-btn" onclick="tab('g')">FUEL</button>
    <button id="btn-l" class="n-btn" onclick="tab('l')">LUZ</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h1>ALMERÍA</h1>
        <div class="card" style="justify-content:center; padding:50px;"><div id="t" style="font-size:5rem;">--°</div></div>
    </div>

    <div id="g" class="panel">
        <h1>GASOLINA 95</h1>
        <div id="g-list"><div class="loading">SINCRONIZANDO...</div></div>
    </div>

    <div id="l" class="panel">
        <h1>LUZ HOY</h1>
        <div id="l-now"><div class="loading">BUSCANDO...</div></div>
    </div>
</main>

<script>
    https://hestia-proxy.almafer291.workers.dev/
    const WORKER_URL = "https://TU-WORKER.tu-usuario.workers.dev";

    function tab(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(id !== 'm') loadData();
    }

    async function loadClima() {
        const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true');
        const d = await r.json();
        document.getElementById('t').innerText = Math.round(d.current_weather.temperature)+'°';
    }

    async function loadData() {
        try {
            const r = await fetch(WORKER_URL);
            const data = await r.json();

            // Dibujar Gasolina
            document.getElementById('g-list').innerHTML = data.gasolina.map(e => `
                <div class="card">
                    <span class="name">${e.Rótulo}</span>
                    <span class="price">${e['Precio Gasolina 95 E5']}€</span>
                </div>
            `).join('');

            // Dibujar Luz
            document.getElementById('l-now').innerHTML = `
                <div class="card" style="flex-direction:column; padding:30px;">
                    <div class="price" style="font-size:2.5rem;">${data.luz}</div>
                    <div style="font-size:0.7rem; color:#444; margin-top:10px;">€/kWh ACTUAL</div>
                </div>`;
        } catch(e) {
            document.getElementById('g-list').innerHTML = "<div class='card'>ERROR DE CONEXIÓN</div>";
        }
    }

    window.onload = loadClima;
</script>
</body>
</html>
