<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA ATELIER | v2100 GLOBAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000; --surface: #080808; --accent: #D4AF37; 
            --border: #151515; --text: #FFF; --text-dim: #444;
            --silver: #E5E5E5;
            --ev-low: #2D5A27; --ev-mid: #8B732A; --ev-high: #944D25; --ev-peak: #8B2A2A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* NAVEGACIÓN LATERAL */
        aside { width: 220px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 15px; }
        .brand { text-align: center; margin-bottom: 40px; }
        .hestia-txt { font-weight: 600; font-size: 0.8rem; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-top: 8px; display: block; }
        nav { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .nav-item { display: flex; align-items: center; gap: 10px; color: var(--text-dim); padding: 12px; border-radius: 6px; cursor: pointer; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; transition: 0.2s; }
        .nav-item:hover { color: #fff; }
        .nav-item.active { color: var(--accent); background: rgba(212, 175, 55, 0.05); }

        /* CONTENIDO */
        main { flex: 1; overflow-y: auto; padding: 30px 40px; }
        .panel { display: none; max-width: 1400px; margin: 0 auto; }
        .panel.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* GRID & CARDS */
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; margin-bottom: 20px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 2px; }
        .c-tit { font-size: 0.5rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .c-val { font-size: 2.2rem; font-weight: 100; color: #fff; }
        .c-val.bold { font-weight: 800; }
        
        /* RADAR MAP IFRAME */
        .map-container { width: 100%; height: 70vh; border-radius: 4px; border: 1px solid var(--border); overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; filter: grayscale(0.2) contrast(1.1); }

        /* GASOLINERAS MINI-CARDS */
        .f-grid-mini { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
        .f-mini { background: #050505; border: 1px solid #111; padding: 15px; }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            aside { width: 100%; height: auto; flex-direction: row; padding: 10px; border-right: none; border-bottom: 1px solid var(--border); }
            main { padding: 15px; }
            .grid { grid-template-columns: 1fr; }
            .card { grid-column: span 1 !important; }
        }
    </style>
</head>
<body>

<aside>
    <div class="brand"><i class="ph-fill ph-fire" style="font-size: 1.8rem; color: var(--accent);"></i><span class="hestia-txt">Hestia</span></div>
    <nav>
        <div class="nav-item active" onclick="tab('clima', this)"><i class="ph-duotone ph-thermometer"></i><span>Clima</span></div>
        <div class="nav-item" onclick="tab('radar', this)"><i class="ph-duotone ph-broadcast"></i><span>Live Radar</span></div>
        <div class="nav-item" onclick="tab('energia', this)"><i class="ph-duotone ph-lightning"></i><span>Energía</span></div>
        <div class="nav-item" onclick="tab('fuel', this)"><i class="ph-duotone ph-gas-pump"></i><span>Mercado</span></div>
    </nav>
</aside>

<main>
    <div id="clima" class="panel active">
        <div class="grid">
            <div class="card" style="grid-column: span 12; height: 300px;"><span class="c-tit">Evolución 24H (Temp & Viento)</span><canvas id="tempChart"></canvas></div>
            <div class="card" style="grid-column: span 3;"><span class="c-tit">Humedad</span><div class="c-val" id="w-hum">--%</div></div>
            <div class="card" style="grid-column: span 3;"><span class="c-tit">UV</span><div class="c-val" id="w-uv">--</div></div>
            <div class="card" style="grid-column: span 3;"><span class="c-tit">PM2.5</span><div class="c-val bold" id="aq-pm2">--</div></div>
            <div class="card" style="grid-column: span 3;"><span class="c-tit">O3</span><div class="c-val bold" id="aq-o3">--</div></div>
        </div>
    </div>

    <div id="radar" class="panel">
        <div class="map-container">
            <iframe id="windy-frame" src="https://embed.windy.com/embed2.html?lat=36.83&lon=-2.46&zoom=8&level=surface&overlay=rain&product=ecmwf&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1"></iframe>
        </div>
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <button onclick="changeRadar('rain')" style="background:var(--accent); color:#000; border:none; padding:10px; font-size:0.6rem; font-weight:900; cursor:pointer">LLUVIA</button>
            <button onclick="changeRadar('wind')" style="background:#222; color:#fff; border:none; padding:10px; font-size:0.6rem; font-weight:900; cursor:pointer">VIENTO</button>
            <button onclick="changeRadar('clouds')" style="background:#222; color:#fff; border:none; padding:10px; font-size:0.6rem; font-weight:900; cursor:pointer">NUBES</button>
        </div>
    </div>

    <div id="energia" class="panel">
        <div class="grid">
            <div class="card" style="grid-column: span 8;"><span class="c-tit">Histórico 24H</span><canvas id="energyChart" style="max-height: 250px;"></canvas></div>
            <div class="card" style="grid-column: span 4; display: flex; flex-direction: column; justify-content: center; text-align: center; border: 1px solid var(--ev-low);">
                <span class="c-tit" style="justify-content: center;">Mejor Hora para Consumo</span>
                <div class="c-val" id="e-best" style="color:var(--ev-low); font-weight:800">--:00H</div>
                <div class="c-sub">COSTE MÍNIMO GARANTIZADO</div>
            </div>
            <div class="card" style="grid-column: span 6;"><span class="c-tit">Actual</span><div class="c-val" id="e-now" style="color:var(--accent)">--</div></div>
            <div class="card" style="grid-column: span 6;"><span class="c-tit">Vs Media</span><div class="c-val" id="e-diff">--%</div></div>
        </div>
    </div>

    <div id="fuel" class="panel">
        <div class="f-grid-mini" id="f-grid"></div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhKc7R97_ph2VQOq-uLMXFv-Wnyy0srXw", projectId: "hestia-31da3", appId: "1:577704397868:web:e83026e730640a0bc1d589" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // CONTROL RADAR
    window.changeRadar = (type) => {
        const frame = document.getElementById('windy-frame');
        frame.src = `https://embed.windy.com/embed2.html?lat=36.83&lon=-2.46&zoom=8&overlay=${type}&product=ecmwf&metricWind=km%2Fh&metricTemp=%C2%B0C`;
    };

    // GASOLINERAS TOP 20
    onSnapshot(doc(db, "market", "fuel"), (snap) => {
        const data = snap.data();
        if (data?.stations) {
            const sorted = data.stations.filter(s => s['Precio Gasolina 95 E5']).sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.'))).slice(0, 20);
            document.getElementById('f-grid').innerHTML = sorted.map(s => `
                <div class="f-mini">
                    <div style="color:var(--accent); font-weight:800; font-size:0.7rem">${s['Rótulo']}</div>
                    <div style="color:#333; font-size:0.5rem; margin-bottom:8px">${s['Dirección']}</div>
                    <div style="display:flex; justify-content:space-between">
                        <span style="color:var(--accent); font-weight:200; font-size:1.1rem">${s['Precio Gasolina 95 E5']}€</span>
                        <span style="color:var(--silver); font-weight:200; font-size:1.1rem">${s['Precio Gasoleo A']}€</span>
                    </div>
                </div>
            `).join('');
        }
    });

    // CLIMA & GRÁFICAS
    async function getClima() {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&hourly=temperature_2m,windspeed_10m,pm2_5,ozone,relativehumidity_2m,uv_index&timezone=auto").then(r => r.json());
        const h = new Date().getHours();
        document.getElementById('w-hum').innerText = res.hourly.relativehumidity_2m[h] + "%";
        document.getElementById('w-uv').innerText = res.hourly.uv_index[h];
        document.getElementById('aq-pm2').innerText = res.hourly.pm2_5[h];
        document.getElementById('aq-o3').innerText = res.hourly.ozone[h];

        new Chart(document.getElementById('tempChart'), {
            type: 'line',
            data: {
                labels: res.hourly.time.slice(0, 24).map(t => t.split('T')[1]),
                datasets: [{ label: 'Temp', data: res.hourly.temperature_2m.slice(0, 24), borderColor: '#D4AF37', tension: 0.4, borderWidth: 1, pointRadius: 0 }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#111' } }, x: { grid: { display: false } } } }
        });
    }

    // ENERGIA & GRÁFICA
    async function getEnergia() {
        const hoy = new Date().toISOString().split('T')[0];
        const res = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${hoy}T00:00&end_date=${hoy}T23:59&time_trunc=hour`).then(r => r.json());
        const prices = res.included[0].attributes.values.map(v => v.value / 1000);
        const h = new Date().getHours();
        const minVal = Math.min(...prices), avg = prices.reduce((a,b)=>a+b)/24;

        document.getElementById('e-now').innerText = prices[h].toFixed(4) + " €";
        document.getElementById('e-best').innerText = prices.indexOf(minVal) + ":00H";
        document.getElementById('e-diff').innerText = (((prices[h] - avg) / avg) * 100).toFixed(1) + "%";

        new Chart(document.getElementById('energyChart'), {
            type: 'bar',
            data: {
                labels: Array.from({length: 24}, (_, i) => i + "h"),
                datasets: [{ data: prices, backgroundColor: prices.map(p => p === minVal ? '#2D5A27' : '#111') }]
            },
            options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#111' } } } }
        });
    }

    window.tab = (id, btn) => {
        document.querySelectorAll('.panel, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    getClima(); getEnergia();
</script>
</body>
</html>
