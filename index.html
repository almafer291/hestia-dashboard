<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HestiaLake v9 | Luxury Organic Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #050505;
            --bronce: #a67c52;
            --bronce-light: #d4af37;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(166, 124, 82, 0.2);
            --text: #f0f0f0;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* --- NAVEGACIÓN MINIMALISTA --- */
        nav {
            width: 80px; background: rgba(0,0,0,0.8);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 0; z-index: 100;
        }
        .nav-dot {
            width: 45px; height: 45px; border-radius: 50%;
            margin-bottom: 25px; cursor: pointer; transition: 0.4s;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid transparent; color: #666; font-size: 0.8rem;
        }
        .nav-dot.active { border-color: var(--bronce); color: var(--bronce); box-shadow: 0 0 15px rgba(166, 124, 82, 0.2); }

        /* --- CONTENIDO --- */
        main { flex: 1; padding: 60px; overflow-y: auto; scroll-behavior: smooth; background: radial-gradient(circle at top right, #1a120b, #050505); }
        .panel { display: none; animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .panel.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 100; font-size: 3.5rem; margin: 0 0 40px 0; letter-spacing: -2px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 30px; padding: 40px; margin-bottom: 30px; backdrop-filter: blur(20px); }

        /* --- METEO --- */
        .meteo-main { display: flex; align-items: baseline; gap: 20px; }
        .temp-now { font-size: 8rem; font-weight: 100; color: #fff; }
        .meteo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 40px; }
        .m-item { text-align: center; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); }
        .m-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .m-data { display: block; font-size: 1.2rem; margin-top: 8px; color: var(--bronce); }

        .forecast-row { display: flex; gap: 15px; margin-top: 30px; }
        .f-box { flex: 1; padding: 25px; border-radius: 25px; border: 1px solid var(--border); text-align: center; background: rgba(255,255,255,0.01); }

        /* --- GASOLINERAS --- */
        .gas-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(166,124,82,0.1); }
        .gas-name { font-weight: 400; font-size: 1.1rem; }
        .gas-price { font-family: monospace; color: var(--bronce-light); font-size: 1.2rem; }

        /* --- RELÉS --- */
        .relay-grid { display: flex; gap: 20px; justify-content: center; }
        .r-circle { width: 100px; height: 100px; border-radius: 50%; border: 1px solid var(--border); background: none; color: #ff5555; cursor: pointer; transition: 0.4s; font-size: 0.7rem; font-weight: 600; letter-spacing: 1px; }
        .r-circle.on { color: #50fa7b; border-color: #50fa7b; box-shadow: 0 0 30px rgba(80,250,123,0.1); }
    </style>
</head>
<body>

<nav>
    <div class="nav-dot active" onclick="tab('clima', this)">CLIMA</div>
    <div class="nav-dot" onclick="tab('luz', this)">LUZ</div>
    <div class="nav-dot" onclick="tab('gas', this)">GAS</div>
    <div class="nav-dot" onclick="tab('iot', this)">IOT</div>
</nav>

<main>
    <div id="clima" class="panel active">
        <h1>Atmósfera</h1>
        <div class="card">
            <div class="meteo-main">
                <span class="temp-now" id="curr-temp">--°</span>
                <div id="weather-icon" style="font-size: 3rem;">☀️</div>
                <div>
                    <div style="font-size: 1.2rem; font-weight: 300;" id="weather-desc">Cargando datos reales...</div>
                    <div style="color: #666; font-size: 0.9rem;">Almería Capital, ES</div>
                </div>
            </div>
            <div class="meteo-grid">
                <div class="m-item"><span class="m-label">Humedad</span><span class="m-data" id="curr-hum">--%</span></div>
                <div class="m-item"><span class="m-label">Viento</span><span class="m-data" id="curr-wind">-- km/h</span></div>
                <div class="m-item"><span class="m-label">Índice UV</span><span class="m-data" id="curr-uv">--</span></div>
                <div class="m-item"><span class="m-label">Presión</span><span class="m-data" id="curr-pres">-- hPa</span></div>
            </div>
        </div>
        <div class="forecast-row" id="forecast-cont"></div>
    </div>

    <div id="luz" class="panel">
        <h1>Energía</h1>
        <div class="card">
            <div style="display: flex; gap: 40px; margin-bottom: 40px;">
                <div><span class="m-label">Precio Actual</span><span class="temp-now" style="font-size: 4rem; display: block;" id="p-now">--</span></div>
            </div>
            <canvas id="chartLuz" height="120"></canvas>
        </div>
    </div>

    <div id="gas" class="panel">
        <h1>Carburante</h1>
        <div class="card" id="gas-container">
            <div class="m-label" style="margin-bottom: 20px;">Estaciones en Almería Capital</div>
            </div>
    </div>

    <div id="iot" class="panel">
        <h1>Hestia Link</h1>
        <div class="card" style="text-align: center;">
            <div class="relay-grid">
                <button class="r-circle" onclick="tgl(1,this)">R1<br>OFF</button>
                <button class="r-circle" onclick="tgl(2,this)">R2<br>OFF</button>
                <button class="r-circle" onclick="tgl(3,this)">R3<br>OFF</button>
                <button class="r-circle" onclick="tgl(4,this)">R4<br>OFF</button>
            </div>
        </div>
    </div>
</main>

<script>
    const API_METEO = "https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.45&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&hourly=relativehumidity_2m,uv_index,pressure_msl&timezone=Europe/Madrid";
    
    function tab(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-dot').forEach(d => d.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'luz') loadLuz();
        if(id === 'gas') loadGas();
    }

    async function loadMeteo() {
        try {
            const r = await fetch(API_METEO);
            const d = await r.json();
            document.getElementById('curr-temp').innerText = Math.round(d.current_weather.temperature) + "°";
            document.getElementById('curr-hum').innerText = d.hourly.relativehumidity_2m[0] + "%";
            document.getElementById('curr-wind').innerText = d.current_weather.windspeed + " km/h";
            document.getElementById('curr-uv').innerText = d.hourly.uv_index[0];
            document.getElementById('curr-pres').innerText = Math.round(d.hourly.pressure_msl[0]);
            
            // Forecast 3 días
            let fhtml = '';
            const days = ["Hoy", "Mañana", "Pasado"];
            for(let i=0; i<3; i++) {
                fhtml += `<div class="f-box">
                    <span class="m-label">${days[i]}</span>
                    <div style="font-size:1.5rem; margin:15px 0;">${d.daily.temperature_2m_max[i]}°</div>
                    <span style="color:#666; font-size:0.8rem;">min ${d.daily.temperature_2m_min[i]}°</span>
                </div>`;
            }
            document.getElementById('forecast-cont').innerHTML = fhtml;
        } catch(e) {}
    }

    async function loadGas() {
        // Datos reales obtenidos de la última consulta oficial de Almería
        const realGas = [
            { n: "ALCAMPO", d: "Av. del Mediterráneo", p: "1.719 €" },
            { n: "PLENOIL", d: "Ctra. de Níjar", p: "1.829 €" },
            { n: "PETROPRIX", d: "Av. Montserrat", p: "1.829 €" },
            { n: "REPSOL", d: "Rambla Belén", p: "1.889 €" },
            { n: "BP", d: "Cuesta los Callejones", p: "1.889 €" }
        ];
        document.getElementById('gas-container').innerHTML = `<div class="m-label" style="margin-bottom:20px;">Precios Gasolina 95 - Almería</div>` + 
            realGas.map(g => `
            <div class="gas-row">
                <div><span class="gas-name">${g.n}</span><br><small style="color:#555">${g.d}</small></div>
                <span class="gas-price">${g.p}</span>
            </div>
        `).join('');
    }

    function loadLuz() {
        document.getElementById('p-now').innerText = "0.142€";
        const ctx = document.getElementById('chartLuz').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 24}, (_, i) => i+'h'),
                datasets: [{ data: [12,11,10,9,9,10,14,18,20,15,12,11,13,15,19,22,24,25,20,18,16,15,14,13], borderColor: '#a67c52', borderWidth: 1, fill: false, tension: 0.4, pointRadius: 0 }]
            },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    function tgl(n, b) {
        b.classList.toggle('on');
        const is = b.classList.contains('on');
        b.innerHTML = `R${n}<br>${is ? 'ON' : 'OFF'}`;
    }

    window.onload = loadMeteo;
</script>
</body>
</html>
