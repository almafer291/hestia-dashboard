<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v65 | Almería Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166,124,82,0.2); --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Navegación Lateral */
        nav { width: 65px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #050505; flex-shrink: 0; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 40px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s; }
        .n-btn.active { color: var(--bronce); font-weight: bold; }
        
        /* Contenedor Principal */
        main { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .panel { display: none; width: 100%; max-width: 400px; text-align: center; }
        .panel.active { display: flex; flex-direction: column; gap: 20px; }
        
        /* Tarjetas y Botones */
        .card { background: #0a0a0a; border: 1px solid var(--border); border-radius: 15px; padding: 25px; border-left: 4px solid var(--bronce); }
        .action-btn { background: var(--bronce); color: #000; border: none; padding: 15px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; transition: transform 0.2s; font-size: 0.9rem; }
        .action-btn:active { transform: scale(0.95); }
        
        h1 { font-size: 1.2rem; color: var(--bronce); letter-spacing: 3px; margin-bottom: 10px; }
        .temp { font-size: 5rem; font-weight: 100; margin: 10px 0; }
    </style>
</head>
<body>

<nav>
    <button class="n-btn active" onclick="tab('m', this)">CLIMA</button>
    <button class="n-btn" onclick="tab('g', this)">FUEL</button>
    <button class="n-btn" onclick="tab('l', this)">LUZ</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h1>ALMERÍA</h1>
        <div class="card">
            <div class="temp" id="t">--°</div>
            <p style="color:#555; letter-spacing:1px;">CIELO DESPEJADO</p>
        </div>
    </div>

    <div id="g" class="panel">
        <h1>GASOLINERAS</h1>
        <div class="card">
            <p>Consulta los precios oficiales actualizados en Almería capital.</p>
            <a href="https://www.dieselogasolina.com/gasolineras-baratas/almeria/almeria.html" target="_blank" class="action-btn">VER PRECIOS FUEL</a>
        </div>
    </div>

    <div id="l" class="panel">
        <h1>ENERGÍA</h1>
        <div class="card">
            <p>Precio del kWh en tiempo real (PVPC) para hoy en Almería.</p>
            <a href="https://tarifaluzhora.es/" target="_blank" class="action-btn">VER PRECIO LUZ</a>
        </div>
    </div>
</main>

<script>
    function tab(id, b) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        b.classList.add('active');
    }

    async function loadM() {
        try {
            const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true');
            const d = await r.json();
            document.getElementById('t').innerText = Math.round(d.current_weather.temperature)+'°';
        } catch(e) { document.getElementById('t').innerText = "22°"; }
    }

    window.onload = loadM;
</script>
</body>
</html>
