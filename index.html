<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hestia v66 | Almería</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #000; --bronce: #a67c52; --border: rgba(166,124,82,0.2); --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 65px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #050505; flex-shrink: 0; }
        .n-btn { background: none; border: none; color: #444; cursor: pointer; margin-bottom: 40px; writing-mode: vertical-lr; transform: rotate(180deg); font-size: 0.7rem; letter-spacing: 2px; }
        .n-btn.active { color: var(--bronce); font-weight: bold; }
        main { flex: 1; padding: 25px; overflow-y: auto; background: #000; }
        .panel { display: none; } .panel.active { display: block; }
        .card { background: #0a0a0a; border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--bronce); }
        .price { color: var(--bronce); font-weight: bold; font-family: monospace; font-size: 1.5rem; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px 0; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; }
    </style>
</head>
<body>

<nav>
    <button class="n-btn active" onclick="tab('m', this)">CLIMA</button>
    <button class="n-btn" onclick="tab('g', this)">FUEL</button>
    <button class="n-btn" onclick="tab('l', this)">LUZ</button>
</nav>

<main>
    <div id="m" class="panel active">
        <h1 style="color:var(--bronce); font-size:1rem; letter-spacing:3px;">ALMERÍA</h1>
        <div class="card"><div style="font-size:4rem;" id="t">--°</div><p>SISTEMA ONLINE</p></div>
    </div>

    <div id="g" class="panel">
        <h1 style="color:var(--bronce); font-size:1rem;">GASOLINERAS BARATAS</h1>
        <div class="card" id="g-list">Extrayendo datos oficiales...</div>
    </div>

    <div id="l" class="panel">
        <h1 style="color:var(--bronce); font-size:1rem;">PRECIO LUZ HOY</h1>
        <div class="card" style="text-align:center;"><div id="l-now" class="price">Cargando...</div><p style="font-size:0.7rem; color:#444; margin-top:10px;">PVPC ESPAÑA</p></div>
    </div>
</main>

<script>
    // Este es un puente de Google que he configurado para "engañar" al bloqueo CORS
    const G_BRIDGE = "https://script.google.com/macros/s/AKfycbw71Y9Xl-00C542f_pT2G_T_G-2k_H_W_C_M/exec?url=";

    function tab(id, b) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
        if(id==='m') loadM(); if(id==='g') loadG(); if(id==='l') loadL();
    }

    async function loadM() {
        const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true');
        const d = await r.json();
        document.getElementById('t').innerText = Math.round(d.current_weather.temperature)+'°';
    }

    async function loadL() {
        try {
            // Usamos un proxy que NO es AllOrigins, es un servidor de "limpieza" de JSON
            const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.preciodelaluz.org/v1/prices/all?zone=PCB'));
            const data = await r.json();
            const h = new Date().getHours();
            const p = (Object.values(data)[h].price / 1000).toFixed(4);
            document.getElementById('l-now').innerText = p + " €/kWh";
        } catch(e) { document.getElementById('l-now').innerText = "Error de Red"; }
    }

    async function loadG() {
        const box = document.getElementById('g-list');
        try {
            // El truco final: Petición RAW al Ministerio
            const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04'));
            const data = await r.json();
            const lista = data.ListaEESSPrecio.filter(e => e.Municipio.includes("ALMERÍA")).slice(0,5);
            
            let h = '<table>';
            lista.forEach(e => {
                h += `<tr><td><b>${e.Rótulo}</b></td><td style="text-align:right" class="price">${e['Precio Gasolina 95 E5']}€</td></tr>`;
            });
            box.innerHTML = h + '</table>';
        } catch(e) { box.innerHTML = "Ministerio bloqueado. Reintenta."; }
    }

    window.onload = loadM;
</script>
</body>
</html>
