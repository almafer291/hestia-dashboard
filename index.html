<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HESTIA | Home Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0c; --bg-sidebar: #050505; --gold: #d4af37; --gold-dim: #a68a2c;
            --bronze: #cd7f32; --bronze-glow: rgba(205, 127, 50, 0.3); --slate: #e0e0e0;
            --slate-muted: #666; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --success: #4caf50; --warning: #ffb300; --danger: #f44336;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); color: var(--slate); font-family: 'Lato', sans-serif; height: 100vh; overflow: hidden; display: flex; }
        .sidebar { width: 260px; background: var(--bg-sidebar); padding: 40px 20px; display: flex; flex-direction: column; border-right: 1px solid var(--glass-border); }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 50px; cursor: default; }
        .brand i { font-size: 1.8rem; color: var(--bronze); text-shadow: 0 0 10px var(--bronze-glow); }
        .brand span { font-family: 'Playfair Display'; font-size: 1.6rem; letter-spacing: 2px; font-weight: 700; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 15px; color: var(--slate-muted); cursor: pointer; border-radius: 12px; margin-bottom: 5px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        .nav-item.active { box-shadow: inset 4px 0 0 var(--gold); font-weight: 700; }
        .main-content { flex: 1; padding: 30px 50px; overflow-y: auto; display: flex; flex-direction: column; }
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; }
        .section-title { font-family: 'Playfair Display'; font-size: 2.8rem; font-weight: 400; }
        .clock-box { text-align: right; }
        #live-time { font-size: 2rem; font-family: 'Playfair Display'; display: block; }
        #live-date { color: var(--slate-muted); font-size: 0.85rem; }
        .tab-content { display: none; width: 100%; animation: fadeIn 0.4s ease forwards; }
        .tab-content.active { display: flex; flex-direction: column; gap: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; backdrop-filter: blur(12px); }
        .atmosphere-layout { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; }
        .weather-hero { text-align: center; margin-bottom: 30px; }
        .weather-hero i { font-size: 4rem; color: var(--gold); margin-bottom: 10px; }
        .main-temp { font-family: 'Playfair Display'; font-size: 5.5rem; font-weight: 700; }
        .weather-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .w-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.02); }
        .w-item span { font-size: 0.6rem; color: var(--slate-muted); text-transform: uppercase; display: block; }
        .price-focus { text-align: center; margin-bottom: 25px; }
        .price-focus h2 { font-size: 4.5rem; font-family: 'Playfair Display'; margin: 5px 0; }
        @media (max-width: 800px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 70px; flex-direction: row; position: fixed; bottom: 0; padding: 0 10px; border-top: 1px solid var(--glass-border); }
            .brand { display: none; }
            .main-content { padding: 20px; }
            .atmosphere-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand"><i class="fas fa-fire-alt"></i><span>HESTIA</span></div>
        <nav style="display:flex; flex-direction:inherit; width:100%">
            <div class="nav-item active" onclick="switchTab('atmosphere')"><i class="fas fa-cloud-sun"></i><span>Atmosphere</span></div>
            <div class="nav-item" onclick="switchTab('energy')"><i class="fas fa-bolt"></i><span>Energy</span></div>
            <div class="nav-item" onclick="switchTab('core')"><i class="fas fa-microchip"></i><span>Core</span></div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div style="font-size:0.8rem; color:var(--slate-muted)">HESTIA / <b id="tab-name-breadcrumb" style="color:var(--gold)">Atmosphere</b></div>
            <div style="font-size:0.7rem; color:var(--success)"><i class="fas fa-circle"></i> CLOUD CONNECTED</div>
        </header>
        <div class="section-header">
            <h1 class="section-title" id="display-title">Atmosphere</h1>
            <div class="clock-box"><span id="live-time">00:00:00</span><span id="live-date">...</span></div>
        </div>

        <section id="tab-atmosphere" class="tab-content active">
            <div class="atmosphere-layout">
                <div class="glass-card">
                    <div class="weather-hero"><i class="fas fa-sun"></i><div class="main-temp">21°</div><p style="letter-spacing:2px; color:var(--slate-muted)">ALMERÍA, ES</p></div>
                    <div class="weather-grid">
                        <div class="w-item"><span>Sensación</span><b>20°C</b></div>
                        <div class="w-item"><span>Humedad</span><b>62%</b></div>
                        <div class="w-item" style="border-color:var(--gold)"><span>Viento</span><b style="color:var(--gold)">18 km/h</b></div>
                    </div>
                </div>
                <div class="glass-card"><h3 style="color:var(--gold); margin-bottom:15px">Forecast</h3><div id="forecast-list"></div></div>
            </div>
        </section>

        <section id="tab-energy" class="tab-content">
            <div class="glass-card">
                <div class="price-focus"><p>PRECIO PVPC ACTUAL</p><h2 id="energy-price">0.0000</h2><div id="energy-status" style="font-weight:700">CONECTANDO...</div></div>
                <div style="height:300px"><canvas id="energyChart"></canvas></div>
            </div>
        </section>

        <section id="tab-core" class="tab-content"><div class="glass-card"><h2>System Diagnostics</h2><p style="margin-top:10px; color:var(--slate-muted)">Todos los sistemas operativos. No se han detectado intrusiones.</p></div></section>
    </main>

    <script>
        let myChart = null;
        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true });
            document.getElementById('live-date').innerText = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
        }
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            document.getElementById('tab-name-breadcrumb').innerText = tabId.toUpperCase();
            document.getElementById('display-title').innerText = tabId.charAt(0).toUpperCase() + tabId.slice(1);
            if(tabId === 'energy') loadEnergyData();
        }
        async function loadEnergyData() {
            const priceEl = document.getElementById('energy-price');
            const statusEl = document.getElementById('energy-status');
            try {
                const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.preciodelaluz.org/v1/prices/all?zone=PCB'));
                const json = await res.json();
                const data = JSON.parse(json.contents);
                const hours = Object.values(data);
                const prices = hours.map(h => h.price / 1000);
                const labels = hours.map(h => h.hour + 'h');
                const now = new Date().getHours();
                const currentP = prices[now];
                priceEl.innerText = currentP.toFixed(4);
                if(currentP < 0.14) { priceEl.style.color = "var(--success)"; statusEl.innerText = "HORA ÓPTIMA"; statusEl.style.color = "var(--success)"; }
                else { priceEl.style.color = "var(--danger)"; statusEl.innerText = "HORA CARA"; statusEl.style.color = "var(--danger)"; }
                renderChart(labels, prices, now);
            } catch (e) {
                priceEl.innerText = "Error"; statusEl.innerText = "SERVICIO NO DISPONIBLE";
            }
        }
        function renderChart(labels, data, now) {
            const ctx = document.getElementById('energyChart');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ data: data, backgroundColor: labels.map((_, i) => i === now ? '#cd7f32' : 'rgba(212, 175, 55, 0.1)'), borderRadius: 5 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#666' } }, x: { grid: { display: false }, ticks: { color: '#666' } } } }
            });
        }
        setInterval(updateClock, 1000); updateClock();
        document.getElementById('forecast-list').innerHTML = `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--glass-border)"><span>Tarde</span><b>23°</b></div><div style="display:flex; justify-content:space-between; padding:10px 0"><span>Noche</span><b>16°</b></div>`;
    </script>
</body>
</html>
