<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HESTIA | Almería Dashboard</title>
    <style>
        :root {
            --gold: #c5a059;
            --gold-dim: #a67c52;
            --bg: #0a0a0a;
            --card-bg: #111111;
            --border: rgba(197, 160, 89, 0.2);
            --text-main: #e0e0e0;
            --text-dim: #777;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navegación */
        nav {
            width: 80px;
            background: #000;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            flex-shrink: 0;
        }

        .logo-area {
            margin-bottom: 60px;
            text-align: center;
        }

        .logo-svg {
            width: 35px;
            fill: var(--gold);
            filter: drop-shadow(0 0 8px rgba(197, 160, 89, 0.4));
        }

        .logo-name {
            font-size: 0.6rem;
            letter-spacing: 3px;
            margin-top: 10px;
            color: var(--gold);
            font-weight: 800;
        }

        .n-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            margin-bottom: 50px;
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: 0.3s;
            padding: 10px 0;
        }

        .n-btn.active {
            color: var(--gold);
            border-left: 2px solid var(--gold);
            font-weight: bold;
        }

        /* Contenedor Principal */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .panel { display: none; max-width: 900px; margin: 0 auto; }
        .panel.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        h1::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        /* Estética de Tarjetas */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 4px;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            left: 0; top: 20%; height: 60%;
            width: 3px; background: var(--gold);
        }

        .card-title { font-size: 0.85rem; font-weight: bold; color: var(--gold); margin-bottom: 5px; }
        .card-sub { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 15px; text-transform: uppercase; }

        .price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .p-item { background: #181818; padding: 10px; border-radius: 2px; }
        .p-label { font-size: 0.55rem; color: var(--text-dim); display: block; }
        .p-val { font-family: 'Courier New', monospace; font-size: 1.1rem; color: var(--gold); font-weight: bold; }

        /* Gráfica Energía */
        .energy-hero { text-align: center; padding: 30px; border: 1px solid var(--border); margin-bottom: 30px; }
        .energy-val { font-size: 4rem; font-weight: 200; color: var(--gold); margin: 10px 0; }
        .chart { display: flex; align-items: flex-end; justify-content: space-between; height: 150px; margin-top: 30px; gap: 4px; }
        .bar { flex: 1; background: #222; min-height: 2px; transition: 0.3s; }
        .bar.active { background: var(--gold); box-shadow: 0 0 15px var(--gold); }

        /* Clima */
        .weather-display { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: center; }
        .temp-main { font-size: 7rem; font-weight: 100; color: var(--gold); }
        .weather-details { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .forecast-3d { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
        .f-day { text-align: center; }
        .f-label { font-size: 0.6rem; color: var(--text-dim); margin-bottom: 5px; }
    </style>
</head>
<body>

<nav>
    <div class="logo-area">
        <svg class="logo-svg" viewBox="0 0 24 24">
            <path d="M12,2C12,2 7,7.217 7,12C7,14.761 9.239,17 12,17C14.761,17 17,14.761 17,12C17,7.217 12,2 12,2M12,14.5C10.619,14.5 9.5,13.381 9.5,12C9.5,10.15 12,7.1 12,7.1C12,7.1 14.5,10.15 14.5,12C14.5,13.381 13.381,14.5 12,14.5Z" />
        </svg>
        <div class="logo-name">HESTIA</div>
    </div>
    <button onclick="tab('g', this)" class="n-btn active">GASOLINA</button>
    <button onclick="tab('l', this)" class="n-btn">ENERGÍA</button>
    <button onclick="tab('m', this)" class="n-btn">CLIMA</button>
</nav>

<main>
    <div id="g" class="panel active">
        <h1>MEJORES PRECIOS ALMERÍA</h1>
        <div id="fuel-container" class="grid">
            <div style="color:var(--text-dim)">Localizando surtidores...</div>
        </div>
    </div>

    <div id="l" class="panel">
        <h1>MERCADO ELÉCTRICO PVPC</h1>
        <div class="energy-hero">
            <div style="font-size: 0.7rem; letter-spacing: 2px;">PRECIO ACTUAL €/kWh</div>
            <div id="now-l-val" class="energy-val">--</div>
            <div id="l-range" style="font-size: 0.8rem; color: var(--text-dim);">Min: -- | Max: --</div>
            <div id="energy-chart" class="chart"></div>
        </div>
    </div>

    <div id="m" class="panel">
        <h1>PREVISIÓN ALMERÍA</h1>
        <div class="weather-display">
            <div id="main-temp" class="temp-main">--°</div>
            <div class="weather-details" id="w-details">
                <div class="p-item"><span class="p-label">HUMEDAD</span><span class="p-val" id="hum">--%</span></div>
                <div class="p-item"><span class="p-label">VIENTO</span><span class="p-val" id="win">-- km/h</span></div>
                <div class="p-item"><span class="p-label">UV</span><span class="p-val" id="uv">--</span></div>
                <div class="p-item"><span class="p-label">SENSACIÓN</span><span class="p-val" id="st">--°</span></div>
            </div>
        </div>
        <div class="forecast-3d" id="forecast-cont">
            </div>
    </div>
</main>

<script>
    function tab(id, btn) {
        document.querySelectorAll('.panel, .n-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // --- LÓGICA DE GASOLINA (FUEL) ---
    async function loadFuel() {
        const container = document.getElementById('fuel-container');
        try {
            // Usamos un proxy robusto y una URL de la API de Rest de Carburantes (Provincia 04 = Almería)
            const target = "https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroProvincia/04";
            const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`);
            const data = await response.json();

            const stations = data.ListaEESSPrecio
                .filter(e => e.Municipio.toUpperCase() === "ALMERIA")
                .sort((a,b) => parseFloat(a['Precio Gasolina 95 E5'].replace(',','.')) - parseFloat(b['Precio Gasolina 95 E5'].replace(',','.')))
                .slice(0, 10);

            container.innerHTML = stations.map(e => `
                <div class="card">
                    <div class="card-title">${e.Rótulo}</div>
                    <div class="card-sub">${e.Dirección.substring(0, 30)}...</div>
                    <div class="price-row">
                        <div class="p-item"><span class="p-label">G95</span><span class="p-val">${e['Precio Gasolina 95 E5']}</span></div>
                        <div class="p-item"><span class="p-label">GA</span><span class="p-val">${e['Precio Gasoleo A']}</span></div>
                    </div>
                </div>
            `).join('');
        } catch(e) {
            container.innerHTML = `<div class="card" style="border-color:red">Error de conexión con el Ministerio. Los servidores de datos están saturados.</div>`;
        }
    }

    // --- LÓGICA DE ENERGÍA ---
    async function loadEnergy() {
        try {
            const hoy = new Date().toISOString().split('T')[0];
            const res = await fetch(`https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${hoy}T00:00&end_date=${hoy}T23:59&time_trunc=hour`);
            const data = await res.json();
            const values = data.included[0].attributes.values.map(v => (v.value / 1000).toFixed(4));
            
            const now = values[new Date().getHours()];
            document.getElementById('now-l-val').innerText = now;
            document.getElementById('l-range').innerText = `Min: ${Math.min(...values)} | Max: ${Math.max(...values)}`;

            const max = Math.max(...values);
            const hActual = new Date().getHours();
            document.getElementById('energy-chart').innerHTML = values.map((v, i) => `
                <div class="bar ${i === hActual ? 'active' : ''}" style="height: ${(v/max)*100}%"></div>
            `).join('');
        } catch(e) { console.log("Error Luz"); }
    }

    // --- LÓGICA DE CLIMA ---
    async function loadWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=36.83&longitude=-2.46&current_weather=true&hourly=relativehumidity_2m,apparent_temperature,uv_index&daily=temperature_2m_max,temperature_2m_min&timezone=Europe/Berlin");
            const data = await res.json();
            
            // Actual
            document.getElementById('main-temp').innerText = Math.round(data.current_weather.temperature) + "°";
            document.getElementById('hum').innerText = data.hourly.relativehumidity_2m[new Date().getHours()] + "%";
            document.getElementById('win').innerText = data.current_weather.windspeed + " km/h";
            document.getElementById('uv').innerText = data.hourly.uv_index[new Date().getHours()];
            document.getElementById('st').innerText = Math.round(data.hourly.apparent_temperature[new Date().getHours()]) + "°";

            // Pronóstico 3 días
            const days = ["DOM", "LUN", "MAR", "MIÉ", "JUE", "VIE", "SÁB"];
            let fHtml = "";
            for(let i=1; i<4; i++) {
                const d = new Date(); d.setDate(d.getDate() + i);
                fHtml += `
                    <div class="f-day">
                        <div class="f-label">${days[d.getDay()]}</div>
                        <div style="color:var(--gold)">${Math.round(data.daily.temperature_2m_max[i])}°</div>
                        <div style="font-size:0.6rem; color:var(--text-dim)">${Math.round(data.daily.temperature_2m_min[i])}°</div>
                    </div>
                `;
            }
            document.getElementById('forecast-cont').innerHTML = fHtml;

        } catch(e) { console.log("Error Clima"); }
    }

    // Carga inicial
    window.onload = () => {
        loadFuel();
        loadEnergy();
        loadWeather();
    };
</script>
</body>
</html>
